            <thead><tr><th>MÊS</th><th style={{textAlign:"right"}}>PLANEJADO</th><th style={{textAlign:"right"}}>REALIZADO</th><th style={{textAlign:"right"}}>DELTA</th><th style={{textAlign:"right"}}>AVANÇO</th></tr></thead>
            <tbody>
              {meses.map(m=>{
                const {p,r}=porMes[m];
                const d=r-p;
                const pct=p>0?(r/p)*100:r>0?100:0;
                return(
                  <tr key={m}>
                    <td className="mono" style={{fontWeight:600,color:"#c9d1d9"}}>{m}</td>
                    <td className="mono" style={{textAlign:"right",color:"#388bfd"}}>R$ {fmt(p)}</td>
                    <td className="mono" style={{textAlign:"right",color:"#3fb950"}}>R$ {fmt(r)}</td>
                    <td className="mono" style={{textAlign:"right",color:d>=0?"#3fb950":"#f85149"}}>{d>=0?"+":""}R$ {fmt(Math.abs(d))}</td>
                    <td style={{textAlign:"right"}}><span className={`badge ${pct>=100?"bgn":pct>=80?"bo":"br"}`}>{fmtN(pct)}%</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {meses.length===0&&<div style={{padding:20,textAlign:"center",color:"#484f58"}}>Sem dados</div>}
        </div>
        <div className="card" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:14}}>COMPOSIÇÃO POR SERVIÇO</div>
          {porSvc.map(s=>{
            const pct=totMed>0?(s.v/totMed)*100:0;
            const c=COR[s.id]||"#388bfd";
            return(
              <div key={s.id} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12}}>
                  <span style={{color:"#8b949e"}}>{s.nome}</span>
                  <span className="mono" style={{color:c}}>R$ {fmt(s.v)}</span>
                </div>
                <div className="pt"><div className="pf" style={{width:`${pct}%`,background:c}}/></div>
                <div style={{fontSize:10,color:"#484f58",marginTop:3}}>{fmtN(pct)}%</div>
              </div>
            );
          })}
          {porSvc.length===0&&<div style={{color:"#484f58",fontSize:12}}>Sem dados acumulados</div>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  RELATÓRIO DE QUANTITATIVOS POR ÁREA
// ═══════════════════════════════════════════════════════════════════════════
function RelatorioQtd({realizado,planejado,svcMap,clientes,clienteAtivo,servicos}){
  const [dataIni,setDataIni]=useState(()=>new Date(new Date().getFullYear(),0,1).toISOString().slice(0,10));
  const [dataFim,setDataFim]=useState(hoje);
  const [modoData,setModoData]=useState("periodo"); // "periodo" | "ate"
  const [incPlanejado,setIncPlanejado]=useState(true);
  const [areaFiltro,setAreaFiltro]=useState(""); // "" = todas
  const printRef=useRef();

  // Dados filtrados pelo período
  const realFilt=useMemo(()=>{
    if(modoData==="ate") return realizado.filter(l=>l.data<=dataFim);
    return realizado.filter(l=>l.data>=dataIni&&l.data<=dataFim);
  },[realizado,dataIni,dataFim,modoData]);

  const planFilt=useMemo(()=>{
    if(!incPlanejado) return [];
    if(modoData==="ate") return planejado.filter(l=>l.data<=dataFim);
    return planejado.filter(l=>l.data>=dataIni&&l.data<=dataFim);
  },[planejado,dataIni,dataFim,modoData,incPlanejado]);

  // Áreas presentes
  const todasAreas=useMemo(()=>[...new Set([
    ...realFilt.map(l=>l.area).filter(Boolean),
    ...planFilt.map(l=>l.area).filter(Boolean),
  ])].sort(),[realFilt,planFilt]);

  const realParaCalc=areaFiltro?realFilt.filter(l=>l.area===areaFiltro):realFilt;
  const planParaCalc=areaFiltro?planFilt.filter(l=>l.area===areaFiltro):planFilt;

  // Agrupar por área → serviço
  const dados=useMemo(()=>{
    const areas={};
    const add=(lista,tipo)=>{
      lista.forEach(l=>{
        const area=l.area||"(Sem área)";
        const svc=svcMap[l.sid];
        if(!svc)return;
        if(!areas[area])areas[area]={area,itens:{}};
        if(!areas[area].itens[l.sid])areas[area].itens[l.sid]={sid:l.sid,svc,real:0,plan:0};
        areas[area].itens[l.sid][tipo]+=l.qtd;
      });
    };
    add(realParaCalc,"real");
    if(incPlanejado) add(planParaCalc,"plan");
    // Converter para array ordenado
    return Object.values(areas).sort((a,b)=>a.area.localeCompare(b.area)).map(a=>({
      ...a,
      itens:Object.values(a.itens).sort((x,y)=>x.svc.nome.localeCompare(y.svc.nome)),
    }));
  },[realParaCalc,planParaCalc,incPlanejado,svcMap]);

  // Totais globais
  const totais=useMemo(()=>({
    real: dados.reduce((s,a)=>s+a.itens.reduce((ss,i)=>ss+(svcMap[i.sid]?.valor||0)*i.real,0),0),
    plan: dados.reduce((s,a)=>s+a.itens.reduce((ss,i)=>ss+(svcMap[i.sid]?.valor||0)*i.plan,0),0),
  }),[dados,svcMap]);

  // Gerar HTML para impressão / download
  const gerarHTML=()=>{
    const periodoStr=modoData==="ate"
      ?`Acumulado até ${dataFim}`
      :`${dataIni} a ${dataFim}`;
    const cliStr=clienteAtivo?clienteAtivo.nome:"Todos os clientes";
    const areaStr=areaFiltro||"Todas";

    const linhasTabela=dados.map(grupo=>{
      const subtotalReal=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.real,0);
      const subtotalPlan=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.plan,0);
      const avanco=subtotalPlan>0?((subtotalReal/subtotalPlan)*100).toFixed(1):"-";
      const linhasItens=grupo.itens.map(i=>{
        const vr=(svcMap[i.sid]?.valor||0)*i.real;
        const vp=(svcMap[i.sid]?.valor||0)*i.plan;
        const avItem=vp>0?((vr/vp)*100).toFixed(1):"-";
        return `
          <tr>
            <td>${i.svc.nome}</td>
            <td class="un">${i.svc.unidade}</td>
            ${incPlanejado?`<td class="num">${Number(i.plan).toLocaleString("pt-BR",{maximumFractionDigits:2})}</td><td class="num">R$ ${Number(vp).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</td>`:""}
            <td class="num">${Number(i.real).toLocaleString("pt-BR",{maximumFractionDigits:2})}</td>
            <td class="num">R$ ${Number(vr).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
            ${incPlanejado?`<td class="num av">${avItem}%</td>`:""}
          </tr>`;
      }).join("");
      const subtLine=`
        <tr class="subtotal">
          <td colspan="${incPlanejado?2:2}">Subtotal — ${grupo.area}</td>
          ${incPlanejado?`<td class="num"></td><td class="num">R$ ${Number(subtotalPlan).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>`:""}
          <td class="num"></td>
          <td class="num">R$ ${Number(subtotalReal).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>
          ${incPlanejado?`<td class="num av">${avanco}%</td>`:""}
        </tr>`;
      return `<tr class="area-header"><td colspan="${incPlanejado?7:4}">${grupo.area}</td></tr>${linhasItens}${subtLine}`;
    }).join("");

    const colSpanTotal=incPlanejado?7:4;
    const totalLine=`
      <tr class="grand-total">
        <td colspan="${incPlanejado?4:3}">TOTAL GERAL</td>
        ${incPlanejado?`<td class="num">R$ ${Number(totais.plan).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>`:""}
        <td class="num">R$ ${Number(totais.real).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>
        ${incPlanejado?`<td class="num av">${totais.plan>0?((totais.real/totais.plan)*100).toFixed(1):"-"}%</td>`:""}
      </tr>`;

    const html=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Relatório de Quantitativos — HBR GAC</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#111;background:#fff;padding:24px 32px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #1d4ed8}
  .logo-area h1{font-size:20px;font-weight:700;color:#1d4ed8;letter-spacing:1px}
  .logo-area p{font-size:11px;color:#555;margin-top:2px}
  .meta{font-size:11px;color:#333;text-align:right;line-height:1.7}
  .meta strong{color:#1d4ed8}
  h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#1d4ed8;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:11.5px}
  thead th{background:#1d4ed8;color:#fff;padding:7px 10px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  thead th.num,thead th.av{text-align:right}
  td{padding:6px 10px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
  td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.un{color:#555;text-align:center;width:52px}
  td.av{color:#15803d;font-weight:600;text-align:right}
  tr.area-header td{background:#eff6ff;color:#1d4ed8;font-weight:700;font-size:12px;padding:8px 10px;border-top:2px solid #bfdbfe;letter-spacing:.03em}
  tr.subtotal td{background:#f8fafc;font-weight:600;color:#334155;border-top:1px solid #cbd5e1;font-size:11.5px}
  tr.grand-total td{background:#1d4ed8;color:#fff;font-weight:700;font-size:12px;border-top:3px solid #1e40af}
  tr.grand-total td.av{color:#bbf7d0}
  tr:hover:not(.area-header):not(.subtotal):not(.grand-total) td{background:#f9fafb}
  .resumo{display:flex;gap:16px;margin-bottom:20px}
  .resumo-card{flex:1;padding:12px 16px;border-radius:6px;border:1px solid #e5e7eb}
  .resumo-card.plan{border-left:3px solid #2563eb;background:#eff6ff}
  .resumo-card.real{border-left:3px solid #16a34a;background:#f0fdf4}
  .resumo-card.av{border-left:3px solid #d97706;background:#fffbeb}
  .resumo-card .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#555;margin-bottom:4px}
  .resumo-card .val{font-size:18px;font-weight:700}
  .resumo-card.plan .val{color:#1d4ed8}
  .resumo-card.real .val{color:#15803d}
  .resumo-card.av .val{color:#b45309}
  .footer{margin-top:32px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:10px;color:#888;display:flex;justify-content:space-between}
  @media print{body{padding:12px 16px}button{display:none!important}}
</style>
</head>
<body>
<div class="header">
  <div class="logo-area">
    <h1>HBR GAC</h1>
    <p>Gestão Ambiental de Campo</p>
    <p style="margin-top:6px;font-size:12px;font-weight:600">Relatório de Quantitativos Realizados por Área</p>
  </div>
  <div class="meta">
    <div><strong>Cliente:</strong> ${cliStr}</div>
    <div><strong>Período:</strong> ${periodoStr}</div>
    <div><strong>Área:</strong> ${areaStr}</div>
    <div><strong>Emitido em:</strong> ${new Date().toLocaleDateString("pt-BR")} às ${new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</div>
  </div>
</div>

${incPlanejado?`
<div class="resumo">
  <div class="resumo-card plan">
    <div class="label">Total Planejado</div>
    <div class="val">R$ ${Number(totais.plan).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
  </div>
  <div class="resumo-card real">
    <div class="label">Total Realizado</div>
    <div class="val">R$ ${Number(totais.real).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
  </div>
  <div class="resumo-card av">
    <div class="label">Avanço Financeiro</div>
    <div class="val">${totais.plan>0?((totais.real/totais.plan)*100).toFixed(1):"-"}%</div>
  </div>
</div>`:`
<div class="resumo">
  <div class="resumo-card real">
    <div class="label">Total Realizado</div>
    <div class="val">R$ ${Number(totais.real).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
  </div>
</div>`}

<table>
  <thead>
    <tr>
      <th>Serviço</th>
      <th class="un" style="text-align:center">Unid.</th>
      ${incPlanejado?`<th class="num">Qtde Plan.</th><th class="num">R$ Plan.</th>`:""}
      <th class="num">Qtde Real.</th>
      <th class="num">R$ Real.</th>
      ${incPlanejado?`<th class="av">Avanço</th>`:""}
    </tr>
  </thead>
  <tbody>
    ${linhasTabela}
    ${totalLine}
  </tbody>
</table>

<div class="footer">
  <span>HBR GAC — Sistema de Gestão Ambiental de Campo</span>
  <span>Página 1</span>
</div>
</body>
</html>`;
    return html;
  };

  const baixarHTML=()=>{
    const html=gerarHTML();
    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    const periodoStr=modoData==="ate"?`ate_${dataFim}`:`${dataIni}_${dataFim}`;
    a.download=`relatorio_qtd_${periodoStr}.html`;
    a.click();
  };

  const imprimir=()=>{
    const html=gerarHTML();
    const w=window.open("","_blank");
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(()=>w.print(),500);
  };

  return(
    <div style={{display:"grid",gap:16}}>

      {/* Controles */}
      <div className="card ca-teal" style={{padding:"18px 20px"}}>
        <div className="sl" style={{marginBottom:14}}>CONFIGURAR RELATÓRIO</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,alignItems:"end"}}>

          {/* Modo de data */}
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>MODO</div>
            <div style={{display:"flex",gap:0,background:"#010409",borderRadius:6,border:"1px solid #30363d",overflow:"hidden"}}>
              {[{id:"periodo",l:"Período"},{id:"ate",l:"Acumulado até"}].map(m=>(
                <button key={m.id} onClick={()=>setModoData(m.id)} style={{flex:1,padding:"7px 10px",border:"none",cursor:"pointer",background:modoData===m.id?"#2dd4bf22":"transparent",color:modoData===m.id?"#2dd4bf":"#484f58",fontWeight:modoData===m.id?600:400,fontSize:12,transition:"all .15s"}}>
                  {m.l}
                </button>
              ))}
            </div>
          </div>

          {/* Atalhos rápidos */}
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>ATALHO</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[
                {l:"Mês atual", fn:()=>{setModoData("periodo");setDataIni(new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10));setDataFim(hoje());}},
                {l:"Ano atual", fn:()=>{setModoData("periodo");setDataIni(new Date(new Date().getFullYear(),0,1).toISOString().slice(0,10));setDataFim(hoje());}},
                {l:"Todo histórico", fn:()=>{setModoData("ate");setDataFim(hoje());}},
                ...(clienteAtivo?.diaCorte?[{l:`Ciclo atual (dia ${clienteAtivo.diaCorte})`, fn:()=>{const c=periodoCiclo(clienteAtivo.diaCorte);setModoData("periodo");setDataIni(c.inicio);setDataFim(c.fim);}}]:[]),
              ].map(({l,fn})=>(
                <button key={l} className="btn btn-ghost btn-xs" onClick={fn} style={{fontSize:10}}>{l}</button>
              ))}
            </div>
          </div>

          {/* Datas */}
          {modoData==="periodo"&&(
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>DATA INÍCIO</div>
              <input type="date" className="inp" value={dataIni} onChange={e=>setDataIni(e.target.value)}/>
            </div>
          )}
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>{modoData==="ate"?"DATA DE CORTE":"DATA FIM"}</div>
            <input type="date" className="inp" value={dataFim} onChange={e=>setDataFim(e.target.value)}/>
          </div>

          {/* Filtro de área */}
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>ÁREA</div>
            <select className="inp" value={areaFiltro} onChange={e=>setAreaFiltro(e.target.value)}>
              <option value="">Todas as áreas</option>
              {todasAreas.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>

          {/* Toggle planejado */}
          <div style={{display:"flex",alignItems:"center",gap:10,paddingTop:4}}>
            <button
              onClick={()=>setIncPlanejado(v=>!v)}
              style={{width:38,height:22,borderRadius:11,border:"none",cursor:"pointer",background:incPlanejado?"#2dd4bf":"#21262d",position:"relative",transition:"background .2s",flexShrink:0}}
            >
              <div style={{width:16,height:16,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:incPlanejado?19:3,transition:"left .2s"}}/>
            </button>
            <span style={{fontSize:12,color:"#8b949e"}}>Incluir Planejado</span>
          </div>
        </div>

        {/* Botões de ação */}
        <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
          <button className="btn btn-primary" onClick={imprimir}>⎙ Imprimir / PDF</button>
          <button className="btn btn-ghost" onClick={baixarHTML}>↓ Baixar HTML</button>
        </div>
      </div>

      {/* Prévia */}
      {dados.length===0
        ?<div className="card" style={{padding:40,textAlign:"center",color:"#484f58"}}>
            Nenhum lançamento realizado no período selecionado.
          </div>
        :<>
          {/* Resumo de totais */}
          <div style={{display:"grid",gridTemplateColumns:incPlanejado?"repeat(3,1fr)":"1fr",gap:12}}>
            {incPlanejado&&(
              <div className="card ca-blue" style={{padding:"14px 18px"}}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>TOTAL PLANEJADO</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,color:"#388bfd"}}>R$ {fmt(totais.plan)}</div>
              </div>
            )}
            <div className="card ca-green" style={{padding:"14px 18px"}}>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>TOTAL REALIZADO</div>
              <div className="mono" style={{fontSize:22,fontWeight:700,color:"#3fb950"}}>R$ {fmt(totais.real)}</div>
            </div>
            {incPlanejado&&(
              <div className="card ca-orange" style={{padding:"14px 18px"}}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>AVANÇO FINANCEIRO</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,color:"#d29922"}}>
                  {totais.plan>0?fmtN((totais.real/totais.plan)*100):"-"}%
                </div>
                <div style={{marginTop:8}}><div className="pt"><div className="pf" style={{width:`${Math.min(totais.plan>0?(totais.real/totais.plan)*100:0,100)}%`,background:"#d29922"}}/></div></div>
              </div>
            )}
          </div>

          {/* Tabela por área */}
          {dados.map(grupo=>{
            const subReal=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.real,0);
            const subPlan=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.plan,0);
            const avGrupo=subPlan>0?(subReal/subPlan)*100:null;
            return(
              <div key={grupo.area} className="card" style={{padding:"14px 18px"}}>
                {/* Cabeçalho da área */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid #21262d"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{width:6,height:20,borderRadius:3,background:"#2dd4bf",display:"inline-block"}}/>
                    <span style={{fontSize:14,fontWeight:700,color:"#c9d1d9"}}>{grupo.area}</span>
                    <span className="badge bg">{grupo.itens.length} serviço{grupo.itens.length!==1?"s":""}</span>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    {incPlanejado&&<span className="mono" style={{fontSize:12,color:"#388bfd"}}>Plan: R$ {fmt(subPlan)}</span>}
                    <span className="mono" style={{fontSize:13,fontWeight:600,color:"#3fb950"}}>Real: R$ {fmt(subReal)}</span>
                    {incPlanejado&&avGrupo!==null&&(
                      <span className={`badge ${avGrupo>=100?"bgn":avGrupo>=80?"bo":"br"}`}>{fmtN(avGrupo)}%</span>
                    )}
                  </div>
                </div>

                <table className="table">
                  <thead>
                    <tr>
                      <th>SERVIÇO</th>
                      <th>UNID.</th>
                      {incPlanejado&&<><th style={{textAlign:"right"}}>QTDE PLAN.</th><th style={{textAlign:"right"}}>R$ PLAN.</th></>}
                      <th style={{textAlign:"right"}}>QTDE REAL.</th>
                      <th style={{textAlign:"right"}}>R$ REAL.</th>
                      {incPlanejado&&<th style={{textAlign:"right"}}>AVANÇO</th>}
                    </tr>
                  </thead>
                  <tbody>
                    {grupo.itens.map(item=>{
                      const vr=(svcMap[item.sid]?.valor||0)*item.real;
                      const vp=(svcMap[item.sid]?.valor||0)*item.plan;
                      const avItem=vp>0?(vr/vp)*100:null;
                      const cor=COR[item.sid]||"#8b949e";
                      return(
                        <tr key={item.sid}>
                          <td>
                            <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                              <span style={{width:8,height:8,borderRadius:"50%",background:cor,flexShrink:0}}/>
                              <span style={{fontSize:12,color:"#c9d1d9"}}>{item.svc.nome}</span>
                            </span>
                          </td>
                          <td><span className="badge bg">{item.svc.unidade}</span></td>
                          {incPlanejado&&(
                            <>
                              <td className="mono" style={{textAlign:"right",color:"#388bfd"}}>{item.plan>0?fmtN(item.plan,2):"—"}</td>
                              <td className="mono" style={{textAlign:"right",color:"#388bfd",fontSize:11}}>{vp>0?`R$ ${fmt(vp)}`:"—"}</td>
                            </>
                          )}
                          <td className="mono" style={{textAlign:"right",color:"#3fb950",fontWeight:600}}>{item.real>0?fmtN(item.real,2):"—"}</td>
                          <td className="mono" style={{textAlign:"right",color:"#d29922"}}>{vr>0?`R$ ${fmt(vr)}`:"—"}</td>
                          {incPlanejado&&(
                            <td style={{textAlign:"right"}}>
                              {avItem!==null
                                ?<span className={`badge ${avItem>=100?"bgn":avItem>=80?"bo":"br"}`}>{fmtN(avItem)}%</span>
                                :<span style={{color:"#30363d",fontSize:11}}>—</span>
                              }
                            </td>
                          )}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })}

          {/* Total geral */}
          <div style={{padding:"14px 20px",background:"#161b22",border:"1px solid #21262d",borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <span style={{fontSize:12,fontWeight:600,color:"#8b949e",textTransform:"uppercase",letterSpacing:1}}>Total Geral do Período</span>
            <div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
              {incPlanejado&&<span className="mono" style={{color:"#388bfd"}}>Plan: <strong>R$ {fmt(totais.plan)}</strong></span>}
              <span className="mono" style={{color:"#3fb950"}}>Real: <strong>R$ {fmt(totais.real)}</strong></span>
              {incPlanejado&&<span className={`badge ${totais.plan>0&&(totais.real/totais.plan)>=1?"bgn":totais.plan>0&&(totais.real/totais.plan)>=.8?"bo":"br"}`} style={{fontSize:13,padding:"4px 12px"}}>
                {totais.plan>0?fmtN((totais.real/totais.plan)*100):"-"}%
              </span>}
            </div>
          </div>
        </>
      }
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  IMPORTAR
// ═══════════════════════════════════════════════════════════════════════════
function Importar({setPlanejado,setAreas,areas,servicos,clientes,cliAtivo}){
  // ─── Estado ────────────────────────────────────────────────────────────
  const [modo,      setModo]      = useState("plan");   // "plan" | "csv"
  const [drag,      setDrag]      = useState(false);
  const [loading,   setLoading]   = useState(false);
  const [erro,      setErro]      = useState("");
  const [ok,        setOk]        = useState("");
  const [planData,  setPlanData]  = useState(null);  // dados extraídos do plano
  const [preview,   setPreview]   = useState([]);    // preview CSV
  const refPlan = useRef();
  const refCSV  = useRef();
  const svcMap  = Object.fromEntries(servicos.map(s=>[s.id,s]));

  // IDs fixos dos serviços obrigatórios
  const SVC = {
    mobBH:    servicos.find(s=>s.nome.includes("Inv. Confirmatória BH") || s.nome.includes("Confirmatória BH"))?.id || "V02",
    mobPerf:  servicos.find(s=>s.nome.includes("Perfuratriz"))?.id || "V05",
    gestLab:  servicos.find(s=>s.nome.includes("Laboratório") || s.nome.includes("Frascaria"))?.id || "V38",
    relFinal: servicos.find(s=>s.nome.includes("Investigação Confirmatória") && s.nome.includes("Relatório"))?.id
              || servicos.find(s=>s.nome.includes("Relatório"))?.id || "V07",
    dp:       "V13",  // Direct Push
    rot6:     "V11",  // Rotativa 6"
    amoSolo:  "V14",  // Amostragem Solo
    amoAgua:  "V18",  // Amostragem Água
  };

  useEffect(()=>{
    // Carrega mammoth para leitura de DOCX
    if(!window.mammoth){
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
      document.head.appendChild(s);
    }
    // Carrega XLSX para CSV/Excel
    if(!window.XLSX){
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      document.head.appendChild(s);
    }
  },[]);

  // ─── Parser do Plano de Investigação (DOCX) ───────────────────────────
  const parsePlanDocx = async (file) => {
    setLoading(true); setErro(""); setPlanData(null); setOk("");
    try {
      if(!window.mammoth) throw new Error("Aguarde 2s e tente novamente (carregando leitor DOCX).");
      const buf = await file.arrayBuffer();
      const result = await window.mammoth.extractRawText({arrayBuffer: buf});
      const txt = result.value;

      // ── Extrai nome da área ────────────────────────────────────────────
      const areaMatch = txt.match(/(?:Investigação Ambiental|INVESTIGAÇÃO AMBIENTAL|AS[-\s]?\d+|área\s+(?:suspeita|de\s+investigação)?)\s*([\w-]+)/i)
        || txt.match(/(AS[-\s]?\d+|AC[-\s]?\d+|RP[-\s]?\d+|DIR[-\s]?\w+|ETAF\w*)/i);
      const nomeArea = (areaMatch?.[1] || areaMatch?.[0] || file.name.replace(/\.docx$/i,"")).trim().toUpperCase();

      // ── Extrai pontos de sondagem ──────────────────────────────────────
      const pontosRaw = [...txt.matchAll(/\b(S[DPT]-?\d+|SB-?\d+|P[TMG]-?\d+)\b/gi)]
        .map(m=>m[1].toUpperCase());
      const pontos = [...new Set(pontosRaw)];

      // ── Extrai amostras de solo e água ─────────────────────────────────
      let totalSolo = 0, totalAgua = 0;
      const soloMatches = [...txt.matchAll(/\|\s*(\d+)\s*\|\s*Solo/gi)];
      const aguaMatches = [...txt.matchAll(/\|\s*(\d+)\s*\|\s*Água/gi)];
      soloMatches.forEach(m => totalSolo += parseInt(m[1]||0));
      aguaMatches.forEach(m => totalAgua += parseInt(m[1]||0));
      if(totalSolo===0) totalSolo = pontos.length * 2;
      if(totalAgua===0) totalAgua = pontos.length * 1;

      // ── Helper: DD/MM/AAAA → YYYY-MM-DD ───────────────────────────────
      const parseBR = str => {
        if(!str) return null;
        const m = str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        return m ? `${m[3]}-${m[2]}-${m[1]}` : null;
      };

      // ── Extrai datas do cronograma por palavra-chave ───────────────────
      // Cada linha do cronograma tem: "Atividade | DD/MM/AAAA | DD/MM/AAAA"
      // Captura início e término de cada item.
      const cronLinha = (chave) => {
        const re = new RegExp(
          chave + '[^\n]{0,150}?(\d{2}\/\d{2}\/\d{4})[^\n]{0,80}?(\d{2}\/\d{2}\/\d{4})?',
          'i'
        );
        const m = txt.match(re);
        return { inicio: parseBR(m?.[1]), termino: parseBR(m?.[2]) };
      };

      // Itens do cronograma relevantes
      const cronPlan      = cronLinha('Planejamento\s+das\s+atividades?');
      const cronFrascaria = cronLinha('Prepara[çc][aã]o\s+das?\s+Frascarias?');
      const cronSondagem  = cronLinha('Execu[çc][aã]o\s+das?\s+Sondagens?');
      const cronAnalise   = cronLinha('An[aá]lises?\s+[Qq]u[ií]micas?');
      const cronRelatorio = cronLinha('Elabora[çc][aã]o\s+do\s+Relat[oó]rio');

      // Mapeamento para cada serviço:
      // dataInicio   → Mobilização (início do planejamento)
      // dataSondagem → Direct Push + Rotativa 6" (execução das sondagens)
      // dataLab      → Gestão de Laboratório (preparação das frascarias)
      // dataRelatorio→ Relatório Final (elaboração do relatório)
      const dataInicio    = cronPlan.inicio     || cronSondagem.inicio || hoje();
      const dataSondagem  = cronSondagem.inicio || cronPlan.inicio     || hoje();
      const dataLab       = cronFrascaria.inicio || dataInicio;
      const dataRelatorio = cronRelatorio.inicio || null;

      const desc = txt.substring(0,500).replace(/\s+/g," ").trim();

      setPlanData({
        nomeArea, pontos, totalSolo, totalAgua,
        dataInicio, dataSondagem, dataLab, dataRelatorio,
        // Guardamos os detalhes do cronograma para exibição
        cronograma: {
          planejamento: cronPlan,
          frascaria:    cronFrascaria,
          sondagem:     cronSondagem,
          analise:      cronAnalise,
          relatorio:    cronRelatorio,
        },
        descricao: desc,
        cliId: cliAtivo||"",
      });
    } catch(e) {
      setErro("Erro ao ler DOCX: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  // ─── Gera área a partir dos dados extraídos ────────────────────────────
  const gerarDoPlan = () => {
    if(!planData) return;
    const { nomeArea, pontos, totalSolo, totalAgua, dataInicio, dataSondagem, dataLab, descricao, cliId, dataRelatorio } = planData;

    const itens = [];

    // Linhas fixas — cada uma com sua data correta do cronograma
    itens.push({ sid: SVC.mobBH,    qtd: 1, data: dataInicio,              obs: "Mobilização Inv. Confirmatória" });
    itens.push({ sid: SVC.mobPerf,  qtd: 1, data: dataSondagem||dataInicio, obs: "Mobilização Perfuratriz" });
    itens.push({ sid: SVC.gestLab,  qtd: 1, data: dataLab||dataInicio,      obs: "Gestão de Laboratório + Frascaria" });
    itens.push({ sid: SVC.relFinal, qtd: 1, data: dataRelatorio||dataInicio, obs: "Relatório Final de Investigação" });

    // Direct Push + Rotativa 6" por ponto — data de execução das sondagens
    pontos.forEach(ponto => {
      itens.push({ sid: SVC.dp,   qtd: 1, data: dataSondagem||dataInicio, obs: `Direct Push — ${ponto}` });
      itens.push({ sid: SVC.rot6, qtd: 1, data: dataSondagem||dataInicio, obs: `Rotativa 6" — ${ponto}` });
    });

    // Amostras — data das sondagens
    if(totalSolo > 0) itens.push({ sid: SVC.amoSolo, qtd: totalSolo, data: dataSondagem||dataInicio, obs: `${totalSolo} amostras de solo — ${nomeArea}` });
    if(totalAgua > 0) itens.push({ sid: SVC.amoAgua, qtd: totalAgua, data: dataSondagem||dataInicio, obs: `${totalAgua} amostras de água — ${nomeArea}` });

    // Cria nova área — planejado é gerado pela aba Áreas
    const novaArea = {
      id:        uid(),
      nome:      nomeArea,
      descricao: descricao.substring(0, 120) + "…",
      cliId:     cliId || "",
      itens:     itens,
    };

    setAreas(a => [novaArea, ...a]);
    setOk(`✓ Área "${nomeArea}" criada com ${itens.length} serviços. Acesse a aba Áreas para gerar o planejado.`);
    setPlanData(null);
  };


  // ─── Parser CSV/Excel ─────────────────────────────────────────────────
  const processCSV = text => {
    try{
      const lines=text.split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith("#"));
      if(!lines.length){setErro("Arquivo vazio.");return;}
      const header=lines[0].toLowerCase().split(",").map(h=>h.trim().replace(/['"]/g,""));
      const col=k=>header.indexOf(k);
      if(col("data")<0||col("servico_id")<0||col("quantidade")<0){setErro('Colunas obrigatórias: "data","servico_id","quantidade"');return;}
      const svcIds=new Set(servicos.map(s=>s.id));
      const rows=[];const skip=[];
      lines.slice(1).forEach((line,i)=>{
        const c=line.split(",").map(x=>x.trim().replace(/^["']|["']$/g,""));
        const sid=(c[col("servico_id")]||"").toUpperCase();
        const qtd=parseFloat((c[col("quantidade")]||"").replace(",","."));
        if(!sid||isNaN(qtd)||qtd<=0){skip.push(`L${i+2}`);return;}
        if(!svcIds.has(sid)){skip.push(`L${i+2}: "${sid}" desconhecido`);return;}
        rows.push({id:uid(),data:c[col("data")]||hoje(),area:col("area")>=0?c[col("area")]:"",sid,qtd,
          cliId:col("cli_id")>=0?c[col("cli_id")]:(cliAtivo||""),
          obs:col("observacao")>=0?c[col("observacao")]:""});
      });
      if(!rows.length){setErro("Nenhuma linha válida. "+skip.slice(0,5).join("; "));return;}
      setPreview(rows);setErro(skip.length?`⚠ ${skip.length} linhas ignoradas`:"");setOk("");
    }catch(e){setErro("Erro: "+e.message);}
  };

  const lerCSV = file => {
    if(!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    if(["csv","txt"].includes(ext)){ const r=new FileReader(); r.onload=e=>processCSV(e.target.result); r.readAsText(file,"UTF-8"); }
    else if(["xlsx","xls"].includes(ext)){
      if(!window.XLSX){setErro("Carregando leitor Excel, tente em 2s.");return;}
      file.arrayBuffer().then(buf=>{const wb=window.XLSX.read(buf,{type:"array"});processCSV(window.XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]));});
    } else setErro("Use .csv ou .xlsx");
  };

  const importarCSV = () => { setPlanejado(p=>[...preview,...p]); setOk(`✓ ${preview.length} lançamentos importados!`); setPreview([]); };

  const downloadTemplate = () => {
    const ids=servicos.map(s=>`# ${s.id} = ${s.nome}`).join("\n");
    const blob=new Blob([`# HBR GAC — Template\n# Serviços:\n${ids}\n#\ndata,area,servico_id,quantidade,cli_id,observacao\n2024-06-10,Área A,V13,12,,Ponto SD-01\n`],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="template_planejamento.csv";a.click();
  };

  // ─── RENDER ────────────────────────────────────────────────────────────
  return(
    <div style={{display:"grid",gap:16,maxWidth:1000}}>

      {/* Seletor de modo */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid #21262d"}}>
        <button className={`tab-btn${modo==="plan"?" active":""}`} onClick={()=>{setModo("plan");setErro("");setOk("");setPlanData(null);}}>
          📄 Plano de Investigação (DOCX)
        </button>
        <button className={`tab-btn${modo==="csv"?" active":""}`} onClick={()=>{setModo("csv");setErro("");setOk("");setPreview([]);}}>
          📊 Planilha CSV / Excel
        </button>
      </div>

      {/* ── MODO PLANO DE INVESTIGAÇÃO ── */}
      {modo==="plan"&&(
        <div style={{display:"grid",gap:16}}>
          <div className="card ca-blue" style={{padding:"18px 20px"}}>
            <div className="sl" style={{marginBottom:8}}>IMPORTAR PLANO DE INVESTIGAÇÃO</div>
            <div style={{fontSize:12,color:"#8b949e",lineHeight:1.8}}>
              Sobe o <strong style={{color:"#c9d1d9"}}>DOCX do Plano de Investigação Confirmatória</strong> e o sistema lê automaticamente os pontos, amostras e cronograma,
              criando a <strong style={{color:"#c9d1d9"}}>Área</strong> e os <strong style={{color:"#c9d1d9"}}>lançamentos no Planejado</strong> com as linhas obrigatórias:
              Mobilização, Perfuratriz, Gestão de Lab, Relatório Final, Direct Push e Rotativa 6" por ponto, e amostras conforme exigência.
            </div>
          </div>

          {/* Drop zone DOCX */}
          <div
            className={`drag-zone${drag?" dov":""}`}
            onClick={()=>refPlan.current?.click()}
            onDragOver={e=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);parsePlanDocx(e.dataTransfer.files[0]);}}>
            <div style={{fontSize:36,marginBottom:10}}>{loading?"⟳":"📄"}</div>
            <div style={{color:"#c9d1d9",fontWeight:600,marginBottom:4}}>{loading?"Lendo documento…":"Arraste o DOCX do Plano de Investigação"}</div>
            <div style={{fontSize:12,color:"#484f58"}}>Formato .docx — Plano de Investigação Confirmatória</div>
            <input ref={refPlan} type="file" accept=".docx" style={{display:"none"}} onChange={e=>parsePlanDocx(e.target.files[0])}/>
          </div>

          {/* Dados extraídos + formulário de revisão */}
          {planData&&(
            <div className="card ca-green fi" style={{padding:"20px 22px"}}>
              <div className="sl" style={{marginBottom:16}}>DADOS EXTRAÍDOS — REVISE ANTES DE CONFIRMAR</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
                <div>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>NOME DA ÁREA</div>
                  <input className="inp" value={planData.nomeArea} onChange={e=>setPlanData(x=>({...x,nomeArea:e.target.value}))}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>CLIENTE</div>
                  <select className="inp" value={planData.cliId} onChange={e=>setPlanData(x=>({...x,cliId:e.target.value}))}>
                    <option value="">— Sem cliente —</option>
                    {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>DATA INÍCIO <span style={{color:"#388bfd"}}>Mobilização</span></div>
                  <input type="date" className="inp" value={planData.dataInicio} onChange={e=>setPlanData(x=>({...x,dataInicio:e.target.value}))}/>
                  <div style={{fontSize:10,color:"#484f58",marginTop:3}}>Planejamento das atividades</div>
                </div>
                <div>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>DATA <span style={{color:"#388bfd"}}>Sondagens</span> (Direct Push / Rotativa)</div>
                  <input type="date" className="inp" value={planData.dataSondagem||""} onChange={e=>setPlanData(x=>({...x,dataSondagem:e.target.value}))}/>
                  <div style={{fontSize:10,color:"#484f58",marginTop:3}}>Execução das sondagens</div>
                </div>
                <div>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>DATA <span style={{color:"#388bfd"}}>Gestão de Lab</span> (Frascaria)</div>
                  <input type="date" className="inp" value={planData.dataLab||""} onChange={e=>setPlanData(x=>({...x,dataLab:e.target.value}))}/>
                  <div style={{fontSize:10,color:"#484f58",marginTop:3}}>Preparação das frascarias</div>
                </div>
                <div>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>DATA <span style={{color:"#388bfd"}}>Relatório Final</span></div>
                  <input type="date" className="inp" value={planData.dataRelatorio||""} onChange={e=>setPlanData(x=>({...x,dataRelatorio:e.target.value}))}/>
                  <div style={{fontSize:10,color:"#484f58",marginTop:3}}>Elaboração do relatório técnico</div>
                </div>
              </div>

              {/* Cronograma extraído do documento */}
              {planData.cronograma&&(
                <div style={{background:"#010409",border:"1px solid #21262d",borderRadius:6,padding:"12px 14px",marginBottom:14}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:10}}>CRONOGRAMA EXTRAÍDO DO DOCUMENTO</div>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr>
                        <th style={{textAlign:"left",padding:"4px 8px",color:"#484f58",fontWeight:600,textTransform:"uppercase",fontSize:10,borderBottom:"1px solid #21262d"}}>ATIVIDADE</th>
                        <th style={{textAlign:"center",padding:"4px 8px",color:"#484f58",fontWeight:600,textTransform:"uppercase",fontSize:10,borderBottom:"1px solid #21262d"}}>INÍCIO</th>
                        <th style={{textAlign:"center",padding:"4px 8px",color:"#484f58",fontWeight:600,textTransform:"uppercase",fontSize:10,borderBottom:"1px solid #21262d"}}>TÉRMINO</th>
                        <th style={{textAlign:"left",padding:"4px 8px",color:"#484f58",fontWeight:600,textTransform:"uppercase",fontSize:10,borderBottom:"1px solid #21262d"}}>USA EM</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        {key:"planejamento",label:"Planejamento das atividades", usa:"Mobilização"},
                        {key:"frascaria",   label:"Preparação das frascarias",  usa:"Gestão de Laboratório"},
                        {key:"sondagem",    label:"Execução das sondagens",     usa:"Direct Push + Rotativa"},
                        {key:"analise",     label:"Análises químicas",          usa:"—"},
                        {key:"relatorio",   label:"Elaboração do relatório",    usa:"Relatório Final"},
                      ].map(({key,label,usa})=>{
                        const c=planData.cronograma[key]||{};
                        return(
                          <tr key={key} style={{borderBottom:"1px solid #161b22"}}>
                            <td style={{padding:"6px 8px",color:"#c9d1d9",fontSize:12}}>{label}</td>
                            <td style={{padding:"6px 8px",textAlign:"center"}}>
                              {c.inicio?<span className="mono" style={{color:"#3fb950",fontSize:11}}>{c.inicio}</span>:<span style={{color:"#30363d",fontSize:11}}>—</span>}
                            </td>

// Meses disponíveis com base nos dados (últimos 24 meses)
const mesesRange = () => {
  const meses = [];
  const d = new Date();
  for(let i=0;i<24;i++){
    const m = new Date(d.getFullYear(), d.getMonth()-i, 1);
    meses.push(`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}`);
  }
  return meses;
};
const fmtMes = ym => {
  if(!ym) return "—";
  const [y,m] = ym.split("-");
  return new Date(+y,+m-1,1).toLocaleDateString("pt-BR",{month:"short",year:"numeric"});
};

// ── Helpers de ciclo de medição ───────────────────────────────────────────
// Gera lista dos últimos `n` ciclos de medição para um dado diaCorte
function ciclosRange(diaCorte, n=18) {
  const dia = parseInt(diaCorte)||1;
  const ciclos = [];
  const ref = new Date();
  // Avança 1 ciclo além do atual para ter o próximo como opção
  for(let i = -1; i < n; i++){
    const refDate = new Date(ref.getFullYear(), ref.getMonth() - i, dia);
    const c = periodoCiclo(dia, refDate.toISOString().slice(0,10));
    // Evitar duplicatas
    if(!ciclos.find(x=>x.inicio===c.inicio)){
      ciclos.push(c);
    }
  }
  return ciclos.sort((a,b)=>b.inicio.localeCompare(a.inicio));
}

// Ciclo atual para um diaCorte
function cicloAtualRef(diaCorte) {
  return periodoCiclo(diaCorte||"1");
}

// Formata label curto de um ciclo
const fmtCicloLabel = (inicio, fim) => {
  if(!inicio||!fim) return "—";
  const [ay,am,ad] = inicio.split("-");
  const [by,bm,bd] = fim.split("-");
  const mesNome = d => new Date(+d[0],+d[1]-1,1).toLocaleDateString("pt-BR",{month:"short"});
  return `${ad}/${mesNome([ay,am])} → ${bd}/${mesNome([by,bm])}/${by}`;
};

// ── Custos Variáveis — Configuração de regras por serviço ────────────────
const CATS_CUSTO_VAR = ["Metro Perfurado","Insumos de Sondagem","Terceiros","Outros"];

function CustosVariaveis({custosVarConfig,setCustosVarConfig,servicos,svcMap,areas,planejado,realizado,clientes,cliAtivo}){
  const [form, setForm] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [viewMode, setViewMode] = useState("config"); // "config" | "preview"
  const [filtroMes, setFiltroMes] = useState(hoje().slice(0,7));

  // Cálculo de custos variáveis PLANEJADOS (baseado em planejado pendente)
  const custosPlanCalc = useMemo(()=>{
    if(!Array.isArray(custosVarConfig)||!custosVarConfig.length) return [];
    const regrasAtivas = custosVarConfig.filter(r=>r.ativo===true||r.ativo===1||r.ativo==="true");
    if(!regrasAtivas.length) return [];
    const result=[];
    const planFilt=(planejado||[]).filter(l=>(!cliAtivo||l.cliId===cliAtivo)&&(l.data||"").slice(0,7)===filtroMes);
    planFilt.forEach(lanc=>{
      regrasAtivas.filter(r=>String(r.sid)===String(lanc.sid)).forEach(regra=>{
        const valor=parseFloat(lanc.qtd||0)*parseFloat(regra.valorPorUnidade||regra.valor_por_unidade||0);
        if(valor>0) result.push({
          _id:`plan_${lanc.id}_${regra.id}`, tipo:"planejado",
          data:lanc.data, sid:lanc.sid, area:lanc.area||"—",
          cat:regra.categoria||"Outros", descricao:`${regra.nome} — ${lanc.area||""}`,
          valor, qtd:parseFloat(lanc.qtd||0), regra:regra.nome,
        });
      });
    });
    return result;
  },[custosVarConfig,planejado,cliAtivo,filtroMes]);

  // Cálculo de custos variáveis CONFIRMADOS (baseado em realizado)
  const custosRealCalc = useMemo(()=>{
    if(!Array.isArray(custosVarConfig)||!custosVarConfig.length) return [];
    const regrasAtivas = custosVarConfig.filter(r=>r.ativo===true||r.ativo===1||r.ativo==="true");
    if(!regrasAtivas.length) return [];
    const result=[];
    const realFilt=(realizado||[]).filter(l=>(!cliAtivo||l.cliId===cliAtivo)&&(l.data||"").slice(0,7)===filtroMes);
    realFilt.forEach(lanc=>{
      regrasAtivas.filter(r=>String(r.sid)===String(lanc.sid)).forEach(regra=>{
        const valor=parseFloat(lanc.qtd||0)*parseFloat(regra.valorPorUnidade||regra.valor_por_unidade||0);
        if(valor>0) result.push({
          _id:`real_${lanc.id}_${regra.id}`, tipo:"confirmado",
          data:lanc.data, sid:lanc.sid, area:lanc.area||"—",
          cat:regra.categoria||"Outros", descricao:`${regra.nome} — ${lanc.area||""}`,
          valor, qtd:parseFloat(lanc.qtd||0), regra:regra.nome,
        });
      });
    });
    return result;
  },[custosVarConfig,realizado,cliAtivo,filtroMes]);

  return(

          <strong style={{color:"#3fb950"}}>{custosVarConfig.filter(r=>r.ativo===true||r.ativo===1||r.ativo==="true").length}</strong> ativa{custosVarConfig.filter(r=>r.ativo===true||r.ativo===1||r.ativo==="true").length!==1?"s":""}</span>

            </div>

        </div>

      {custosVarConfig.length>0&&(

                        {r.ativo?"🟢":"⚪"}
                      </button>
                    </td>
                    <td>
                      {confirmDel===r.id?(
                        <div style={{display:"flex",gap:4}}>

                          <button className="btn btn-ghost btn-xs" onClick={()=>setForm({...r})}>✎</button>

                        </div>
                      )}

                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}


    </div>
    </>)}
    </div>
  );
}
function CustosFixos({custosFixos, setCustosFixos, clientes, cliAtivo}){
  const clienteAtivo = useMemo(()=>clientes.find(c=>c.id===cliAtivo)||null,[clientes,cliAtivo]);
  const diaCorte = clienteAtivo?.diaCorte || "1";
  const ciclos = useMemo(()=>ciclosRange(diaCorte,18),[diaCorte]);
  const cicloDefault = useMemo(()=>cicloAtualRef(diaCorte),[diaCorte]);
  const [cicloInicio, setCicloInicio] = useState(cicloDefault.inicio);
  useEffect(()=>{ const c=cicloAtualRef(diaCorte); setCicloInicio(c.inicio); },[diaCorte]);
  const cicloSel = useMemo(()=>ciclos.find(c=>c.inicio===cicloInicio)||ciclos[0]||cicloDefault,[ciclos,cicloInicio,cicloDefault]);

  const [form, setForm] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  // Inline confirmation: track which row is being confirmed
  const [confirmReal, setConfirmReal] = useState(null); // {id, valor}
  // Recurrence modal
  const [recorrModal, setRecorrModal] = useState(null); // {item, meses}

  const emptyForm = ()=>({
    cat:CATS_CUSTO[0], descricao:"", valor:"", valorRealizado:"",
    cicloInicio: cicloSel.inicio, cicloFim: cicloSel.fim,
    mes: cicloSel.inicio.slice(0,7),
  });

  const doFiltro = useMemo(()=>custosFixos.filter(c=>{
    if(c.cicloInicio) return c.cicloInicio===cicloSel.inicio;
    return c.mes===cicloSel.inicio.slice(0,7);
  }),[custosFixos,cicloSel]);

  const valorEfetivo = c => parseFloat(c.valorRealizado||"") || parseFloat(c.valor||0);
  const totalCicloPlano     = useMemo(()=>doFiltro.reduce((s,c)=>s+parseFloat(c.valor||0),0),[doFiltro]);
  const totalCicloRealizado = useMemo(()=>doFiltro.reduce((s,c)=>s+valorEfetivo(c),0),[doFiltro]);
  const temDivergencia = doFiltro.some(c=>c.valorRealizado&&parseFloat(c.valorRealizado)!==parseFloat(c.valor||0));

  const porCat = useMemo(()=>{
    const r={}; CATS_CUSTO.forEach(k=>r[k]=0);
    doFiltro.forEach(c=>r[c.cat]=(r[c.cat]||0)+valorEfetivo(c));
    return r;
  },[doFiltro]);

  const salvar=()=>{
    if(!form.descricao||!form.valor) return;
    const item={...form, cicloInicio:cicloSel.inicio, cicloFim:cicloSel.fim, mes:cicloSel.inicio.slice(0,7)};
    if(form.id){ setCustosFixos(a=>a.map(x=>x.id===form.id?{...item}:x)); }
    else        { setCustosFixos(a=>[{...item,id:uid()},...a]); }
    setForm(null);
  };
  const del=id=>{setCustosFixos(a=>a.filter(x=>x.id!==id));setConfirmDel(null);};

  // Inline confirm realizado
  const confirmarReal=(id, valor)=>{
    setCustosFixos(a=>a.map(x=>x.id===id?{...x,valorRealizado:String(valor)}:x));
    setConfirmReal(null);
  };

  // Recorrência: replica item para N ciclos futuros
  const aplicarRecorrencia=(item, nMeses)=>{
    const dia=parseInt(diaCorte)||1;
    const [y,m,d]=item.cicloInicio.split("-").map(Number);
    const novos=[];
    for(let i=1;i<=nMeses;i++){
      const dataRef=new Date(y,m-1+i,dia);
      const c=periodoCiclo(dia, dataRef.toISOString().slice(0,10));
      // Não duplicar se já existe no mesmo ciclo com mesma descrição
      const jaExiste=custosFixos.some(x=>x.cicloInicio===c.inicio&&x.descricao===item.descricao&&x.cat===item.cat);
      if(!jaExiste){
        novos.push({...item, id:uid(), cicloInicio:c.inicio, cicloFim:c.fim, mes:c.inicio.slice(0,7), valorRealizado:""});
      }
    }
    if(novos.length) setCustosFixos(a=>[...a,...novos]);
    setRecorrModal(null);
  };

  return(
    <div style={{display:"grid",gap:16}}>
      {/* Seletor de ciclo + botão */}
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CICLO DE MEDIÇÃO</div>
          <select className="inp" style={{width:240}} value={cicloInicio} onChange={e=>setCicloInicio(e.target.value)}>
            {ciclos.map(c=><option key={c.inicio} value={c.inicio}>{c.label}</option>)}
          </select>

            ?<div style={{fontSize:10,color:"#484f58",marginTop:3}}>Dia de corte: <span style={{color:"#d29922"}}>{diaCorte}</span> — {clienteAtivo.nome}</div>

          }
        </div>
        <div style={{marginTop:14}}>
          <button className="btn btn-primary" onClick={()=>setForm(emptyForm())}>+ Novo custo fixo</button>
        </div>
        {(totalCicloPlano>0||totalCicloRealizado>0)&&(
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:10,color:"#484f58"}}>CICLO {cicloSel.label}</div>
            <div style={{display:"flex",gap:16,justifyContent:"flex-end",marginTop:4}}>
              <div>
                <div style={{fontSize:10,color:"#388bfd"}}>PLANEJADO</div>

              </div>
              <div>
                <div style={{fontSize:10,color:"#3fb950"}}>REALIZADO</div>
                <div className="mono" style={{fontSize:16,fontWeight:600,color:"#3fb950"}}>R$ {fmt(totalCicloRealizado)}</div>
              </div>
            </div>
            {temDivergencia&&(
              <div style={{fontSize:10,color:"#484f58",marginTop:2}}>
                Variação: <span className="mono" style={{color:totalCicloRealizado>totalCicloPlano?"#f85149":"#3fb950"}}>
                  {totalCicloRealizado>totalCicloPlano?"+":""}{fmt(totalCicloRealizado-totalCicloPlano)}
                </span>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Breakdown por categoria */}
      {totalCicloRealizado>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
          {CATS_CUSTO.filter(k=>porCat[k]>0).map(k=>{
            const c=CAT_COR[k]||CAT_COR["Outros"];
            const pct=totalCicloRealizado>0?(porCat[k]/totalCicloRealizado*100):0;
            return(
              <div key={k} className="card" style={{padding:"12px 14px",borderTop:`2px solid ${c.fg}`}}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>{k.toUpperCase()}</div>
                <div className="mono" style={{fontWeight:600,color:c.fg,fontSize:14}}>R$ {fmt(porCat[k])}</div>
                <div style={{fontSize:10,color:"#484f58",marginTop:4}}>{pct.toFixed(0)}% do total</div>
                <div className="pt" style={{marginTop:6}}><div className="pf" style={{width:`${pct}%`,background:c.fg}}/></div>
              </div>
            );
          })}
        </div>
      )}

      {/* Formulário inline novo/editar */}
      {form&&(
        <div className="card ca-red" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:4}}>{form.id?"EDITAR":"NOVO"} CUSTO FIXO — {cicloSel.label}</div>
          <div style={{fontSize:11,color:"#484f58",marginBottom:12}}>
            Preencha o valor <strong style={{color:"#388bfd"}}>Planejado</strong> ao criar.
            O <strong style={{color:"#3fb950"}}>Realizado</strong> pode ser confirmado diretamente na tabela.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:10,alignItems:"end"}}>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CATEGORIA</div>
              <select className="inp" value={form.cat} onChange={e=>setForm(x=>({...x,cat:e.target.value}))}>
                {CATS_CUSTO.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>DESCRIÇÃO *</div>
              <input className="inp" placeholder="Ex: Salário equipe técnica" value={form.descricao} onChange={e=>setForm(x=>({...x,descricao:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#388bfd",marginBottom:4}}>VALOR PLANEJADO (R$) *</div>
              <input type="number" className="inp" style={{borderColor:"#388bfd55"}} placeholder="0,00" min="0" step="0.01" value={form.valor} onChange={e=>setForm(x=>({...x,valor:e.target.value}))}/>
            </div>

            <tbody>
              {doFiltro.sort((a,b)=>a.cat.localeCompare(b.cat)).map(c=>{
                const plan = parseFloat(c.valor||0);

                const temReal = !!c.valorRealizado;
                const var_ = real - plan;
                const isConfirmando = confirmReal?.id===c.id;
                return(
                  <tr key={c.id}>

                            autoFocus onKeyDown={e=>{ if(e.key==="Enter") confirmarReal(c.id,confirmReal.valor); if(e.key==="Escape") setConfirmReal(null); }}

                            </div>

                    <td className="mono" style={{textAlign:"right"}}>
                      {temReal&&var_!==0

}

    if(filtroStatus) list = list.filter(c=>(c.status||"realizado")===filtroStatus);

  const totalPlan  = useMemo(()=>custosFilt.filter(c=>(c.status||"realizado")==="planejado").reduce((s,c)=>s+parseFloat(c.valor||0),0),[custosFilt]);
  const totalReal  = useMemo(()=>custosFilt.filter(c=>(c.status||"realizado")==="realizado").reduce((s,c)=>s+parseFloat(c.valor||0),0),[custosFilt]);

  const meses = useMemo(()=>{
    const s=new Set(custosPontuais.map(c=>(c.data||"").slice(0,7)).filter(Boolean));

// ── Custos por Área ──────────────────────────────────────────────────────
function CustosPorArea({custosArea,setCustosArea,areas,clientes,cliAtivo,custosVarConfig,realizado,svcMap}){
  const areasFilt = useMemo(()=>cliAtivo?areas.filter(a=>a.cliId===cliAtivo):areas,[areas,cliAtivo]);
  const [areaId,setAreaId] = useState("_todas_");
  const [form,setForm]     = useState(null);
  const [confirmDel,setConfirmDel] = useState(null);

  const verTodas  = areaId === "_todas_";
  const areaAtual = useMemo(()=>areasFilt.find(a=>a.id===areaId)||null,[areasFilt,areaId]);

  // Custos manuais filtrados
  const custosFilt = useMemo(()=>{
    if(verTodas) return custosArea.filter(c=>c.areaId&&areasFilt.some(a=>a.id===c.areaId));
    return areaAtual?custosArea.filter(c=>c.areaId===areaAtual.id):[];
  },[custosArea,areasFilt,areaAtual,verTodas]);

  const totalManual = useMemo(()=>custosFilt.reduce((s,c)=>s+parseFloat(c.valor||0),0),[custosFilt]);

  // Custos variáveis calculados para a área (ou todas)
  const custosVar = useMemo(()=>{
    if(!Array.isArray(custosVarConfig)||!custosVarConfig.length) return [];
    const regrasAtivas = custosVarConfig.filter(r=>r.ativo===true||r.ativo===1||r.ativo==="true");
    if(!regrasAtivas.length) return [];
    const result=[];
    (realizado||[]).forEach(lanc=>{
      const area = areas.find(a=>a.id===lanc.areaId||(a.nome||"").toUpperCase()===(lanc.area||"").toUpperCase());
      if(!area) return;
      if(!verTodas && area.id!==areaAtual?.id) return;
      if(!areasFilt.some(a=>a.id===area.id)) return;
      regrasAtivas.filter(r=>String(r.sid)===String(lanc.sid)).forEach(regra=>{
        const valor=parseFloat(lanc.qtd||0)*parseFloat(regra.valorPorUnidade||regra.valor_por_unidade||0);
        if(valor>0) result.push({
          _id:`${lanc.id}_${regra.id}`,
          areaId:area.id, areaNome:area.nome,
          data:lanc.data, cat:regra.categoria||"Insumos de Sondagem",
          descricao:`${regra.nome} — ${lanc.area||area.nome}`, valor,
        });
      });
    });
    return result.sort((a,b)=>(a.data||"").localeCompare(b.data||""));
  },[custosVarConfig,realizado,areas,areasFilt,areaAtual,verTodas]);

  const totalVar   = useMemo(()=>custosVar.reduce((s,c)=>s+c.valor,0),[custosVar]);
  const totalGeral = totalManual+totalVar;

  // Totais por área para a view consolidada
  const totaisPorArea = useMemo(()=>{
    const m={};
    areasFilt.forEach(a=>{
      const man=custosArea.filter(c=>c.areaId===a.id).reduce((s,c)=>s+parseFloat(c.valor||0),0);
      const vari=custosVar.filter(c=>c.areaId===a.id).reduce((s,c)=>s+c.valor,0);
      m[a.id]={man,vari,total:man+vari};
    });
    return m;
  },[custosArea,custosVar,areasFilt]);

  const custosOrfaos = useMemo(()=>custosArea.filter(c=>!c.areaId),[custosArea]);
  const totalOrfaos  = useMemo(()=>custosOrfaos.reduce((s,c)=>s+parseFloat(c.valor||0),0),[custosOrfaos]);

  const emptyForm=()=>({cat:CATS_CUSTO[0],descricao:"",valor:"",data:hoje(),areaId:areaAtual?.id||""});
  const salvar=()=>{
    if(!form.descricao||!form.valor||!areaAtual) return;
    const item={...form,areaId:areaAtual.id};
    if(form.id) setCustosArea(a=>a.map(x=>x.id===form.id?item:x));
    else         setCustosArea(a=>[{...item,id:uid()},...a]);
    setForm(null);
  };
  const del=id=>{setCustosArea(a=>a.filter(x=>x.id!==id));setConfirmDel(null);};

  return(
    <div style={{display:"grid",gap:16}}>
      {/* Seletor */}
      <div style={{display:"flex",alignItems:"flex-end",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>ÁREA</div>
          <select className="inp" value={areaId} onChange={e=>{setAreaId(e.target.value);setForm(null);}}>
            <option value="_todas_">⊞ Todas as áreas</option>
            {areasFilt.length===0&&<option disabled>— Nenhuma área cadastrada —</option>}
            {areasFilt.map(a=>{
              const cli=clientes.find(c=>c.id===a.cliId);
              return <option key={a.id} value={a.id}>{a.nome}{cli?` (${cli.nome})`:""}</option>;
            })}
          </select>
        </div>
        {!verTodas&&areaAtual&&(
          <button className="btn btn-primary" onClick={()=>setForm(emptyForm())}>+ Novo custo</button>
        )}
        {totalGeral>0&&(
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:10,color:"#484f58"}}>{verTodas?"TOTAL GERAL":"TOTAL DA ÁREA"}</div>
            <div className="mono" style={{fontSize:20,fontWeight:600,color:"#f85149"}}>R$ {fmt(totalGeral)}</div>
            {totalVar>0&&<div style={{fontSize:11,color:"#8957e5"}}>R$ {fmt(totalVar)} variáveis</div>}
          </div>
        )}
      </div>

      {areasFilt.length===0&&(
        <div className="card" style={{padding:"40px 20px",textAlign:"center",color:"#484f58"}}>
          <div style={{fontSize:13,color:"#8b949e"}}>Nenhuma área cadastrada. Crie áreas na aba <span style={{color:"#388bfd"}}>Áreas</span> primeiro.</div>
        </div>
      )}

      {/* VIEW CONSOLIDADA */}
      {verTodas&&areasFilt.length>0&&(
        <div style={{display:"grid",gap:12}}>
          {areasFilt.map(a=>{
            const t=totaisPorArea[a.id]||{man:0,vari:0,total:0};
            if(t.total===0) return null;
            const cli=clientes.find(c=>c.id===a.cliId);
            const custosM=custosArea.filter(c=>c.areaId===a.id).sort((x,y)=>(x.data||"").localeCompare(y.data||""));
            const custosV=custosVar.filter(c=>c.areaId===a.id);
            return(
              <div key={a.id} className="card" style={{padding:"14px 18px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:600,color:"#c9d1d9"}}>{a.nome}</span>
                    {cli&&<span className="badge bb">{cli.nome}</span>}
                    <button className="btn btn-ghost btn-xs" onClick={()=>setAreaId(a.id)}>Editar</button>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="mono" style={{color:"#f85149",fontWeight:700}}>R$ {fmt(t.total)}</div>
                    {t.vari>0&&<div style={{fontSize:11,color:"#8957e5"}}>R$ {fmt(t.vari)} variáveis</div>}
                  </div>
                </div>
                {custosV.length>0&&(
                  <table className="table" style={{marginBottom:8}}>
                    <thead><tr><th>DATA</th><th>CATEGORIA</th><th>DESCRIÇÃO</th><th style={{textAlign:"right",color:"#8957e5"}}>VARIÁVEL</th></tr></thead>
                    <tbody>
                      {custosV.map(c=>(
                        <tr key={c._id}>
                          <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{c.data||"—"}</td>
                          <td><span className="badge bp">{c.cat}</span></td>
                          <td style={{color:"#c9d1d9",fontSize:12}}>{c.descricao}</td>
                          <td className="mono" style={{textAlign:"right",color:"#8957e5",fontWeight:600}}>R$ {fmt(c.valor)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
                {custosM.length>0&&(
                  <table className="table">
                    <thead><tr><th>DATA</th><th>CATEGORIA</th><th>DESCRIÇÃO</th><th style={{textAlign:"right"}}>MANUAL</th></tr></thead>
                    <tbody>
                      {custosM.map(c=>(
                        <tr key={c.id}>
                          <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{c.data||"—"}</td>
                          <td>{catBadge(c.cat)}</td>
                          <td style={{color:"#c9d1d9",fontSize:12}}>{c.descricao}</td>
                          <td className="mono" style={{textAlign:"right",color:"#f85149",fontWeight:600}}>R$ {fmt(c.valor)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            );
          })}
          {areasFilt.every(a=>!(totaisPorArea[a.id]?.total>0))&&(
            <div className="card" style={{padding:"40px 20px",textAlign:"center",color:"#484f58"}}>
              <div style={{fontSize:13,color:"#8b949e"}}>Nenhum custo lançado. Selecione uma área específica para adicionar.</div>
            </div>
          )}
        </div>
      )}

      {/* FORMULÁRIO área individual */}
      {!verTodas&&form&&areaAtual&&(
        <div className="card ca-red" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>{form.id?"EDITAR":"NOVO"} CUSTO — {areaAtual.nome}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr auto",gap:10,alignItems:"end"}}>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CATEGORIA</div>
              <select className="inp" value={form.cat} onChange={e=>setForm(x=>({...x,cat:e.target.value}))}>
                {CATS_CUSTO.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>DESCRIÇÃO *</div>
              <input className="inp" placeholder="Ex: Frete equipamento" value={form.descricao} onChange={e=>setForm(x=>({...x,descricao:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>VALOR (R$) *</div>
              <input type="number" className="inp" placeholder="0,00" min="0" step="0.01" value={form.valor} onChange={e=>setForm(x=>({...x,valor:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>DATA</div>
              <input type="date" className="inp" value={form.data} onChange={e=>setForm(x=>({...x,data:e.target.value}))}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button className="btn btn-success btn-sm" onClick={salvar} disabled={!form.descricao||!form.valor}>✓</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setForm(null)}>✕</button>
            </div>
          </div>
        </div>
      )}

      {/* ÁREA INDIVIDUAL — variáveis */}
      {!verTodas&&custosVar.length>0&&(
        <div className="card" style={{padding:"14px 18px",borderTop:"2px solid #8957e5"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div className="sl" style={{color:"#8957e5"}}>CUSTOS VARIÁVEIS — calculados pelas regras</div>
            <div className="mono" style={{color:"#8957e5",fontWeight:700}}>R$ {fmt(totalVar)}</div>
          </div>
          <table className="table">
            <thead><tr><th>DATA</th><th>CATEGORIA</th><th>DESCRIÇÃO</th><th style={{textAlign:"right"}}>VALOR</th></tr></thead>
            <tbody>
              {custosVar.map(c=>(
                <tr key={c._id}>
                  <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{c.data||"—"}</td>
                  <td><span className="badge bp">{c.cat}</span></td>
                  <td style={{color:"#c9d1d9",fontSize:12}}>{c.descricao}</td>
                  <td className="mono" style={{textAlign:"right",color:"#8957e5",fontWeight:600}}>R$ {fmt(c.valor)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* ÁREA INDIVIDUAL — manuais */}
      {!verTodas&&areaAtual&&custosFilt.length===0&&custosVar.length===0&&!form&&(
        <div className="card" style={{padding:"40px 20px",textAlign:"center",color:"#484f58"}}>
          <div style={{fontSize:13,color:"#8b949e",marginBottom:8}}>Nenhum custo para <strong style={{color:"#c9d1d9"}}>{areaAtual.nome}</strong></div>
          <button className="btn btn-primary btn-sm" onClick={()=>setForm(emptyForm())}>+ Adicionar custo</button>
        </div>
      )}

      {!verTodas&&custosFilt.length>0&&(
        <div className="card" style={{padding:"14px 18px"}}>
          <div className="sl" style={{marginBottom:10}}>CUSTOS MANUAIS</div>
          <table className="table">
            <thead><tr><th>DATA</th><th>CATEGORIA</th><th>DESCRIÇÃO</th><th style={{textAlign:"right"}}>VALOR</th><th/></tr></thead>
            <tbody>
              {custosFilt.sort((a,b)=>(a.data||"").localeCompare(b.data||"")).map(c=>(
                <tr key={c.id}>
                  <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{c.data||"—"}</td>
                  <td>{catBadge(c.cat)}</td>
                  <td style={{color:"#c9d1d9"}}>{c.descricao}</td>
                  <td className="mono" style={{textAlign:"right",color:"#f85149",fontWeight:600}}>R$ {fmt(c.valor)}</td>
                  <td style={{width:80}}>
                    {confirmDel===c.id
                      ?<div style={{display:"flex",gap:4}}><button className="btn btn-danger btn-xs" onClick={()=>del(c.id)}>✓</button><button className="btn btn-ghost btn-xs" onClick={()=>setConfirmDel(null)}>✕</button></div>
                      :<div style={{display:"flex",gap:4}}><button className="btn btn-ghost btn-xs" onClick={()=>setForm({...c})}>✎</button><button className="btn btn-danger btn-xs" onClick={()=>setConfirmDel(c.id)}>✕</button></div>
                    }
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Sem área vinculada */}
      {custosOrfaos.length>0&&(
        <div className="card ca-orange" style={{padding:"14px 18px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div className="sl" style={{marginBottom:2}}>SEM ÁREA VINCULADA</div>
              <div style={{fontSize:11,color:"#484f58"}}>Área não identificada no lançamento.</div>
            </div>
            <div className="mono" style={{color:"#f85149",fontWeight:700,fontSize:16}}>R$ {fmt(totalOrfaos)}</div>
          </div>
          <table className="table">
            <thead><tr><th>DATA</th><th>CATEGORIA</th><th>DESCRIÇÃO</th><th style={{textAlign:"right"}}>VALOR</th><th/></tr></thead>
            <tbody>
              {custosOrfaos.sort((a,b)=>(b.data||"").localeCompare(a.data||"")).map(c=>(
                <tr key={c.id}>
                  <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{c.data||"—"}</td>
                  <td>{catBadge(c.cat)}</td>
                  <td style={{color:"#c9d1d9"}}>{c.descricao}</td>
                  <td className="mono" style={{textAlign:"right",color:"#f85149",fontWeight:600}}>R$ {fmt(c.valor)}</td>
                  <td style={{width:120}}>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      <select style={{background:"#0d1117",border:"1px solid #30363d",color:"#484f58",borderRadius:4,padding:"2px 6px",fontSize:10,cursor:"pointer"}}
                        value="" onChange={e=>{ if(!e.target.value) return; setCustosArea(a=>a.map(x=>x.id===c.id?{...x,areaId:e.target.value}:x)); }}>
                        <option value="">Vincular área…</option>
                        {areas.map(a=><option key={a.id} value={a.id}>{a.nome}</option>)}
                      </select>
                      <button className="btn btn-danger btn-xs" onClick={()=>setCustosArea(a=>a.filter(x=>x.id!==c.id))}>✕</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── Gráfico de Resultado Planejado × Realizado ───────────────────────────
function GraficoResultado({dadosMeses, altura=240}){
  if(!dadosMeses||!dadosMeses.length) return(
    <div style={{height:altura,display:"flex",alignItems:"center",justifyContent:"center",color:"#484f58",fontSize:12}}>
      Sem dados históricos suficientes para o gráfico
    </div>
  );
  const maxVal = Math.max(...dadosMeses.map(d=>Math.max(d.receitaReal||0,d.custoPlan||0,d.custoReal||0,d.margemReal||0)),1);
  const minVal = Math.min(...dadosMeses.map(d=>d.margemReal||0),0);
  const range = maxVal - minVal;
  const W=700, H=altura, PAD={top:24,right:20,bottom:52,left:80};
  const plotW=W-PAD.left-PAD.right;
  const plotH=H-PAD.top-PAD.bottom;
  const n=dadosMeses.length;
  const groupW=plotW/n;
  const barW=Math.min(groupW*0.28,26);
  const gap=barW*0.4;
  const y=v=>PAD.top+plotH*(1-(v-minVal)/range);
  const xGroup=i=>PAD.left+i*groupW+groupW/2;
  const ticks=5;
  const gridLines=Array.from({length:ticks+1},(_,i)=>minVal+i*(range/ticks));
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:altura,overflow:"visible"}}>
      {gridLines.map((v,i)=>(
        <g key={i}>
          <line x1={PAD.left} y1={y(v)} x2={W-PAD.right} y2={y(v)} stroke={v===0?"#3fb95033":"#21262d"} strokeWidth={v===0?"1.5":"1"}/>
          <text x={PAD.left-6} y={y(v)+4} textAnchor="end" fontSize="10" fill="#484f58" fontFamily="IBM Plex Mono">
            {Math.abs(v)>=1000?`${(v/1000).toFixed(0)}k`:v.toFixed(0)}
          </text>
        </g>
      ))}
      <line x1={PAD.left} y1={y(0)} x2={W-PAD.right} y2={y(0)} stroke="#30363d" strokeWidth="1"/>
      {dadosMeses.map((d,i)=>{
        const cx=xGroup(i);
        const x1=cx-gap*1.5-barW*1.5;
        const x2=cx-gap*0.5-barW*0.5;
        const x3=cx+gap*0.5;
        const x4=cx+gap*1.5+barW*0.5;
        const isAtual=d.m===hoje().slice(0,7);
        const mkBar=(x,v,color,dash=false)=>{
          if(!v&&v!==0) return null;
          const y0=y(Math.max(v,0)); const y1t=y(Math.min(v,0));
          const h=Math.abs(y1t-y0)||2;
          return <rect x={x} y={y0} width={barW} height={h} rx="2" fill={color} opacity={isAtual?1:.7}
            strokeDasharray={dash?"3 2":""} stroke={dash?color+"":" "}/>;
        };
        return(
          <g key={d.m}>
            {mkBar(x1,d.receitaPlan,"#388bfd88")}
            {mkBar(x2,d.receitaReal,"#388bfd")}
            {mkBar(x3,d.custoReal,"#f85149")}
            {d.margemReal!==undefined&&mkBar(x4,d.margemReal,d.margemReal>=0?"#3fb950":"#f8514988")}
            <text x={cx} y={H-PAD.bottom+14} textAnchor="middle" fontSize="10" fill={isAtual?"#c9d1d9":"#484f58"} fontFamily="IBM Plex Mono">
              {d.m.slice(5)}
            </text>
            {isAtual&&<rect x={cx-groupW/2} y={PAD.top} width={groupW} height={plotH} fill="#388bfd08" rx="2"/>}
          </g>
        );
      })}
      <g transform={`translate(${PAD.left},${H-10})`}>
        <rect x="0" y="-8" width="10" height="10" rx="2" fill="#388bfd88"/><text x="14" y="0" fontSize="9" fill="#8b949e" fontFamily="IBM Plex Sans">Receita Plan.</text>
        <rect x="90" y="-8" width="10" height="10" rx="2" fill="#388bfd"/><text x="104" y="0" fontSize="9" fill="#8b949e" fontFamily="IBM Plex Sans">Receita Real.</text>
        <rect x="185" y="-8" width="10" height="10" rx="2" fill="#f85149"/><text x="199" y="0" fontSize="9" fill="#8b949e" fontFamily="IBM Plex Sans">Custo Real.</text>
        <rect x="270" y="-8" width="10" height="10" rx="2" fill="#3fb950"/><text x="284" y="0" fontSize="9" fill="#8b949e" fontFamily="IBM Plex Sans">Margem</text>
      </g>
    </svg>
  );
}

// ── Resultado (Receita − Custos = Margem) — por ciclo de medição ─────────
function Resultado({custosFixos,custosArea,custosPontuais,areas,realizado,planejado,svcMap,clientes,cliAtivo,custosVarConfig}){
  const clienteAtivo = useMemo(()=>clientes.find(c=>c.id===cliAtivo)||null,[clientes,cliAtivo]);
  const diaCorte = clienteAtivo?.diaCorte||"1";
  const ciclos = useMemo(()=>ciclosRange(diaCorte,18),[diaCorte]);
  const cicloDefault = useMemo(()=>cicloAtualRef(diaCorte),[diaCorte]);
  const [cicloInicio,setCicloInicio] = useState(cicloDefault.inicio);
  useEffect(()=>{ setCicloInicio(cicloAtualRef(diaCorte).inicio); },[diaCorte]);
  const cicloSel = useMemo(()=>ciclos.find(c=>c.inicio===cicloInicio)||ciclos[0]||cicloDefault,[ciclos,cicloInicio,cicloDefault]);

  // Helper: calc receita de um intervalo a partir de realizados
  const calcReceita=(ini,fim,listReal)=>{
    let tot=0;
    listReal.filter(l=>l.data&&l.data>=ini&&l.data<=fim&&(!cliAtivo||l.cliId===cliAtivo))
      .forEach(l=>{ tot+=(svcMap[l.sid]?.valor||0)*parseFloat(l.qtd||0); });
    return tot;
  };
  const calcReceitaPlan=(ini,fim,listPlan)=>{
    let tot=0;
    listPlan.filter(l=>l.data&&l.data>=ini&&l.data<=fim&&(!cliAtivo||l.cliId===cliAtivo))
      .forEach(l=>{ tot+=(svcMap[l.sid]?.valor||0)*parseFloat(l.qtd||0); });
    return tot;
  };

  // Receita do ciclo por cliente (realizado)
  const receitaPorCli = useMemo(()=>{
    const r={};
    realizado
      .filter(l=>l.data&&l.data>=cicloSel.inicio&&l.data<=cicloSel.fim&&(!cliAtivo||l.cliId===cliAtivo))
      .forEach(l=>{ r[l.cliId]=(r[l.cliId]||0)+(svcMap[l.sid]?.valor||0)*parseFloat(l.qtd||0); });
    return r;
  },[realizado,svcMap,cicloSel,cliAtivo]);
  const receitaTotal = useMemo(()=>Object.values(receitaPorCli).reduce((s,v)=>s+v,0),[receitaPorCli]);

  // Receita planejada do ciclo
  const receitaPlanTotal = useMemo(()=>calcReceitaPlan(cicloSel.inicio,cicloSel.fim,planejado||[]),[planejado,cicloSel,cliAtivo,svcMap]);

  // Custos fixos do ciclo
  const fixosCiclo = useMemo(()=>custosFixos.filter(c=>c.cicloInicio?c.cicloInicio===cicloSel.inicio:c.mes===cicloSel.inicio.slice(0,7)),[custosFixos,cicloSel]);
  const totalFixoReal  = useMemo(()=>fixosCiclo.reduce((s,c)=>s+(parseFloat(c.valorRealizado||"")||parseFloat(c.valor||0)),0),[fixosCiclo]);
  const totalFixoPlan  = useMemo(()=>fixosCiclo.reduce((s,c)=>s+parseFloat(c.valor||0),0),[fixosCiclo]);

  // Custos manuais por área do ciclo
  const custosAreaCiclo = useMemo(()=>custosArea.filter(c=>c.data&&c.data>=cicloSel.inicio&&c.data<=cicloSel.fim),[custosArea,cicloSel]);

  // Custos variáveis calculados: regras × realizados do ciclo
  const custosVarCiclo = useMemo(()=>{
    if(!Array.isArray(custosVarConfig)||!custosVarConfig.length) return [];
    const regrasAtivas = custosVarConfig.filter(r=>r.ativo===true||r.ativo===1||r.ativo==="true");
    if(!regrasAtivas.length) return [];
    const result=[];
    realizado
      .filter(l=>l.data&&l.data>=cicloSel.inicio&&l.data<=cicloSel.fim&&(!cliAtivo||l.cliId===cliAtivo))
      .forEach(lanc=>{
        regrasAtivas.filter(r=>String(r.sid)===String(lanc.sid)).forEach(regra=>{
          const valor=parseFloat(lanc.qtd||0)*parseFloat(regra.valorPorUnidade||regra.valor_por_unidade||0);
          if(valor>0){
            let areaId=lanc.areaId||null;
            if(!areaId&&lanc.area){ const a=areas.find(a=>(a.nome||"").toUpperCase()===(lanc.area||"").toUpperCase()); if(a) areaId=a.id; }
            result.push({areaId, cliId:lanc.cliId, valor});
          }
        });
      });
    return result;
  },[custosVarConfig,realizado,cicloSel,cliAtivo,areas]);
  const totalVar = useMemo(()=>custosVarCiclo.reduce((s,c)=>s+c.valor,0),[custosVarCiclo]);
