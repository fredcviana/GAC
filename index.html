//  SONDAGEM
// ═══════════════════════════════════════════════════════════════════════════
function Sondagem({planejado,setPlanejado,realizado,setRealizado,servicos,svcMap,clientes,cliAtivo}){
  const [sub,setSub]=useState("planejado");
  return(
    <div style={{display:"grid",gap:16}}>
      <div style={{display:"flex",gap:4,background:"#0d1117",padding:4,borderRadius:8,border:"1px solid #21262d",width:"fit-content"}}>
        {["planejado","realizado"].map(s=>(
          <button key={s} onClick={()=>setSub(s)} style={{padding:"6px 20px",borderRadius:6,border:"none",cursor:"pointer",background:sub===s?"#21262d":"transparent",color:sub===s?"#c9d1d9":"#484f58",fontWeight:sub===s?600:400,transition:"all .15s"}}>
            {s==="planejado"?"▦ Planejado":"▶ Realizado"}
          </button>
        ))}
      </div>
      {sub==="planejado"
        ?<LancList
            label="PLANEJADO"
            itens={planejado}
            setItens={setPlanejado}
            servicos={servicos} svcMap={svcMap}
            clientes={clientes} cliAtivo={cliAtivo}
            ac="ca-blue" bc="btn-primary"
            isRealizado={false}
            planejado={[]}
          />
        :<LancList
            label="REALIZADO"
            itens={realizado}
            setItens={setRealizado}
            servicos={servicos} svcMap={svcMap}
            clientes={clientes} cliAtivo={cliAtivo}
            ac="ca-green" bc="btn-success"
            isRealizado={true}
            planejado={planejado}
          />
      }
    </div>
  );
}

function newLinhaVazia(svcF, cliAtivo){
  return {data:hoje(),area:"",sid:svcF[0]?.id||"",qtd:"",obs:"",cliId:cliAtivo||""};
}

// Modal para confirmar realização de um item planejado
function ModalConfirmar({plan,svcMap,clientes,onConfirmar,onCancelar}){
  const s=svcMap[plan.sid]||{};
  const [f,setF]=useState({
    data:hoje(),
    qtd:String(plan.qtd),
    obs:plan.obs||"",
    area:plan.area||"",
    cliId:plan.cliId||"",
  });
  const cor=COR[plan.sid]||"#388bfd";
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"#000a"}}>
      <div className="card" style={{width:520,padding:"22px 24px",border:"1px solid #388bfd44",boxShadow:"0 8px 40px #000a"}}>
        <div style={{marginBottom:16}}>
          <div className="sl" style={{marginBottom:6}}>CONFIRMAR REALIZAÇÃO</div>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"#080b0f",borderRadius:6,border:"1px solid #21262d"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:"#388bfd",flexShrink:0}}/>
            <span style={{fontSize:12,color:"#8b949e",minWidth:72}}>{plan.data}</span>
            {plan.area&&<span className="badge bg">{plan.area}</span>}
            <span style={{flex:1,fontSize:12,color:cor}}>{s.nome||plan.sid}</span>
            <span className="mono" style={{fontSize:11,color:"#484f58"}}>{plan.qtd} {s.unidade}</span>
            <span className="badge bb">Planejado</span>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>DATA DE REALIZAÇÃO</div>
            <input type="date" className="inp" value={f.data} onChange={e=>setF(x=>({...x,data:e.target.value}))}/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#3fb950",marginBottom:4}}>QTDE REALIZADA ★</div>
            <input type="number" className="inp" style={{borderColor:"#3fb95066"}} placeholder={`Planejado: ${plan.qtd}`} min="0" step="0.5" value={f.qtd} onChange={e=>setF(x=>({...x,qtd:e.target.value}))} autoFocus/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>ÁREA</div>
            <input className="inp" value={f.area} onChange={e=>setF(x=>({...x,area:e.target.value}))}/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>
            <select className="inp" value={f.cliId} onChange={e=>setF(x=>({...x,cliId:e.target.value}))}>
              <option value="">— Sem cliente —</option>
              {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>OBSERVAÇÃO</div>
            <input className="inp" placeholder="Opcional" value={f.obs} onChange={e=>setF(x=>({...x,obs:e.target.value}))}/>
          </div>
        </div>

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button className="btn btn-ghost" onClick={onCancelar}>Cancelar</button>
          <button className="btn btn-success" onClick={()=>{
            if(!f.qtd||!f.data)return;
            onConfirmar({...f,qtd:parseFloat(f.qtd),sid:plan.sid,planId:plan.id,id:uid()});
          }}>✓ Confirmar Realização</button>
        </div>
      </div>
    </div>
  );
}

function LancList({label,itens,setItens,servicos,svcMap,clientes,cliAtivo,ac,bc,isRealizado,planejado}){
  const svcF=servicos;
  const emptyLinha=()=>newLinhaVazia(svcF,cliAtivo);

  const [linhas,setLinhas]=useState([emptyLinha()]);
  const [modalPlan,setModalPlan]=useState(null); // item planejado sendo confirmado
  const [filtroArea,setFiltroArea]=useState("");
  const [filtroStatus,setFiltroStatus]=useState("todos"); // "todos"|"pendentes"|"realizados"

  useEffect(()=>{
    setLinhas(ls=>ls.map(l=>({...l,cliId:cliAtivo||""})));
  },[cliAtivo]);

  const setLinha=(idx,campo,valor)=>setLinhas(ls=>ls.map((l,i)=>i===idx?{...l,[campo]:valor}:l));
  const addLinha=()=>setLinhas(ls=>[...ls,emptyLinha()]);
  const remLinha=idx=>setLinhas(ls=>ls.filter((_,i)=>i!==idx));

  const lancar=()=>{
    const validas=linhas.filter(l=>l.sid&&l.qtd&&l.data);
    if(validas.length===0)return;
    setItens(p=>[...validas.map(l=>({...l,id:uid(),qtd:parseFloat(l.qtd)})),...p]);
    setLinhas([emptyLinha()]);
  };

  const confirmarRealizacao=(dados)=>{
    setItens(p=>[dados,...p]);
    setModalPlan(null);
  };

  const del=id=>setItens(p=>p.filter(l=>l.id!==id));

  // No modo realizado: mescla planejados (pendentes) + realizados na mesma lista
  const planFilt=isRealizado
    ?(cliAtivo?planejado.filter(l=>l.cliId===cliAtivo):planejado)
    :[];

  const realizadosFilt=cliAtivo?itens.filter(l=>l.cliId===cliAtivo):itens;

  // IDs de planejados já confirmados
  const planConfirmados=new Set(realizadosFilt.map(r=>r.planId).filter(Boolean));

  // Planejados ainda pendentes
  const planPendentes=planFilt.filter(p=>!planConfirmados.has(p.id));

  // Para o planejado puro (não-realizado), lista normal
  const listaFilt=realizadosFilt;

  // Todas as áreas (realizados + planejados pendentes)
  const areas=[...new Set([
    ...listaFilt.map(l=>l.area),
    ...(isRealizado?planPendentes.map(l=>l.area):[]),
  ].filter(Boolean))].sort();

  // Monta lista mesclada por mês
  const listaComPendentes=isRealizado
    ?[
        ...listaFilt.map(l=>({...l,_tipo:"realizado"})),
        ...planPendentes.map(l=>({...l,_tipo:"planejado"})),
      ]
    :listaFilt.map(l=>({...l,_tipo:"realizado"}));

  const listaFiltrada=listaComPendentes.filter(l=>{
    const areaOk=!filtroArea||l.area===filtroArea;
    const statusOk=filtroStatus==="todos"
      ||(filtroStatus==="pendentes"&&l._tipo==="planejado")
      ||(filtroStatus==="realizados"&&l._tipo==="realizado");
    return areaOk&&statusOk;
  });

  const porMes={};
  listaFiltrada.forEach(l=>{
    const m=(l.data||"").slice(0,7)||"?";
    if(!porMes[m])porMes[m]=[];
    porMes[m].push(l);
  });
  const meses=Object.keys(porMes).sort().reverse();

  const nPendentes=isRealizado?planPendentes.length:0;

  return(
    <div style={{display:"grid",gap:14}}>

      {/* Modal de confirmação */}
      {modalPlan&&(
        <ModalConfirmar
          plan={modalPlan}
          svcMap={svcMap}
          clientes={clientes}
          onConfirmar={confirmarRealizacao}
          onCancelar={()=>setModalPlan(null)}
        />
      )}

      {/* Formulário multi-linha */}
      <div className={`card ${ac}`} style={{padding:"16px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div className="sl">LANÇAR — {label}</div>
          <button className="btn btn-ghost btn-xs" onClick={addLinha}>+ Linha</button>
        </div>

        <div style={{display:"grid",gap:8}}>
          {linhas.map((f,idx)=>(
            <div key={idx} style={{display:"grid",gridTemplateColumns:"120px 130px 1fr 80px 140px 1fr auto",gap:8,alignItems:"end",padding:linhas.length>1?"8px 10px 0 10px":0,borderTop:linhas.length>1&&idx>0?"1px solid #21262d22":undefined}}>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>DATA</div>}
                <input type="date" className="inp" value={f.data} onChange={e=>setLinha(idx,"data",e.target.value)}/>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>ÁREA</div>}
                <input className="inp" placeholder="Área A" value={f.area} onChange={e=>setLinha(idx,"area",e.target.value)} list={`alist${idx}`}/>
                <datalist id={`alist${idx}`}>{areas.map(a=><option key={a} value={a}/>)}</datalist>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>SERVIÇO</div>}
                <select className="inp" value={f.sid} onChange={e=>setLinha(idx,"sid",e.target.value)}>
                  {svcF.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
                </select>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>QTDE</div>}
                <input type="number" className="inp" placeholder="0" min="0" step="0.5" value={f.qtd} onChange={e=>setLinha(idx,"qtd",e.target.value)}/>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>}
                <select className="inp" value={f.cliId} onChange={e=>setLinha(idx,"cliId",e.target.value)}>
                  <option value="">— Sem cliente —</option>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
                </select>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>OBSERVAÇÃO</div>}
                <input className="inp" placeholder="Opcional" value={f.obs} onChange={e=>setLinha(idx,"obs",e.target.value)}/>
              </div>
              <div style={{display:"flex",gap:4}}>
                {linhas.length>1&&(
                  <button className="btn btn-danger btn-xs" style={{alignSelf:"flex-end"}} onClick={()=>remLinha(idx)} title="Remover linha">✕</button>
                )}
              </div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12}}>
          <span style={{fontSize:11,color:"#484f58"}}>
            {linhas.length>1?`${linhas.length} atividades a lançar`:""}
          </span>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={addLinha}>+ Adicionar linha</button>
            <button className={`btn ${bc}`} onClick={lancar}>
              {linhas.length>1?`↑ Lançar ${linhas.length} atividades`:"+ Lançar"}
            </button>
          </div>
        </div>
      </div>

      {/* Filtros */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {isRealizado&&(
            <>
              {[
                {id:"todos",    l:`Todos ${listaComPendentes.length>0?`(${listaComPendentes.length})`:""}`},
                {id:"pendentes",l:`⧖ Aguardando${nPendentes>0?` (${nPendentes})`:""}`},
                {id:"realizados",l:"✓ Realizados"},
              ].map(f=>(
                <button key={f.id} className="btn btn-ghost btn-sm"
                  onClick={()=>setFiltroStatus(f.id)}
                  style={filtroStatus===f.id?{borderColor:f.id==="pendentes"?"#d29922":"#388bfd",color:f.id==="pendentes"?"#d29922":"#388bfd"}:{}}>
                  {f.l}
                </button>
              ))}
              {nPendentes>0&&<span style={{width:1,height:16,background:"#21262d"}}/>}
            </>
          )}
          {areas.length>0&&(
            <>
              <span style={{fontSize:11,color:"#484f58"}}>Área:</span>
              {["", ...areas].map(a=>(
                <button key={a||"__"} className="btn btn-ghost btn-sm"
                  onClick={()=>setFiltroArea(a)}
                  style={filtroArea===a?{borderColor:"#388bfd",color:"#388bfd"}:{}}>
                  {a||"Todas"}
                </button>
              ))}
            </>
          )}
        </div>
      </div>

      {/* Lista por mês */}
      {meses.map(mes=>{
        const rows=porMes[mes].sort((a,b)=>{
          // Planejados primeiro, depois por data desc
          if(a._tipo!==b._tipo) return a._tipo==="planejado"?-1:1;
          return (b.data||"").localeCompare(a.data||"");
        });
        const totReal=rows.filter(r=>r._tipo==="realizado").reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
        const totPlan=rows.filter(r=>r._tipo==="planejado").reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
        const nPend=rows.filter(r=>r._tipo==="planejado").length;
        const mts=rows.filter(l=>l._tipo==="realizado"&&svcMap[l.sid]?.unidade==="m").reduce((a,l)=>a+l.qtd,0);
        return(
          <div key={mes} className="card" style={{padding:"14px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span className="mono" style={{color:"#c9d1d9",fontWeight:600}}>{mes}</span>
                {mts>0&&<span className="badge bb">{fmtN(mts)} m</span>}
                {isRealizado&&nPend>0&&<span className="badge bo">{nPend} pendente{nPend!==1?"s":""}</span>}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                {isRealizado&&totPlan>0&&<span className="mono" style={{fontSize:11,color:"#484f58"}}>Plan: R$ {fmt(totPlan)}</span>}
                <span className="mono" style={{color:"#d29922"}}>R$ {fmt(totReal)}</span>
              </div>
            </div>
            <table className="table">
              <thead>
                <tr>
                  <th>DATA</th><th>ÁREA</th><th>SERVIÇO</th><th>CLIENTE</th><th>QTDE</th>
                  <th>V.UNIT.</th><th>TOTAL</th><th>OBS</th><th/>
                </tr>
              </thead>
              <tbody>
                {rows.map(l=>{
                  const s=svcMap[l.sid]||{};
                  const cor=COR[l.sid]||"#8b949e";
                  const cli=clientes.find(c=>c.id===l.cliId);
                  const isPend=l._tipo==="planejado";

                  if(isPend){
                    // Linha "planejada" — clicável para confirmar
                    return(
                      <tr key={"p_"+l.id}
                        onClick={()=>setModalPlan(l)}
                        style={{cursor:"pointer",background:"#388bfd08",opacity:.85}}
                        title="Clique para confirmar a realização"
                      >
                        <td className="mono" style={{fontSize:11,color:"#388bfd66"}}>{l.data}</td>
                        <td><span className="badge bg" style={{opacity:.7}}>{l.area||"—"}</span></td>
                        <td>
                          <span style={{display:"inline-flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span className="badge" style={{background:cor+"15",color:cor+"88",border:`1px dashed ${cor}44`}}>{s.nome}</span>
                            <span className="badge" style={{background:"#388bfd18",color:"#388bfd",border:"1px solid #388bfd44",fontSize:10}}>⧖ PLANEJADO</span>
                          </span>
                        </td>
                        <td>{cli?<span className="badge bb" style={{opacity:.6}}>{cli.nome}</span>:<span style={{color:"#30363d",fontSize:11}}>—</span>}</td>
                        <td className="mono" style={{color:"#388bfd77"}}>{fmtN(l.qtd)} {s.unidade}</td>
                        <td className="mono" style={{color:"#484f58"}}>{s.valor>0?`R$ ${fmt(s.valor)}`:"—"}</td>
                        <td className="mono" style={{color:"#484f5888"}}>{s.valor>0?`R$ ${fmt(s.valor*l.qtd)}`:"—"}</td>
                        <td style={{color:"#484f58",fontSize:11}}>{l.obs}</td>
                        <td>
                          <button className="btn btn-primary btn-xs"
                            onClick={e=>{e.stopPropagation();setModalPlan(l);}}
                            title="Confirmar realização"
                          >✓ Confirmar</button>
                        </td>
                      </tr>
                    );
                  }

                  // Linha realizada normal
                  return(
                    <tr key={l.id}>
                      <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{l.data}</td>
                      <td><span className="badge bg">{l.area||"—"}</span></td>
                      <td>
                        <span style={{display:"inline-flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span className="badge" style={{background:cor+"22",color:cor,border:`1px solid ${cor}44`}}>{s.nome}</span>
                          {l.planId&&<span className="badge bgn" style={{fontSize:10}}>✓ do planejado</span>}
                        </span>
                      </td>
                      <td>{cli?<span className="badge bb">{cli.nome}</span>:<span style={{color:"#30363d",fontSize:11}}>—</span>}</td>
                      <td className="mono">{fmtN(l.qtd)} {s.unidade}</td>
                      <td className="mono" style={{color:"#484f58"}}>{s.valor>0?`R$ ${fmt(s.valor)}`:"—"}</td>
                      <td className="mono" style={{color:"#d29922"}}>{s.valor>0?`R$ ${fmt(s.valor*l.qtd)}`:"—"}</td>
                      <td style={{color:"#484f58",fontSize:11}}>{l.obs}</td>
                      <td><button className="btn btn-danger btn-xs" onClick={()=>del(l.id)}>✕</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })}

      {listaFiltrada.length===0&&(
        <div className="card" style={{padding:36,textAlign:"center",color:"#484f58"}}>
          {isRealizado&&filtroStatus==="pendentes"
            ?"Nenhum planejamento pendente de confirmação"
            :`Nenhum lançamento${cliAtivo?" para este cliente":""}`
          }
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  LABORATÓRIO
// ═══════════════════════════════════════════════════════════════════════════
function Laboratorio({amostras,setAmostras,clientes,cliAtivo}){
  const [showF,setShowF]=useState(false);
  const [editId,setEditId]=useState(null);
  const [filtro,setFiltro]=useState("todos");
  const empty={area:"",ponto:"",prof:"",tipo:"Solo",lab:"",nfe:"",dataColeta:hoje(),dataEnvio:"",prazoLaudo:"",dataLaudo:"",status:"coletado",obs:"",cliId:cliAtivo||""};
  const [f,setF]=useState(empty);
  useEffect(()=>setF(x=>({...x,cliId:cliAtivo||""})),[cliAtivo]);

  const salvar=()=>{
    if(!f.area||!f.ponto)return;
    if(editId){setAmostras(a=>a.map(x=>x.id===editId?{...f,id:editId}:x));setEditId(null);}
    else setAmostras(a=>[{...f,id:uid()},...a]);
    setF(empty);setShowF(false);
  };
  const editar=a=>{setF(a);setEditId(a.id);setShowF(true);};
  const del=id=>setAmostras(a=>a.filter(x=>x.id!==id));
  const updSt=(id,st)=>setAmostras(a=>a.map(x=>x.id===id?{...x,status:st}:x));

  const amoFilt=cliAtivo?amostras.filter(a=>a.cliId===cliAtivo):amostras;
  const lista=filtro==="todos"?amoFilt:amoFilt.filter(a=>a.status===filtro);
  const porArea={};
  lista.forEach(a=>{const k=a.area||"Sem Área";if(!porArea[k])porArea[k]=[];porArea[k].push(a);});

  return(
    <div style={{display:"grid",gap:16}}>
      {/* Pipeline */}
      <div className="card" style={{padding:"16px 18px"}}>
        <div className="sl" style={{marginBottom:14}}>PIPELINE LABORATORIAL</div>
        <div style={{display:"flex",alignItems:"center"}}>
          {ST_LAB.filter(s=>s.id!=="reprovado").map((s,i,arr)=>{
            const n=amoFilt.filter(a=>a.status===s.id).length;
            const past=amoFilt.some(a=>{const mi=ST_LAB.findIndex(x=>x.id===a.status);const si=ST_LAB.findIndex(x=>x.id===s.id);return mi>si;});
            return(
              <div key={s.id} style={{display:"flex",alignItems:"center",flex:1}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,minWidth:90}}>
                  <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,background:past?"#238636":n>0?"#1f6feb":"#21262d",border:`2px solid ${past?"#2ea043":n>0?"#388bfd":"#30363d"}`,zIndex:1}}>{s.icon}</div>
                  <div style={{fontSize:11,color:"#8b949e",textAlign:"center"}}>{s.label}</div>
                  <div className="mono" style={{fontSize:18,color:n>0?"#3fb950":"#30363d",fontWeight:600}}>{n}</div>
                </div>
                {i<arr.length-1&&<div style={{flex:1,height:2,background:past?"#238636":"#21262d",marginTop:-28,zIndex:0}}/>}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[{id:"todos",label:"Todas"},...ST_LAB].map(s=>(
            <button key={s.id} className="btn btn-ghost btn-sm" onClick={()=>setFiltro(s.id)} style={filtro===s.id?{borderColor:"#388bfd",color:"#388bfd"}:{}}>
              {s.label} {s.id!=="todos"&&<span className="badge bg" style={{marginLeft:4}}>{amoFilt.filter(a=>a.status===s.id).length}</span>}
            </button>
          ))}
        </div>
        <button className="btn btn-primary" onClick={()=>{setF({...empty,cliId:cliAtivo||""});setEditId(null);setShowF(true);}}>+ Nova Amostra</button>
      </div>

      {showF&&(
        <div className="card ca-blue" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>{editId?"EDITAR":"NOVA"} AMOSTRA</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {[
              {k:"area",      l:"ÁREA / SETOR",     t:"text",ph:"Área A"},
              {k:"ponto",     l:"PONTO SONDAGEM",   t:"text",ph:"SPT-03"},
              {k:"prof",      l:"PROFUNDIDADE",     t:"text",ph:"2,0–2,5 m"},
              {k:"tipo",      l:"TIPO",             t:"sel", opts:["Solo","Água","Sedimento","Biota","Gás"]},
              {k:"lab",       l:"LABORATÓRIO",      t:"text",ph:"Nome do laboratório"},
              {k:"nfe",       l:"NF-e / REMESSA",   t:"text",ph:"NF 001/2024"},
              {k:"status",    l:"STATUS",           t:"sel", opts:ST_LAB.map(s=>s.id),labels:ST_LAB.map(s=>s.label)},
              {k:"dataColeta",l:"DATA COLETA",      t:"date"},
              {k:"dataEnvio", l:"DATA ENVIO",       t:"date"},
              {k:"prazoLaudo",l:"PRAZO LAUDO",      t:"date"},
              {k:"dataLaudo", l:"DATA LAUDO REC.",  t:"date"},
            ].map(fd=>(
              <div key={fd.k}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>{fd.l}</div>
                {fd.t==="sel"
                  ?<select className="inp" value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}>{fd.opts.map((o,i)=><option key={o} value={o}>{fd.labels?fd.labels[i]:o}</option>)}</select>
                  :<input type={fd.t} className="inp" placeholder={fd.ph} value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}/>
                }
              </div>
            ))}
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>
              <select className="inp" value={f.cliId} onChange={e=>setF(x=>({...x,cliId:e.target.value}))}>
                <option value="">— Sem cliente —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>OBSERVAÇÕES</div>
              <input className="inp" placeholder="Obs" value={f.obs} onChange={e=>setF(x=>({...x,obs:e.target.value}))}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:14}}>
            <button className="btn btn-primary" onClick={salvar}>✓ Salvar</button>
            <button className="btn btn-ghost" onClick={()=>{setShowF(false);setEditId(null);}}>Cancelar</button>
          </div>
        </div>
      )}

      {Object.keys(porArea).sort().map(area=>{
        const its=porArea[area];
        const ldOK=its.filter(a=>a.status==="laudo_ok").length;
        return(
          <div key={area} className="card" style={{padding:"14px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontWeight:600,color:"#c9d1d9",fontSize:14}}>{area}</span>
                <span className="badge bg">{its.length} amostras</span>
                {ldOK>0&&<span className="badge bgn">{ldOK} laudos OK</span>}
              </div>
            </div>
            <table className="table">
              <thead><tr><th>PONTO</th><th>PROF.</th><th>TIPO</th><th>LAB.</th><th>COLETA</th><th>ENVIO</th><th>PRAZO</th><th>LAUDO</th><th>⌀</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
              <tbody>
                {its.map(a=>{
                  const tl=diffD(a.dataEnvio,a.dataLaudo);
                  const dp=a.prazoLaudo&&a.status!=="laudo_ok"?diffD(hoje(),a.prazoLaudo):null;
                  return(
                    <tr key={a.id}>
                      <td className="mono" style={{color:"#388bfd",fontWeight:600}}>{a.ponto}</td>
                      <td style={{color:"#8b949e",fontSize:12}}>{a.prof||"—"}</td>
                      <td><span className="badge bg">{a.tipo}</span></td>
                      <td style={{fontSize:12,color:"#8b949e"}}>{a.lab||"—"}</td>
                      <td className="mono" style={{fontSize:11,color:"#484f58"}}>{a.dataColeta||"—"}</td>
                      <td className="mono" style={{fontSize:11,color:"#484f58"}}>{a.dataEnvio||"—"}</td>
                      <td>{a.prazoLaudo?<span className={`badge ${dp===null?"bg":dp<0?"br":dp<5?"bo":"bgn"}`}>{a.prazoLaudo}{dp!==null?` (${dp}d)`:""}</span>:"—"}</td>
                      <td className="mono" style={{fontSize:11,color:a.dataLaudo?"#3fb950":"#484f58"}}>{a.dataLaudo||"—"}</td>
                      <td>{tl!==null?<span className="badge bt">{tl}d</span>:"—"}</td>
                      <td>
                        <select style={{background:"#0d1117",border:"1px solid #30363d",color:"#c9d1d9",borderRadius:4,padding:"3px 6px",fontSize:11,cursor:"pointer"}} value={a.status} onChange={e=>updSt(a.id,e.target.value)}>
                          {ST_LAB.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                      </td>
                      <td style={{display:"flex",gap:4}}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>editar(a)}>✎</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>del(a.id)}>✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })}
      {amoFilt.length===0&&<div className="card" style={{padding:36,textAlign:"center",color:"#484f58"}}>Nenhuma amostra cadastrada</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  RELATÓRIOS
// ═══════════════════════════════════════════════════════════════════════════
function Relatorios({relats,setRelats,amostras,clientes,cliAtivo}){
  const [showF,setShowF]=useState(false);
  const [editId,setEditId]=useState(null);
  const empty={titulo:"",area:"",resp:"",laudos:[],inicio:hoje(),prazo:"",entrega:"",status:"nao_iniciado",obs:"",cliId:cliAtivo||""};
  const [f,setF]=useState(empty);
  useEffect(()=>setF(x=>({...x,cliId:cliAtivo||""})),[cliAtivo]);
  const ldOK=amostras.filter(a=>a.status==="laudo_ok");

  const salvar=()=>{
    if(!f.titulo)return;
    if(editId){setRelats(r=>r.map(x=>x.id===editId?{...f,id:editId}:x));setEditId(null);}
    else setRelats(r=>[{...f,id:uid()},...r]);
    setF(empty);setShowF(false);
  };
  const editar=r=>{setF(r);setEditId(r.id);setShowF(true);};
  const del=id=>setRelats(r=>r.filter(x=>x.id!==id));
  const togL=k=>setF(x=>({...x,laudos:x.laudos.includes(k)?x.laudos.filter(c=>c!==k):[...x.laudos,k]}));

  const relFilt=cliAtivo?relats.filter(r=>r.cliId===cliAtivo):relats;

  return(
    <div style={{display:"grid",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {ST_REL.map(s=>{
          const its=relFilt.filter(r=>r.status===s.id);
          return(
            <div key={s.id} className="card" style={{padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span className="sl">{s.label}</span>
                <span className={`badge ${s.cls}`}>{its.length}</span>
              </div>
              {its.slice(0,4).map(r=>{
                const dp=r.prazo&&r.status!=="entregue"?diffD(hoje(),r.prazo):null;
                return(
                  <div key={r.id} style={{padding:"8px 10px",background:"#161b22",borderRadius:4,marginBottom:6}}>
                    <div style={{fontSize:12,color:"#c9d1d9",fontWeight:500,marginBottom:3}}>{r.titulo}</div>
                    {r.prazo&&<div style={{fontSize:11,color:dp!==null&&dp<5?"#f85149":"#484f58"}}>Prazo: {r.prazo}</div>}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",justifyContent:"flex-end"}}>
        <button className="btn btn-primary" onClick={()=>{setF({...empty,cliId:cliAtivo||""});setEditId(null);setShowF(true);}}>+ Novo Relatório</button>
      </div>

      {showF&&(
        <div className="card ca-red" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>{editId?"EDITAR":"NOVO"} RELATÓRIO</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>TÍTULO</div>
              <input className="inp" placeholder="Ex: RIC — Área A" value={f.titulo} onChange={e=>setF(x=>({...x,titulo:e.target.value}))}/>
            </div>
            {[
              {k:"area",   l:"ÁREA",          t:"text",ph:"Área A"},
              {k:"resp",   l:"RESPONSÁVEL",   t:"text",ph:"Nome"},
              {k:"status", l:"STATUS",        t:"sel", opts:ST_REL.map(s=>s.id),labels:ST_REL.map(s=>s.label)},
              {k:"inicio", l:"INÍCIO",        t:"date"},
              {k:"prazo",  l:"PRAZO ENTREGA", t:"date"},
              {k:"entrega",l:"DATA ENTREGA",  t:"date"},
            ].map(fd=>(
              <div key={fd.k}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>{fd.l}</div>
                {fd.t==="sel"
                  ?<select className="inp" value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}>{fd.opts.map((o,i)=><option key={o} value={o}>{fd.labels[i]}</option>)}</select>
                  :<input type={fd.t} className="inp" placeholder={fd.ph} value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}/>
                }
              </div>
            ))}
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>
              <select className="inp" value={f.cliId} onChange={e=>setF(x=>({...x,cliId:e.target.value}))}>
                <option value="">— Sem cliente —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
              </select>
            </div>
          </div>
          {ldOK.length>0&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:10,color:"#484f58",marginBottom:8}}>VINCULAR PONTOS COM LAUDO OK</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {ldOK.map(a=>{const k=`${a.area}/${a.ponto}`;return <button key={a.id} className={`btn btn-xs ${f.laudos.includes(k)?"btn-success":"btn-ghost"}`} onClick={()=>togL(k)}>{k}</button>;})}
              </div>
            </div>
          )}
          <div style={{marginTop:10}}>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>OBSERVAÇÕES</div>
            <input className="inp" placeholder="Obs" value={f.obs} onChange={e=>setF(x=>({...x,obs:e.target.value}))}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:14}}>
            <button className="btn btn-primary" onClick={salvar}>✓ Salvar</button>
            <button className="btn btn-ghost" onClick={()=>{setShowF(false);setEditId(null);}}>Cancelar</button>
          </div>
        </div>
      )}

      <div className="card" style={{padding:"14px 18px",overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>TÍTULO</th><th>ÁREA</th><th>CLIENTE</th><th>RESP.</th><th>PONTOS</th><th>INÍCIO</th><th>PRAZO</th><th>ENTREGA</th><th>STATUS</th><th/></tr></thead>
          <tbody>
            {relFilt.map(r=>{
              const dp=r.prazo&&r.status!=="entregue"?diffD(hoje(),r.prazo):null;
              const cli=clientes.find(c=>c.id===r.cliId);
              return(
                <tr key={r.id}>
                  <td style={{fontWeight:500,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.titulo}</td>
                  <td><span className="badge bg">{r.area||"—"}</span></td>
                  <td>{cli?<span className="badge bb">{cli.nome}</span>:"—"}</td>
                  <td style={{fontSize:12,color:"#8b949e"}}>{r.resp||"—"}</td>
                  <td>{r.laudos?.length>0?<span className="badge bp">{r.laudos.length} pts</span>:"—"}</td>
                  <td className="mono" style={{fontSize:11,color:"#484f58"}}>{r.inicio}</td>
                  <td>{r.prazo?<span className={`badge ${dp===null?"bg":dp<0?"br":dp<7?"bo":"bg"}`}>{r.prazo}</span>:"—"}</td>
                  <td className="mono" style={{fontSize:11,color:r.entrega?"#3fb950":"#484f58"}}>{r.entrega||"—"}</td>
                  <td>
                    <select style={{background:"#0d1117",border:"1px solid #30363d",color:"#c9d1d9",borderRadius:4,padding:"3px 6px",fontSize:11,cursor:"pointer"}} value={r.status} onChange={e=>setRelats(a=>a.map(x=>x.id===r.id?{...x,status:e.target.value}:x))}>
                      {ST_REL.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                  </td>
                  <td style={{display:"flex",gap:4}}>
                    <button className="btn btn-ghost btn-xs" onClick={()=>editar(r)}>✎</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>del(r.id)}>✕</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {relFilt.length===0&&<div style={{padding:30,textAlign:"center",color:"#484f58"}}>Nenhum relatório cadastrado</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  MEDIÇÃO — ciclo do cliente com gráfico planejado × realizado
// ═══════════════════════════════════════════════════════════════════════════
function Medicao({realizado,planejado,svcMap,clienteAtivo}){
  // Se tem cliente com diaCorte, usa ciclos; senão usa corte manual
  const [corteManual,setCorteManual]=useState(hoje());

  const ciclos = useMemo(()=>{
    if(!clienteAtivo?.diaCorte) return null;
    // Gerar últimos 6 ciclos
    const dia=parseInt(clienteAtivo.diaCorte)||1;
    const arr=[];
    for(let i=5;i>=0;i--){
      const ref=new Date();
      ref.setMonth(ref.getMonth()-i);
      const c=periodoCiclo(dia, ref.toISOString().slice(0,10));
      const real=realizado.filter(l=>l.data>=c.inicio&&l.data<=c.fim).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
      const plan=planejado.filter(l=>l.data>=c.inicio&&l.data<=c.fim).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
      arr.push({...c,real,plan,cicloLabel:`${c.inicio.slice(5).replace("-","/")} → ${c.fim.slice(5).replace("-","/")}/${c.fim.slice(0,4)}`});
    }
    return arr;
  },[clienteAtivo,realizado,planejado,svcMap]);

  const cicloAtual = ciclos?.[ciclos.length-1]||null;

  // Para corte manual
  const realAte=realizado.filter(l=>l.data<=corteManual);
  const totMed=realAte.reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
  const totPlan=planejado.reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);

  const porMes={};
  realizado.forEach(l=>{const m=(l.data||"").slice(0,7);if(!porMes[m])porMes[m]={p:0,r:0};porMes[m].r+=(svcMap[l.sid]?.valor||0)*l.qtd;});
  planejado.forEach(l=>{const m=(l.data||"").slice(0,7);if(!porMes[m])porMes[m]={p:0,r:0};porMes[m].p+=(svcMap[l.sid]?.valor||0)*l.qtd;});
  const meses=Object.keys(porMes).sort();

  const porSvc=Object.entries(realAte.reduce((acc,l)=>{acc[l.sid]=(acc[l.sid]||0)+(svcMap[l.sid]?.valor||0)*l.qtd;return acc;},{}))
    .map(([id,v])=>({id,nome:svcMap[id]?.nome||id,v})).sort((a,b)=>b.v-a.v);

  return(
    <div style={{display:"grid",gap:16}}>
      {/* Ciclos do cliente */}
      {clienteAtivo?.diaCorte&&ciclos&&(
        <>
          <div className="card ca-orange" style={{padding:"18px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
              <div>
                <div className="sl" style={{marginBottom:6}}>MEDIÇÃO DO CICLO ATUAL — {clienteAtivo.nome}</div>
                <div style={{fontSize:11,color:"#484f58",marginBottom:10}}>Dia de corte: {clienteAtivo.diaCorte} • Período: {cicloAtual?.label}</div>
                <div className="mono" style={{fontSize:44,fontWeight:600,color:"#d29922",lineHeight:1}}>R$ {fmt(cicloAtual?.real||0)}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,minWidth:280}}>
                <div style={{padding:"10px 14px",background:"#161b22",borderRadius:6}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>PLANEJADO NO CICLO</div>
                  <div className="mono" style={{color:"#388bfd",fontSize:16,fontWeight:600}}>R$ {fmt(cicloAtual?.plan||0)}</div>
                </div>
                <div style={{padding:"10px 14px",background:"#161b22",borderRadius:6}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>AVANÇO NO CICLO</div>
                  <div className="mono" style={{color:((cicloAtual?.plan||0)>0?(cicloAtual.real/cicloAtual.plan)*100:0)>=100?"#3fb950":"#d29922",fontSize:16,fontWeight:600}}>
                    {fmtN((cicloAtual?.plan||0)>0?(cicloAtual.real/cicloAtual.plan)*100:0)}%
                  </div>
                </div>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <div className="pt"><div className="pf" style={{width:`${Math.min((cicloAtual?.plan||0)>0?(cicloAtual.real/cicloAtual.plan)*100:0,100)}%`,background:"#d29922"}}/></div>
            </div>
          </div>

          {/* Histórico de ciclos */}
          <div className="card" style={{padding:"16px 18px"}}>
            <div className="sl" style={{marginBottom:14}}>HISTÓRICO DE CICLOS DE MEDIÇÃO</div>
            <table className="table">
              <thead><tr><th>PERÍODO (CICLO)</th><th style={{textAlign:"right"}}>PLANEJADO</th><th style={{textAlign:"right"}}>REALIZADO</th><th style={{textAlign:"right"}}>DELTA</th><th style={{textAlign:"right"}}>AVANÇO</th></tr></thead>
              <tbody>
                {ciclos.map((c,i)=>{
                  const d=c.real-c.plan;
                  const pct=c.plan>0?(c.real/c.plan)*100:c.real>0?100:0;
                  const isAtual=i===ciclos.length-1;
                  return(
                    <tr key={c.inicio} style={{background:isAtual?"#161b2260":"transparent"}}>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {isAtual&&<span className="badge bo" style={{fontSize:10}}>atual</span>}
                          <span className="mono" style={{fontSize:11,color:"#c9d1d9"}}>{c.label}</span>
                        </div>
                      </td>
                      <td className="mono" style={{textAlign:"right",color:"#388bfd"}}>R$ {fmt(c.plan)}</td>
                      <td className="mono" style={{textAlign:"right",color:"#3fb950"}}>R$ {fmt(c.real)}</td>
                      <td className="mono" style={{textAlign:"right",color:d>=0?"#3fb950":"#f85149"}}>{d>=0?"+":""}R$ {fmt(Math.abs(d))}</td>
                      <td style={{textAlign:"right"}}><span className={`badge ${pct>=100?"bgn":pct>=80?"bo":"br"}`}>{fmtN(pct)}%</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Corte manual (sem cliente com diaCorte) */}
      {!clienteAtivo?.diaCorte&&(
        <div className="card ca-orange" style={{padding:"20px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
            <div>
              <div className="sl" style={{marginBottom:10}}>MEDIÇÃO ACUMULADA ATÉ DATA DE CORTE</div>
              {!clienteAtivo&&<div style={{fontSize:11,color:"#484f58",marginBottom:8}}>Selecione um cliente com dia de corte para ver os ciclos automáticos</div>}
              <div className="mono" style={{fontSize:44,fontWeight:600,color:"#d29922",lineHeight:1}}>R$ {fmt(totMed)}</div>
              <div style={{fontSize:12,color:"#484f58",marginTop:6}}>{totPlan>0&&`${fmtN((totMed/totPlan)*100)}% do contrato (R$ ${fmt(totPlan)})`}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>DATA DE CORTE</div>
              <input type="date" className="inp" value={corteManual} onChange={e=>setCorteManual(e.target.value)} style={{width:170}}/>
            </div>
          </div>
          <div style={{marginTop:16}}>
            <div className="pt"><div className="pf" style={{width:`${Math.min(totPlan>0?(totMed/totPlan)*100:0,100)}%`,background:"#d29922"}}/></div>
          </div>
        </div>
      )}

      {/* Gráfico P×R */}
      <div className="card" style={{padding:"16px 18px"}}>
        <div className="sl" style={{marginBottom:12}}>GRÁFICO PLANEJADO × REALIZADO — POR MÊS</div>
        <GraficoPlanReal planejado={planejado} realizado={realizado} svcMap={svcMap} altura={200}/>
      </div>

      {/* Tabela mensal */}
      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:16}}>
        <div className="card" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>EVOLUÇÃO MENSAL</div>
          <table className="table">
            <thead><tr><th>MÊS</th><th style={{textAlign:"right"}}>PLANEJADO</th><th style={{textAlign:"right"}}>REALIZADO</th><th style={{textAlign:"right"}}>DELTA</th><th style={{textAlign:"right"}}>AVANÇO</th></tr></thead>
            <tbody>
              {meses.map(m=>{
                const {p,r}=porMes[m];
                const d=r-p;
                const pct=p>0?(r/p)*100:r>0?100:0;
                return(
                  <tr key={m}>
                    <td className="mono" style={{fontWeight:600,color:"#c9d1d9"}}>{m}</td>
                    <td className="mono" style={{textAlign:"right",color:"#388bfd"}}>R$ {fmt(p)}</td>
                    <td className="mono" style={{textAlign:"right",color:"#3fb950"}}>R$ {fmt(r)}</td>
                    <td className="mono" style={{textAlign:"right",color:d>=0?"#3fb950":"#f85149"}}>{d>=0?"+":""}R$ {fmt(Math.abs(d))}</td>
                    <td style={{textAlign:"right"}}><span className={`badge ${pct>=100?"bgn":pct>=80?"bo":"br"}`}>{fmtN(pct)}%</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {meses.length===0&&<div style={{padding:20,textAlign:"center",color:"#484f58"}}>Sem dados</div>}
        </div>
        <div className="card" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:14}}>COMPOSIÇÃO POR SERVIÇO</div>
          {porSvc.map(s=>{
            const pct=totMed>0?(s.v/totMed)*100:0;
            const c=COR[s.id]||"#388bfd";
            return(
              <div key={s.id} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12}}>
                  <span style={{color:"#8b949e"}}>{s.nome}</span>
                  <span className="mono" style={{color:c}}>R$ {fmt(s.v)}</span>
                </div>
                <div className="pt"><div className="pf" style={{width:`${pct}%`,background:c}}/></div>
                <div style={{fontSize:10,color:"#484f58",marginTop:3}}>{fmtN(pct)}%</div>
              </div>
            );
          })}
          {porSvc.length===0&&<div style={{color:"#484f58",fontSize:12}}>Sem dados acumulados</div>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  RELATÓRIO DE QUANTITATIVOS POR ÁREA
// ═══════════════════════════════════════════════════════════════════════════
function RelatorioQtd({realizado,planejado,svcMap,clientes,clienteAtivo,servicos}){
  const [dataIni,setDataIni]=useState(()=>new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10));
  const [dataFim,setDataFim]=useState(hoje);
  const [modoData,setModoData]=useState("periodo"); // "periodo" | "ate"
  const [incPlanejado,setIncPlanejado]=useState(true);
  const [areaFiltro,setAreaFiltro]=useState(""); // "" = todas
  const printRef=useRef();

  // Dados filtrados pelo período
  const realFilt=useMemo(()=>{
    if(modoData==="ate") return realizado.filter(l=>l.data<=dataFim);
    return realizado.filter(l=>l.data>=dataIni&&l.data<=dataFim);
  },[realizado,dataIni,dataFim,modoData]);

  const planFilt=useMemo(()=>{
    if(!incPlanejado) return [];
    if(modoData==="ate") return planejado.filter(l=>l.data<=dataFim);
    return planejado.filter(l=>l.data>=dataIni&&l.data<=dataFim);
  },[planejado,dataIni,dataFim,modoData,incPlanejado]);

  // Áreas presentes
  const todasAreas=useMemo(()=>[...new Set([
    ...realFilt.map(l=>l.area).filter(Boolean),
    ...planFilt.map(l=>l.area).filter(Boolean),
  ])].sort(),[realFilt,planFilt]);

  const realParaCalc=areaFiltro?realFilt.filter(l=>l.area===areaFiltro):realFilt;
  const planParaCalc=areaFiltro?planFilt.filter(l=>l.area===areaFiltro):planFilt;

  // Agrupar por área → serviço
  const dados=useMemo(()=>{
    const areas={};
    const add=(lista,tipo)=>{
      lista.forEach(l=>{
        const area=l.area||"(Sem área)";
        const svc=svcMap[l.sid];
        if(!svc)return;
        if(!areas[area])areas[area]={area,itens:{}};
        if(!areas[area].itens[l.sid])areas[area].itens[l.sid]={sid:l.sid,svc,real:0,plan:0};
        areas[area].itens[l.sid][tipo]+=l.qtd;
      });
    };
    add(realParaCalc,"real");
    if(incPlanejado) add(planParaCalc,"plan");
    // Converter para array ordenado
    return Object.values(areas).sort((a,b)=>a.area.localeCompare(b.area)).map(a=>({
      ...a,
      itens:Object.values(a.itens).sort((x,y)=>x.svc.nome.localeCompare(y.svc.nome)),
    }));
  },[realParaCalc,planParaCalc,incPlanejado,svcMap]);

  // Totais globais
  const totais=useMemo(()=>({
    real: dados.reduce((s,a)=>s+a.itens.reduce((ss,i)=>ss+(svcMap[i.sid]?.valor||0)*i.real,0),0),
    plan: dados.reduce((s,a)=>s+a.itens.reduce((ss,i)=>ss+(svcMap[i.sid]?.valor||0)*i.plan,0),0),
  }),[dados,svcMap]);

  // Gerar HTML para impressão / download
  const gerarHTML=()=>{
    const periodoStr=modoData==="ate"
      ?`Acumulado até ${dataFim}`
      :`${dataIni} a ${dataFim}`;

    const areaStr=areaFiltro||"Todas";

    const linhasTabela=dados.map(grupo=>{
      const subtotalReal=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.real,0);
      const subtotalPlan=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.plan,0);
      const avanco=subtotalPlan>0?((subtotalReal/subtotalPlan)*100).toFixed(1):"-";
      const linhasItens=grupo.itens.map(i=>{
        const vr=(svcMap[i.sid]?.valor||0)*i.real;
        const vp=(svcMap[i.sid]?.valor||0)*i.plan;
        const avItem=vp>0?((vr/vp)*100).toFixed(1):"-";
        return `
          <tr>
            <td>${i.svc.nome}</td>
            <td class="un">${i.svc.unidade}</td>
            ${incPlanejado?`<td class="num">${Number(i.plan).toLocaleString("pt-BR",{maximumFractionDigits:2})}</td><td class="num">R$ ${Number(vp).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</td>`:""}
            <td class="num">${Number(i.real).toLocaleString("pt-BR",{maximumFractionDigits:2})}</td>
            <td class="num">R$ ${Number(vr).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
            ${incPlanejado?`<td class="num av">${avItem}%</td>`:""}
          </tr>`;
      }).join("");
      const subtLine=`
        <tr class="subtotal">
          <td colspan="${incPlanejado?2:2}">Subtotal — ${grupo.area}</td>
          ${incPlanejado?`<td class="num"></td><td class="num">R$ ${Number(subtotalPlan).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>`:""}
          <td class="num"></td>
          <td class="num">R$ ${Number(subtotalReal).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>
          ${incPlanejado?`<td class="num av">${avanco}%</td>`:""}
        </tr>`;
      return `<tr class="area-header"><td colspan="${incPlanejado?7:4}">${grupo.area}</td></tr>${linhasItens}${subtLine}`;
    }).join("");

    const colSpanTotal=incPlanejado?7:4;
    const totalLine=`
      <tr class="grand-total">
        <td colspan="${incPlanejado?4:3}">TOTAL GERAL</td>
        ${incPlanejado?`<td class="num">R$ ${Number(totais.plan).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>`:""}
        <td class="num">R$ ${Number(totais.real).toLocaleString("pt-BR",{minimumFractionDigits:2})}</td>
        ${incPlanejado?`<td class="num av">${totais.plan>0?((totais.real/totais.plan)*100).toFixed(1):"-"}%</td>`:""}
      </tr>`;

    const html=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Relatório de Quantitativos — HBR GAC</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#111;background:#fff;padding:24px 32px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #1d4ed8}
  .logo-area h1{font-size:20px;font-weight:700;color:#1d4ed8;letter-spacing:1px}
  .logo-area p{font-size:11px;color:#555;margin-top:2px}
  .meta{font-size:11px;color:#333;text-align:right;line-height:1.7}
  .meta strong{color:#1d4ed8}
  h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#1d4ed8;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:11.5px}
  thead th{background:#1d4ed8;color:#fff;padding:7px 10px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  thead th.num,thead th.av{text-align:right}
  td{padding:6px 10px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
  td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.un{color:#555;text-align:center;width:52px}
  td.av{color:#15803d;font-weight:600;text-align:right}
  tr.area-header td{background:#eff6ff;color:#1d4ed8;font-weight:700;font-size:12px;padding:8px 10px;border-top:2px solid #bfdbfe;letter-spacing:.03em}
  tr.subtotal td{background:#f8fafc;font-weight:600;color:#334155;border-top:1px solid #cbd5e1;font-size:11.5px}
  tr.grand-total td{background:#1d4ed8;color:#fff;font-weight:700;font-size:12px;border-top:3px solid #1e40af}
  tr.grand-total td.av{color:#bbf7d0}
  tr:hover:not(.area-header):not(.subtotal):not(.grand-total) td{background:#f9fafb}
  .resumo{display:flex;gap:16px;margin-bottom:20px}
  .resumo-card{flex:1;padding:12px 16px;border-radius:6px;border:1px solid #e5e7eb}
  .resumo-card.plan{border-left:3px solid #2563eb;background:#eff6ff}
  .resumo-card.real{border-left:3px solid #16a34a;background:#f0fdf4}
  .resumo-card.av{border-left:3px solid #d97706;background:#fffbeb}
  .resumo-card .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#555;margin-bottom:4px}
  .resumo-card .val{font-size:18px;font-weight:700}
  .resumo-card.plan .val{color:#1d4ed8}
  .resumo-card.real .val{color:#15803d}
  .resumo-card.av .val{color:#b45309}
  .footer{margin-top:32px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:10px;color:#888;display:flex;justify-content:space-between}
  @media print{body{padding:12px 16px}button{display:none!important}}
</style>
</head>
<body>
<div class="header">
  <div class="logo-area">
    <h1>HBR GAC</h1>
    <p>Gestão Ambiental de Campo</p>
    <p style="margin-top:6px;font-size:12px;font-weight:600">Relatório de Quantitativos Realizados por Área</p>

</div>

${incPlanejado?`
<div class="resumo">
  <div class="resumo-card plan">

    <div class="val">R$ ${Number(totais.real).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
  </div>
  <div class="resumo-card av">

  </div>
</div>`:`
<div class="resumo">
  <div class="resumo-card real">
    <div class="label">Total Realizado</div>
    <div class="val">R$ ${Number(totais.real).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
  </div>
</div>`}

<table>
  <thead>
    <tr>
      <th>Serviço</th>
      <th class="un" style="text-align:center">Unid.</th>
      ${incPlanejado?`<th class="num">Qtde Plan.</th><th class="num">R$ Plan.</th>`:""}
      <th class="num">Qtde Real.</th>
      <th class="num">R$ Real.</th>
      ${incPlanejado?`<th class="av">Avanço</th>`:""}
    </tr>
  </thead>
  <tbody>
    ${linhasTabela}
    ${totalLine}
  </tbody>
</table>

<div class="footer">
  <span>HBR GAC — Sistema de Gestão Ambiental de Campo</span>
  <span>Página 1</span>
</div>
</body>
</html>`;
    return html;
  };

  const baixarHTML=()=>{
    const html=gerarHTML();
    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    const periodoStr=modoData==="ate"?`ate_${dataFim}`:`${dataIni}_${dataFim}`;
    a.download=`relatorio_qtd_${periodoStr}.html`;
    a.click();
  };

  const imprimir=()=>{
    const html=gerarHTML();
    const w=window.open("","_blank");
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(()=>w.print(),500);
  };

  return(
    <div style={{display:"grid",gap:16}}>

      {/* Controles */}
      <div className="card ca-teal" style={{padding:"18px 20px"}}>
        <div className="sl" style={{marginBottom:14}}>CONFIGURAR RELATÓRIO</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,alignItems:"end"}}>

          {/* Modo de data */}
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>MODO</div>
            <div style={{display:"flex",gap:0,background:"#010409",borderRadius:6,border:"1px solid #30363d",overflow:"hidden"}}>
              {[{id:"periodo",l:"Período"},{id:"ate",l:"Acumulado até"}].map(m=>(
                <button key={m.id} onClick={()=>setModoData(m.id)} style={{flex:1,padding:"7px 10px",border:"none",cursor:"pointer",background:modoData===m.id?"#2dd4bf22":"transparent",color:modoData===m.id?"#2dd4bf":"#484f58",fontWeight:modoData===m.id?600:400,fontSize:12,transition:"all .15s"}}>
                  {m.l}

              ))}

          </div>

          {/* Datas */}
          {modoData==="periodo"&&(
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>DATA INÍCIO</div>
              <input type="date" className="inp" value={dataIni} onChange={e=>setDataIni(e.target.value)}/>
            </div>
          )}
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>{modoData==="ate"?"DATA DE CORTE":"DATA FIM"}</div>
            <input type="date" className="inp" value={dataFim} onChange={e=>setDataFim(e.target.value)}/>
          </div>

          {/* Filtro de área */}
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>ÁREA</div>
            <select className="inp" value={areaFiltro} onChange={e=>setAreaFiltro(e.target.value)}>
              <option value="">Todas as áreas</option>
              {todasAreas.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>

          {/* Toggle planejado */}
          <div style={{display:"flex",alignItems:"center",gap:10,paddingTop:4}}>
            <button
              onClick={()=>setIncPlanejado(v=>!v)}
              style={{width:38,height:22,borderRadius:11,border:"none",cursor:"pointer",background:incPlanejado?"#2dd4bf":"#21262d",position:"relative",transition:"background .2s",flexShrink:0}}
            >
              <div style={{width:16,height:16,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:incPlanejado?19:3,transition:"left .2s"}}/>
            </button>
            <span style={{fontSize:12,color:"#8b949e"}}>Incluir Planejado</span>
          </div>
        </div>

        {/* Botões de ação */}
        <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
          <button className="btn btn-primary" onClick={imprimir}>⎙ Imprimir / PDF</button>
          <button className="btn btn-ghost" onClick={baixarHTML}>↓ Baixar HTML</button>
        </div>
      </div>

      {/* Prévia */}
      {dados.length===0
        ?<div className="card" style={{padding:40,textAlign:"center",color:"#484f58"}}>
            Nenhum lançamento realizado no período selecionado.
          </div>
        :<>
          {/* Resumo de totais */}
          <div style={{display:"grid",gridTemplateColumns:incPlanejado?"repeat(3,1fr)":"1fr",gap:12}}>
            {incPlanejado&&(
              <div className="card ca-blue" style={{padding:"14px 18px"}}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>TOTAL PLANEJADO</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,color:"#388bfd"}}>R$ {fmt(totais.plan)}</div>
              </div>
            )}
            <div className="card ca-green" style={{padding:"14px 18px"}}>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>TOTAL REALIZADO</div>
              <div className="mono" style={{fontSize:22,fontWeight:700,color:"#3fb950"}}>R$ {fmt(totais.real)}</div>
            </div>
            {incPlanejado&&(
              <div className="card ca-orange" style={{padding:"14px 18px"}}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>AVANÇO FINANCEIRO</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,color:"#d29922"}}>
                  {totais.plan>0?fmtN((totais.real/totais.plan)*100):"-"}%
                </div>
                <div style={{marginTop:8}}><div className="pt"><div className="pf" style={{width:`${Math.min(totais.plan>0?(totais.real/totais.plan)*100:0,100)}%`,background:"#d29922"}}/></div></div>
              </div>
            )}
          </div>

          {/* Tabela por área */}
          {dados.map(grupo=>{
            const subReal=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.real,0);
            const subPlan=grupo.itens.reduce((s,i)=>s+(svcMap[i.sid]?.valor||0)*i.plan,0);
            const avGrupo=subPlan>0?(subReal/subPlan)*100:null;
            return(
              <div key={grupo.area} className="card" style={{padding:"14px 18px"}}>
                {/* Cabeçalho da área */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid #21262d"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{width:6,height:20,borderRadius:3,background:"#2dd4bf",display:"inline-block"}}/>
                    <span style={{fontSize:14,fontWeight:700,color:"#c9d1d9"}}>{grupo.area}</span>
                    <span className="badge bg">{grupo.itens.length} serviço{grupo.itens.length!==1?"s":""}</span>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    {incPlanejado&&<span className="mono" style={{fontSize:12,color:"#388bfd"}}>Plan: R$ {fmt(subPlan)}</span>}
                    <span className="mono" style={{fontSize:13,fontWeight:600,color:"#3fb950"}}>Real: R$ {fmt(subReal)}</span>
                    {incPlanejado&&avGrupo!==null&&(
                      <span className={`badge ${avGrupo>=100?"bgn":avGrupo>=80?"bo":"br"}`}>{fmtN(avGrupo)}%</span>
                    )}
                  </div>
                </div>

                <table className="table">
                  <thead>
                    <tr>
                      <th>SERVIÇO</th>
                      <th>UNID.</th>
                      {incPlanejado&&<><th style={{textAlign:"right"}}>QTDE PLAN.</th><th style={{textAlign:"right"}}>R$ PLAN.</th></>}
                      <th style={{textAlign:"right"}}>QTDE REAL.</th>
                      <th style={{textAlign:"right"}}>R$ REAL.</th>
                      {incPlanejado&&<th style={{textAlign:"right"}}>AVANÇO</th>}
                    </tr>
                  </thead>
                  <tbody>
                    {grupo.itens.map(item=>{
                      const vr=(svcMap[item.sid]?.valor||0)*item.real;
                      const vp=(svcMap[item.sid]?.valor||0)*item.plan;
                      const avItem=vp>0?(vr/vp)*100:null;
                      const cor=COR[item.sid]||"#8b949e";
                      return(
                        <tr key={item.sid}>
                          <td>
                            <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                              <span style={{width:8,height:8,borderRadius:"50%",background:cor,flexShrink:0}}/>
                              <span style={{fontSize:12,color:"#c9d1d9"}}>{item.svc.nome}</span>
                            </span>
                          </td>
                          <td><span className="badge bg">{item.svc.unidade}</span></td>
                          {incPlanejado&&(
                            <>
                              <td className="mono" style={{textAlign:"right",color:"#388bfd"}}>{item.plan>0?fmtN(item.plan,2):"—"}</td>
                              <td className="mono" style={{textAlign:"right",color:"#388bfd",fontSize:11}}>{vp>0?`R$ ${fmt(vp)}`:"—"}</td>
                            </>
                          )}
                          <td className="mono" style={{textAlign:"right",color:"#3fb950",fontWeight:600}}>{item.real>0?fmtN(item.real,2):"—"}</td>
                          <td className="mono" style={{textAlign:"right",color:"#d29922"}}>{vr>0?`R$ ${fmt(vr)}`:"—"}</td>
                          {incPlanejado&&(
                            <td style={{textAlign:"right"}}>
                              {avItem!==null
                                ?<span className={`badge ${avItem>=100?"bgn":avItem>=80?"bo":"br"}`}>{fmtN(avItem)}%</span>
                                :<span style={{color:"#30363d",fontSize:11}}>—</span>
                              }

                          )}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })}

          {/* Total geral */}
          <div style={{padding:"14px 20px",background:"#161b22",border:"1px solid #21262d",borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <span style={{fontSize:12,fontWeight:600,color:"#8b949e",textTransform:"uppercase",letterSpacing:1}}>Total Geral do Período</span>
            <div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
              {incPlanejado&&<span className="mono" style={{color:"#388bfd"}}>Plan: <strong>R$ {fmt(totais.plan)}</strong></span>}
              <span className="mono" style={{color:"#3fb950"}}>Real: <strong>R$ {fmt(totais.real)}</strong></span>
              {incPlanejado&&<span className={`badge ${totais.plan>0&&(totais.real/totais.plan)>=1?"bgn":totais.plan>0&&(totais.real/totais.plan)>=.8?"bo":"br"}`} style={{fontSize:13,padding:"4px 12px"}}>
                {totais.plan>0?fmtN((totais.real/totais.plan)*100):"-"}%
              </span>}
            </div>
          </div>
        </>
      }
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  IMPORTAR
// ═══════════════════════════════════════════════════════════════════════════
function Importar({setPlanejado,servicos,clientes,cliAtivo}){
  const [drag,setDrag]=useState(false);
  const [preview,setPreview]=useState([]);
  const [erro,setErro]=useState("");
  const [ok,setOk]=useState(false);
  const ref=useRef();
  const svcMap=Object.fromEntries(servicos.map(s=>[s.id,s]));

  const downloadTemplate=()=>{
    const ids=servicos.map(s=>`# ${s.id} = ${s.nome}`).join("\n");
    const cliIds=clientes.length?clientes.map(c=>`# ${c.id} = ${c.nome}`).join("\n"):"# (nenhum cliente cadastrado ainda)";
    const blob=new Blob([`# HBR GAC — Template\n# Serviços:\n${ids}\n# Clientes:\n${cliIds}\n#\ndata,area,servico_id,quantidade,cli_id,observacao\n2024-06-10,Área A,SPT,12,,Ponto SPT-01\n`],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="template_planejamento.csv";a.click();
  };

  const processCSV=text=>{
    try{
      const lines=text.split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith("#"));
      if(!lines.length){setErro("Arquivo vazio.");return;}
      const header=lines[0].toLowerCase().split(",").map(h=>h.trim().replace(/['"]/g,""));
      const col=k=>header.indexOf(k);
      if(col("data")<0||col("servico_id")<0||col("quantidade")<0){setErro('Colunas obrigatórias: "data","servico_id","quantidade"');return;}
      const svcIds=new Set(servicos.map(s=>s.id));
      const rows=[];const skip=[];
      lines.slice(1).forEach((line,i)=>{
        const c=line.split(",").map(x=>x.trim().replace(/^["']|["']$/g,""));
        const sid=(c[col("servico_id")]||"").toUpperCase();
        const qtd=parseFloat((c[col("quantidade")]||"").replace(",","."));
        if(!sid||isNaN(qtd)||qtd<=0){skip.push(`L${i+2}`);return;}
        if(!svcIds.has(sid)){skip.push(`L${i+2}: "${sid}" desconhecido`);return;}
        rows.push({id:uid(),data:c[col("data")]||hoje(),area:col("area")>=0?c[col("area")]:"",sid,qtd,
          cliId:col("cli_id")>=0?c[col("cli_id")]:(cliAtivo||""),
          obs:col("observacao")>=0?c[col("observacao")]:""});
      });
      if(!rows.length){setErro("Nenhuma linha válida. "+skip.slice(0,5).join("; "));return;}
      setPreview(rows);setErro(skip.length?`⚠ ${skip.length} linhas ignoradas`:"");setOk(false);
    }catch(e){setErro("Erro: "+e.message);}
  };

  const processXLSX=async file=>{
    if(!window.XLSX){setErro("Carregando leitor Excel, tente em 2s.");return;}
    try{const buf=await file.arrayBuffer();const wb=window.XLSX.read(buf,{type:"array"});processCSV(window.XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]));}
    catch(e){setErro("Erro Excel: "+e.message);}
  };

  const lerArquivo=file=>{
    if(!file)return;
    const ext=file.name.split(".").pop().toLowerCase();
    if(["csv","txt"].includes(ext)){const r=new FileReader();r.onload=e=>processCSV(e.target.result);r.readAsText(file,"UTF-8");}
    else if(["xlsx","xls"].includes(ext))processXLSX(file);
    else setErro("Use .csv ou .xlsx");
  };

  const importar=()=>{setPlanejado(p=>[...preview,...p]);setOk(true);setPreview([]);};
  useEffect(()=>{if(!window.XLSX){const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";document.head.appendChild(s);}},[]);

  return(
    <div style={{display:"grid",gap:16,maxWidth:900}}>
      <div className="card ca-blue" style={{padding:"18px 20px"}}>
        <div className="sl" style={{marginBottom:8}}>IMPORTAR PLANEJAMENTO</div>
        <div style={{fontSize:12,color:"#8b949e",lineHeight:1.7,marginBottom:14}}>
          Aceita CSV ou Excel. MS Project: <span className="mono" style={{color:"#d29922",fontSize:11}}>Arquivo → Salvar Como → Excel (.xlsx)</span>
        </div>
        <button className="btn btn-ghost" onClick={downloadTemplate}>↓ Baixar Template CSV</button>
      </div>

      <div className={`drag-zone${drag?" dov":""}`}
        onClick={()=>ref.current?.click()}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);lerArquivo(e.dataTransfer.files[0]);}}>
        <div style={{fontSize:36,color:"#388bfd",marginBottom:10}}>↑</div>
        <div style={{color:"#c9d1d9",fontWeight:600,marginBottom:4}}>Arraste o arquivo aqui</div>
        <div style={{fontSize:12,color:"#484f58"}}>CSV ou .xlsx</div>
        <input ref={ref} type="file" accept=".csv,.xlsx,.xls,.txt" style={{display:"none"}} onChange={e=>lerArquivo(e.target.files[0])}/>
      </div>

      {erro&&<div style={{padding:"10px 14px",background:erro.startsWith("⚠")?"#d2992218":"#f8514918",border:`1px solid ${erro.startsWith("⚠")?"#d2992244":"#f8514944"}`,borderRadius:6,color:erro.startsWith("⚠")?"#d29922":"#f85149",fontSize:12}}>{erro}</div>}
      {ok&&<div style={{padding:"12px 16px",background:"#23863622",border:"1px solid #23863644",borderRadius:6,color:"#3fb950"}}>✓ Importação concluída!</div>}

      {preview.length>0&&(
        <div className="card" style={{padding:"16px 18px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div><div className="sl">PRÉVIA — {preview.length} LANÇAMENTOS</div></div>
            <button className="btn btn-success" onClick={importar}>↓ Confirmar Importação</button>
          </div>
          <div style={{maxHeight:360,overflowY:"auto"}}>
            <table className="table">
              <thead><tr><th>DATA</th><th>ÁREA</th><th>SERVIÇO</th><th>CLIENTE</th><th>QTDE</th><th>VALOR</th></tr></thead>
              <tbody>
                {preview.map(r=>{
                  const s=svcMap[r.sid]||{};const cor=COR[r.sid]||"#388bfd";
                  const cli=clientes.find(c=>c.id===r.cliId);
                  return(
                    <tr key={r.id}>
                      <td className="mono" style={{fontSize:11}}>{r.data}</td>
                      <td><span className="badge bg">{r.area||"—"}</span></td>
                      <td><span className="badge" style={{background:cor+"22",color:cor,border:`1px solid ${cor}44`}}>{s.nome||r.sid}</span></td>
                      <td>{cli?<span className="badge bb">{cli.nome}</span>:"—"}</td>
                      <td className="mono">{fmtN(r.qtd)} {s.unidade}</td>
                      <td className="mono" style={{color:"#d29922"}}>{s.valor>0?`R$ ${fmt(s.valor*r.qtd)}`:"—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}
