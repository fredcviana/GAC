<script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════════════════════════════
//  PROJ.FLOW AUTH — mesmo Supabase do Proj.Flow
// ═══════════════════════════════════════════════════════════════════════════
const PF_URL     = 'https://ydfytofjbpoqpsbryhyg.supabase.co';
const PF_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkZnl0b2ZqYnBvcXBzYnJ5aHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzAxMjUsImV4cCI6MjA5MDE0NjEyNX0.C2EmgZUxO3x0vNpqtw0uzL4U4YGRBaL0XeIK7INjVzM';
const PF_ADMIN   = 'frederico.viana@hidrobr.com';
const pfSb       = supabase.createClient(PF_URL, PF_KEY);

// Carrega equipe e projetos do Proj.Flow via Supabase (leitura)
async function pfLoadData() {
  try {
    const { data } = await pfSb.from('projflow_data').select('data').order('updated_at',{ascending:false}).limit(1).single();
    return data?.data || null;
  } catch(e) { return null; }
}

// Carrega perfil do servidor (projflow_profiles)
async function pfLoadProfile(userId) {
  try {
    const { data } = await pfSb.from('projflow_profiles').select('profile').eq('user_id', userId).single();
    return data?.profile || null;
  } catch(e) { return null; }
}

// Permissões do GAC por perfil
// gerente → tudo; lider → sem custos/importar/config; analista → só lab e relatórios
const GAC_ABAS_PERFIL = {
  gerente:  ['dashboard','areas','sondagem','laboratorio','relatorios','custos','medicao','relatorio_qtd','report_semanal','importar','config'],
  lider:    ['dashboard','areas','sondagem','laboratorio','relatorios','custos','medicao','relatorio_qtd','report_semanal','importar','config'],
  analista: ['laboratorio','relatorios'],
};
const GAC_ABA_PADRAO = {
  gerente:  'dashboard',
  lider:    'dashboard',
  analista: 'laboratorio',
};

// ── Login Screen ──────────────────────────────────────────────────────────
async function pfResolveAuth(user) {
  // Carrega perfil e dados do ProjFlow dado um user autenticado
  let profile = await pfLoadProfile(user.id);
  if (!profile && user.email === PF_ADMIN) profile = 'gerente';
  if (!profile) {
    const pfData = await pfLoadData();
    const person = (pfData?.team||[]).find(p => p.email?.toLowerCase() === user.email?.toLowerCase());
    profile = person?.profile || 'analista';
  }
  const pfData = await pfLoadData();
  return { user, profile, pfTeam: pfData?.team||[], pfProjects: pfData?.projects||[] };
}

function LoginGAC({ onLogin }) {
  const [email,   setEmail]   = useState('');
  const [senha,   setSenha]   = useState('');
  const [erro,    setErro]    = useState('');
  const [loading, setLoading] = useState(true); // começa verificando sessão
  const [shake,   setShake]   = useState(false);

  // Ao montar, verifica se já há sessão ativa no Proj.Flow
  useEffect(() => {
    (async () => {
      try {
        const { data } = await pfSb.auth.getSession();
        if (data?.session?.user) {
          const authData = await pfResolveAuth(data.session.user);
          onLogin(authData);
          return;
        }
      } catch(e) {}
      setLoading(false);
    })();
  }, []);

  const tentar = async () => {
    if (!email || !senha) { setErro('Preencha e-mail e senha.'); return; }
    setLoading(true); setErro('');
    try {
      const { data, error } = await pfSb.auth.signInWithPassword({ email: email.trim(), password: senha });
      if (error || !data?.user) throw new Error('E-mail ou senha incorretos.');
      const authData = await pfResolveAuth(data.user);
      onLogin(authData);
    } catch(e) {
      setErro(e.message || 'Erro ao fazer login.');
      setShake(true); setSenha('');
      setTimeout(() => setShake(false), 400);
      setLoading(false);
    }
  };

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#080b0f',flexDirection:'column',gap:16}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap');@keyframes pulse{to{opacity:1;transform:scale(1.3)}}`}</style>
      <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:15,color:'#388bfd',letterSpacing:2}}>HBR GAC</div>
      <div style={{color:'#484f58',fontSize:12}}>Verificando sessão…</div>
      <div style={{display:'flex',gap:4}}>
        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'#388bfd',opacity:.4,animation:`pulse 1s ${i*0.2}s infinite alternate`}}/>)}
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20,background:'#080b0f'}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'IBM Plex Sans',sans-serif}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .shake{animation:shake .35s ease}
        .fi{animation:fadeIn .3s ease}
      `}</style>
      <div className={`fi${shake?' shake':''}`} style={{width:'100%',maxWidth:380,background:'#0d1117',border:'1px solid #21262d',borderRadius:8,padding:'40px 36px',textAlign:'center'}}>
        <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:22,fontWeight:700,color:'#388bfd',letterSpacing:3,marginBottom:4}}>HBR GAC</div>
        <div style={{fontSize:12,color:'#484f58',marginBottom:32}}>Acesso via conta Proj·Flow</div>

        <div style={{textAlign:'left',marginBottom:14}}>
          <div style={{fontSize:10,color:'#484f58',marginBottom:5,letterSpacing:'.08em',fontWeight:600}}>E-MAIL</div>
          <input
            style={{width:'100%',background:'#010409',border:`1px solid ${erro?'#f85149':'#30363d'}`,color:'#c9d1d9',borderRadius:6,padding:'8px 12px',fontSize:13,outline:'none',fontFamily:'inherit'}}
            type="email" placeholder="seu@email.com" value={email}
            onChange={e=>{setEmail(e.target.value);setErro('');}}
            onKeyDown={e=>e.key==='Enter'&&document.getElementById('gac-senha').focus()}
            autoFocus
          />
        </div>

        <div style={{textAlign:'left',marginBottom:20}}>
          <div style={{fontSize:10,color:'#484f58',marginBottom:5,letterSpacing:'.08em',fontWeight:600}}>SENHA</div>
          <input
            id="gac-senha"
            style={{width:'100%',background:'#010409',border:`1px solid ${erro?'#f85149':'#30363d'}`,color:'#c9d1d9',borderRadius:6,padding:'8px 12px',fontSize:13,outline:'none',fontFamily:'inherit'}}
            type="password" placeholder="••••••••" value={senha}
            onChange={e=>{setSenha(e.target.value);setErro('');}}
            onKeyDown={e=>e.key==='Enter'&&tentar()}
          />

          style={{width:'100%',background:loading?'#21262d':'#1f6feb',border:'1px solid #388bfd',color:'#fff',borderRadius:6,padding:'10px 0',fontWeight:600,fontSize:14,cursor:loading?'not-allowed':'pointer',fontFamily:'inherit',transition:'all .15s'}}

        </button>

        <div style={{fontSize:11,color:'#30363d',marginTop:24}}>Use as mesmas credenciais do Proj·Flow</div>
      </div>
    </div>
  );
}

// Calcula o período de medição do cliente baseado no dia de corte
// diaCorte=20 → início=AAAA-MM-20, fim=próximo mês dia 19
function periodoCiclo(diaCorte, refDate) {
  const ref = refDate ? new Date(refDate+"T12:00:00") : new Date();
  const dia = parseInt(diaCorte)||1;
  let ano = ref.getFullYear();
  let mes = ref.getMonth(); // 0-based
  // Se hoje é antes do dia de corte, o ciclo atual começou no mês anterior
  if(ref.getDate() < dia) { mes--; if(mes<0){mes=11;ano--;} }
  const inicio = new Date(ano, mes, dia);
  const fimD   = new Date(ano, mes+1, dia);
  fimD.setDate(fimD.getDate()-1);
  return {
    inicio: inicio.toISOString().slice(0,10),
    fim:    fimD.toISOString().slice(0,10),
    label:  `${String(inicio.getDate()).padStart(2,"0")}/${String(inicio.getMonth()+1).padStart(2,"0")} → ${String(fimD.getDate()).padStart(2,"0")}/${String(fimD.getMonth()+1).padStart(2,"0")}/${fimD.getFullYear()}`
  };
}

// ─── Normalização de colunas custos_var_config (snake_case ↔ camelCase) ───
// O Supabase pode retornar valor_por_unidade (snake) se a coluna foi criada assim
function normalizeCVC(row) {
  if (!row) return row;
  const r = {...row};
  if (r.valor_por_unidade !== undefined && r.valorPorUnidade === undefined) {
    r.valorPorUnidade = r.valor_por_unidade;
    delete r.valor_por_unidade;
  }
  // Normaliza ativo: pode vir como booleano ou número do banco
  if (r.ativo === 1 || r.ativo === "true") r.ativo = true;
  if (r.ativo === 0 || r.ativo === "false") r.ativo = false;
  return r;
}
function denormalizeCVC(row) {
  if (!row) return row;
  const r = {...row};
  // Garante que o banco receba o campo que ele tem (tenta ambos)
  if (r.valorPorUnidade !== undefined) {
    r.valor_por_unidade = r.valorPorUnidade;
  }
  return r;
}

// ─── Hook de sincronização com Supabase ───────────────────────────────────
// Funciona como usePersist mas usa Supabase.
// "setter" recebe o novo array/valor e faz upsert+delete automaticamente.
function useSupabase(table, init, options={}) {
  const [data, setData] = useState(init);
  const [loading, setLoading] = useState(true);
  const [syncErr, setSyncErr] = useState(null);
  const isScalar = options.scalar || false;
  const isCVC = table === "custos_var_config";

  // Carrega dados na montagem
  useEffect(() => {
    (async () => {
      try {
        if (isScalar) {
          const rows = await sb.get(table, "select=value&key=eq.cliAtivo");
          setData(rows[0]?.value ?? null);
        } else {
          const rows = await sb.get(table);
          const normalized = isCVC ? rows.map(normalizeCVC) : rows;
          setData(normalized.length ? normalized : init);
        }
      } catch(e) {
        console.warn(`[Supabase] load ${table}:`, e.message);
      } finally {
        setLoading(false);
      }
    })();
  }, [table]);

  // Setter que atualiza estado local E sincroniza com Supabase
  const setter = (updater) => {
    setData(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      (async () => {
        try {
          setSyncErr(null);
          if (isScalar) {
            await sb.upsert("configuracoes", {key:"cliAtivo", value: next}, "key");
          } else {
            if (!Array.isArray(next)) return;
            const prevIds = new Set((Array.isArray(prev)?prev:[]).map(x=>x.id));
            const nextIds = new Set(next.map(x=>x.id));
            // Deletar removidos
            for (const id of prevIds) {
              if (!nextIds.has(id)) await sb.delete(table, id).catch(()=>{});
            }
            // Upsert apenas itens novos ou modificados
            const changed = next.filter(item => {
              const prevItem = (Array.isArray(prev)?prev:[]).find(x=>x.id===item.id);
              if (!prevItem) return true;
              return JSON.stringify(prevItem) !== JSON.stringify(item);
            });
            if (changed.length) {
              const toSend = isCVC ? changed.map(denormalizeCVC) : changed;
              await sb.upsert(table, toSend);
            }
          }
        } catch(e) {
          const msg = `[${table}] ${e.message}`;
          console.error("[Supabase sync error]", msg);
          setSyncErr(msg);
        }
      })();
      return next;
    });
  };

  return [data, setter, loading, syncErr];
}

  const loading  = loadSvc||loadPlan||loadReal||loadAmo||loadRel||loadCli||loadAre||loadCF||loadCA2||loadCVC||loadCP||loadRS||loadCA;
  const syncErrs = [syncErrSvc,syncErrPlan,syncErrReal,syncErrAmo,syncErrRel,syncErrCli,syncErrAreas,syncErrCF,syncErrCA2,syncErrCP].filter(Boolean);

  const svcMap = useMemo(()=>Object.fromEntries(servicos.map(s=>[s.id,s])),[servicos]);
  const clienteAtivo = useMemo(()=>clientes.find(c=>c.id===cliAtivo)||null,[clientes,cliAtivo]);

  // Filtra dados pelo cliente ativo
  const planFilt = useMemo(()=>cliAtivo?planejado.filter(l=>l.cliId===cliAtivo):planejado,[planejado,cliAtivo]);
  const realFilt = useMemo(()=>cliAtivo?realizado.filter(l=>l.cliId===cliAtivo):realizado,[realizado,cliAtivo]);
  const amoFilt  = useMemo(()=>cliAtivo?amostras.filter(a=>a.cliId===cliAtivo):amostras,[amostras,cliAtivo]);
  const relFilt  = useMemo(()=>cliAtivo?relats.filter(r=>r.cliId===cliAtivo):relats,[relats,cliAtivo]);

  const kpis = useMemo(()=>{
    const tPlan  = planFilt.reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
    const tReal  = realFilt.reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
    const medHj  = realFilt.filter(l=>l.data<=hoje()).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
    const mPlan  = planFilt.filter(l=>svcMap[l.sid]?.unidade==="m").reduce((a,l)=>a+l.qtd,0);
    const mReal  = realFilt.filter(l=>svcMap[l.sid]?.unidade==="m").reduce((a,l)=>a+l.qtd,0);
    const diasP  = [...new Set(realFilt.filter(l=>svcMap[l.sid]?.unidade==="m").map(l=>l.data))].length;
    const mDia   = diasP>0?mReal/diasP:0;
    const avanco = tPlan>0?(tReal/tPlan)*100:0;
    const comL   = amoFilt.filter(a=>a.dataEnvio&&a.dataLaudo);
    const tLaudo = comL.length>0?comL.reduce((s,a)=>s+diffD(a.dataEnvio,a.dataLaudo),0)/comL.length:null;
    const amEnv  = amoFilt.filter(a=>["enviado","em_analise","laudo_ok"].includes(a.status)).length;
    const amL    = amoFilt.filter(a=>a.status==="laudo_ok").length;
    const rDone  = relFilt.filter(r=>r.status==="entregue").length;

    // Medição do ciclo do cliente
    let medCiclo=null, cicloPeriodo=null;
    if(clienteAtivo?.diaCorte){
      const ciclo = periodoCiclo(clienteAtivo.diaCorte);
      cicloPeriodo = ciclo;
      medCiclo = realFilt.filter(l=>l.data>=ciclo.inicio&&l.data<=ciclo.fim).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
    }
    return {tPlan,tReal,medHj,mPlan,mReal,diasP,mDia,avanco,tLaudo,amTotal:amoFilt.length,amEnv,amLaudo:amL,rDone,rTotal:relFilt.length,medCiclo,cicloPeriodo};
  },[svcMap,planFilt,realFilt,amoFilt,relFilt,clienteAtivo]);

  const ABAS_ALL=[
    {id:"dashboard",     label:"Dashboard",  icon:"⊞"},
    {id:"areas",         label:"Áreas",      icon:"◫"},
    {id:"sondagem",      label:"GAC",        icon:"▦"},
    {id:"laboratorio",   label:"Laboratório",icon:"⬡"},
    {id:"relatorios",    label:"Relatórios", icon:"◈"},
    {id:"custos",        label:"Custos",     icon:"$"},
    {id:"medicao",       label:"Medição",    icon:"⊕"},
    {id:"relatorio_qtd", label:"Relatório",  icon:"⊟"},
    {id:"report_semanal",label:"Semanal",    icon:"◑"},
    {id:"importar",      label:"Importar",   icon:"↑"},
    {id:"config",        label:"Config",     icon:"⚙"},
  ];
  const ABAS = ABAS_ALL.filter(a => abasPermitidas.includes(a.id));

  if(!auth) return <LoginGAC onLogin={handleLogin}/>;

  if(loading) return(
    <>
      <style>{CSS}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
        <div style={{fontFamily:"'IBM Plex Mono'",fontSize:15,color:"#388bfd",letterSpacing:2}}>HBR GAC</div>
        <div style={{color:"#484f58",fontSize:12}}>Conectando ao Supabase…</div>
        <div style={{display:"flex",gap:4}}>
          {[0,1,2].map(i=>(
            <div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#388bfd",opacity:.4,animation:`pulse 1s ${i*0.2}s infinite alternate`}}/>
          ))}
        </div>
        <style>{`@keyframes pulse{to{opacity:1;transform:scale(1.3)}}`}</style>
      </div>
    </>
  );

  return(
    <>
      <style>{CSS}</style>
      <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>

        {/* ── Topbar ── */}
        <div style={{background:"#0d1117",borderBottom:"1px solid #21262d",padding:"0 20px",display:"flex",alignItems:"center",gap:0,height:52,position:"sticky",top:0,zIndex:100}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginRight:16}}>
            <img
              src={LOGO_HBR}
              alt="Hidrobr Soluções Integradas"
              style={{height:36,width:"auto",objectFit:"contain"}}
            />
            <div style={{display:"flex",flexDirection:"column",justifyContent:"center",lineHeight:1}}>
              <span style={{fontFamily:"'IBM Plex Mono'",fontWeight:600,fontSize:15,color:"#fff",letterSpacing:1}}>HBR <span style={{color:"#1db954"}}>GAC</span></span>
              <span style={{fontFamily:"'IBM Plex Mono'",fontSize:9,color:"#484f58",letterSpacing:3,marginTop:2}}>GESTÃO AMBIENTAL</span>
            </div>
          </div>
          <div style={{width:1,height:20,background:"#21262d",marginRight:16}}/>
          <div style={{flex:1}}/>
          {ABAS.map(a=>(
            <button key={a.id} className={`tab-btn${aba===a.id?" active":""}`} onClick={()=>setAba(a.id)}>
              <span style={{opacity:.6,marginRight:4}}>{a.icon}</span>{a.label}
            </button>
          ))}
          <div style={{width:1,height:20,background:"#21262d",margin:"0 12px"}}/>
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#c9d1d9",fontWeight:500}}>{pfTeam.find(p=>p.email?.toLowerCase()===auth.user.email?.toLowerCase())?.name||auth.user.email}</div>
              <div style={{fontSize:10,color:"#484f58",textTransform:"uppercase",letterSpacing:".06em"}}>{profile==="gerente"?"Gerente":profile==="lider"?"Líder":"Analista"}</div>
            </div>
            {syncErrs.length>0&&(
              <span title={syncErrs.join("\n")} style={{fontSize:11,color:"#f85149",cursor:"help",padding:"2px 8px",background:"#f8514918",border:"1px solid #f8514944",borderRadius:4}}>
                ⚠ Erro ao salvar
              </span>
            )}
            <button className="btn btn-ghost btn-xs" onClick={handleLogout} style={{padding:"4px 10px"}}>⏻ Sair</button>
          </div>
        </div>

        {/* ── Body: sidebar + conteúdo ── */}
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>

          {/* ── Sidebar de clientes ── */}
          <ClienteSidebar
            clientes={clientes} setClientes={setClientes}
            cliAtivo={cliAtivo} setCliAtivo={setCliAtivo}
            planejado={planejado} realizado={realizado} svcMap={svcMap}
          />

          {/* ── Conteúdo principal ── */}
          <div style={{flex:1,padding:20,overflowY:"auto",maxWidth:"100%"}} className="fi">
            {aba==="dashboard"   && <Dashboard   kpis={kpis} realizado={realFilt} amostras={amoFilt} relats={relFilt} svcMap={svcMap} planejado={planFilt} clienteAtivo={clienteAtivo}/>}
            {aba==="areas"       && <CadastroAreas areas={areas} setAreas={setAreas} planejado={planejado} setPlanejado={setPlanejado} servicos={servicos} svcMap={svcMap} clientes={clientes} cliAtivo={cliAtivo}/>}
            {aba==="sondagem"    && <Sondagem    planejado={planejado} setPlanejado={setPlanejado} realizado={realizado} setRealizado={setRealizado} servicos={servicos} svcMap={svcMap} clientes={clientes} cliAtivo={cliAtivo} custosVarConfig={custosVarConfig} setCustosArea={setCustosArea} areas={areas}/>}
            {aba==="laboratorio" && <Laboratorio amostras={amostras} setAmostras={setAmostras} clientes={clientes} cliAtivo={cliAtivo}/>}
            {aba==="relatorios"  && <Relatorios  relats={relats} setRelats={setRelats} amostras={amoFilt} clientes={clientes} cliAtivo={cliAtivo}/>}
            {aba==="custos"      && <Custos custosFixos={custosFixos} setCustosFixos={setCustosFixos} custosArea={custosArea} setCustosArea={setCustosArea} custosVarConfig={custosVarConfig} setCustosVarConfig={setCustosVarConfig} custosPontuais={custosPontuais} setCustosPontuais={setCustosPontuais} areas={areas} realizado={realizado} planejado={planejado} svcMap={svcMap} servicos={servicos} clientes={clientes} cliAtivo={cliAtivo}/>}
            {aba==="medicao"     && <Medicao     realizado={realFilt} planejado={planFilt} svcMap={svcMap} clienteAtivo={clienteAtivo}/>}
            {aba==="relatorio_qtd" && <RelatorioQtd realizado={realFilt} planejado={planFilt} svcMap={svcMap} clientes={clientes} clienteAtivo={clienteAtivo} servicos={servicos}/>}
            {aba==="report_semanal" && <ReportSemanal realizado={realizado} planejado={planejado} amostras={amostras} relats={relats} custosFixos={custosFixos} custosArea={custosArea} areas={areas} servicos={servicos} svcMap={svcMap} clientes={clientes} clienteAtivo={clienteAtivo} profile={profile} relSemanal={relSemanal} setRelSemanal={setRelSemanal}/>}
            {aba==="importar"    && <Importar    setPlanejado={setPlanejado} setAreas={setAreas} areas={areas} servicos={servicos} clientes={clientes} cliAtivo={cliAtivo}/>}
            {aba==="config"      && <Config      servicos={servicos} setServicos={setServicos}/>}
          </div>
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  GRÁFICO PLANEJADO × REALIZADO (SVG nativo, barras duplas por mês)
// ═══════════════════════════════════════════════════════════════════════════
function GraficoPlanReal({planejado, realizado, svcMap, altura=220}){
  // Agrupar por mês
  const dados = useMemo(()=>{
    const meses={};
    planejado.forEach(l=>{
      const m=(l.data||"").slice(0,7);
      if(!m)return;
      if(!meses[m])meses[m]={m,plan:0,real:0};
      meses[m].plan+=(svcMap[l.sid]?.valor||0)*l.qtd;
    });
    realizado.forEach(l=>{
      const m=(l.data||"").slice(0,7);
      if(!m)return;
      if(!meses[m])meses[m]={m,plan:0,real:0};
      meses[m].real+=(svcMap[l.sid]?.valor||0)*l.qtd;
    });
    return Object.values(meses).sort((a,b)=>a.m.localeCompare(b.m));
  },[planejado,realizado,svcMap]);

  if(!dados.length) return(
    <div style={{height:altura,display:"flex",alignItems:"center",justifyContent:"center",color:"#484f58",fontSize:12}}>
      Nenhum dado para exibir
    </div>
  );

  const maxVal = Math.max(...dados.map(d=>Math.max(d.plan,d.real)),1);
  const W=700, H=altura, PAD={top:20,right:20,bottom:48,left:72};
  const plotW=W-PAD.left-PAD.right;
  const plotH=H-PAD.top-PAD.bottom;
  const n=dados.length;
  const groupW=plotW/n;
  const barW=Math.min(groupW*0.35,32);
  const gap=barW*0.3;

  // Linhas de grade
  const ticks=5;
  const gridLines=Array.from({length:ticks+1},(_,i)=>i*(maxVal/ticks));

  const y=v=>PAD.top+plotH-(v/maxVal)*plotH;
  const xGroup=i=>PAD.left+i*groupW+groupW/2;

  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:altura,overflow:"visible"}}>
      {/* Grid lines */}
      {gridLines.map((v,i)=>(
        <g key={i}>
          <line x1={PAD.left} y1={y(v)} x2={W-PAD.right} y2={y(v)} stroke="#21262d" strokeWidth="1"/>
          <text x={PAD.left-8} y={y(v)+4} textAnchor="end" fontSize="10" fill="#484f58" fontFamily="IBM Plex Mono">
            {v>=1000?`${(v/1000).toFixed(0)}k`:v.toFixed(0)}
          </text>
        </g>
      ))}

      {/* Eixo X */}
      <line x1={PAD.left} y1={PAD.top+plotH} x2={W-PAD.right} y2={PAD.top+plotH} stroke="#30363d" strokeWidth="1"/>

      {/* Barras + labels */}
      {dados.map((d,i)=>{
        const cx=xGroup(i);
        const hPlan=Math.max((d.plan/maxVal)*plotH,2);
        const hReal=Math.max((d.real/maxVal)*plotH,2);
        const xPlan=cx-gap/2-barW;
        const xReal=cx+gap/2;
        const isAtual=d.m===hoje().slice(0,7);
        return(
          <g key={d.m}>
            {/* Barra planejado */}
            <rect x={xPlan} y={y(d.plan)} width={barW} height={hPlan} rx="2" fill="#388bfd" opacity={isAtual?1:.65}/>
            {/* Barra realizado */}
            <rect x={xReal} y={y(d.real)} width={barW} height={hReal} rx="2" fill="#3fb950" opacity={isAtual?1:.65}/>
            {/* Delta line */}
            {d.plan>0&&d.real>0&&(
              <line x1={xPlan+barW/2} y1={y(d.plan)} x2={xReal+barW/2} y2={y(d.real)}
                stroke={d.real>=d.plan?"#3fb95066":"#f8514966"} strokeWidth="1.5" strokeDasharray="3 2"/>
            )}
            {/* Label mês */}
            <text x={cx} y={H-PAD.bottom+14} textAnchor="middle" fontSize="10" fill={isAtual?"#c9d1d9":"#484f58"} fontFamily="IBM Plex Mono">
              {d.m.slice(5)}
            </text>
            {/* Valores topo */}
            {d.plan>0&&<text x={xPlan+barW/2} y={y(d.plan)-4} textAnchor="middle" fontSize="9" fill="#388bfd" fontFamily="IBM Plex Mono">
              {d.plan>=1000?`${(d.plan/1000).toFixed(0)}k`:d.plan.toFixed(0)}
            </text>}
            {d.real>0&&<text x={xReal+barW/2} y={y(d.real)-4} textAnchor="middle" fontSize="9" fill="#3fb950" fontFamily="IBM Plex Mono">
              {d.real>=1000?`${(d.real/1000).toFixed(0)}k`:d.real.toFixed(0)}
            </text>}
          </g>
        );
      })}

      {/* Legenda */}
      <g transform={`translate(${PAD.left},${H-10})`}>
        <rect x="0" y="-8" width="10" height="10" rx="2" fill="#388bfd"/>
        <text x="14" y="0" fontSize="10" fill="#8b949e" fontFamily="IBM Plex Sans">Planejado</text>
        <rect x="80" y="-8" width="10" height="10" rx="2" fill="#3fb950"/>
        <text x="94" y="0" fontSize="10" fill="#8b949e" fontFamily="IBM Plex Sans">Realizado</text>
      </g>
    </svg>
  );
}

//  SIDEBAR DE CLIENTES — sempre visível à esquerda
// ═══════════════════════════════════════════════════════════════════════════
function ClienteSidebar({clientes,setClientes,cliAtivo,setCliAtivo,planejado,realizado,svcMap}){
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const empty={nome:"",cnpj:"",contato:"",email:"",diaCorte:"20",contrato:"",obs:""};
  const [f,setF]=useState(empty);

  const salvar=()=>{
    if(!f.nome)return;
    if(editId){setClientes(c=>c.map(x=>x.id===editId?{...f,id:editId}:x));setEditId(null);}
    else setClientes(c=>[...c,{...f,id:uid()}]);
    setF(empty);setShowForm(false);
  };
  const editar=c=>{setF(c);setEditId(c.id);setShowForm(true);};
  const del=id=>{setClientes(c=>c.filter(x=>x.id!==id));if(cliAtivo===id)setCliAtivo(null);};

  const stats=cid=>({
    p:planejado.filter(l=>l.cliId===cid).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0),
    r:realizado.filter(l=>l.cliId===cid).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0),
  });

  return(
    <div style={{
      width:260,minWidth:260,background:"#0d1117",borderRight:"1px solid #21262d",
      display:"flex",flexDirection:"column",overflowY:"auto",
      position:"sticky",top:52,height:"calc(100vh - 52px)"
    }}>
      {/* Header sidebar */}
      <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #21262d",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:11,fontWeight:600,color:"#484f58",letterSpacing:.08*14+"px",textTransform:"uppercase"}}>Clientes</span>
        <button
          className="btn btn-primary btn-xs"
          onClick={()=>{setF(empty);setEditId(null);setShowForm(true);}}
          title="Novo cliente"
        >+</button>
      </div>

      {/* "Todos" */}
      <button
        onClick={()=>setCliAtivo(null)}
        style={{
          display:"flex",alignItems:"center",gap:10,padding:"10px 16px",
          background:!cliAtivo?"#161b22":"transparent",
          border:"none",borderBottom:"1px solid #21262d",cursor:"pointer",
          textAlign:"left",transition:"background .15s",width:"100%",
        }}
      >
        <div style={{width:28,height:28,borderRadius:"50%",background:!cliAtivo?"#1f6feb":"#21262d",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>
          ⊞
        </div>
        <div>
          <div style={{fontSize:12,fontWeight:500,color:!cliAtivo?"#c9d1d9":"#8b949e"}}>Todos os clientes</div>
          <div style={{fontSize:10,color:"#484f58"}}>{clientes.length} cadastrados</div>
        </div>
      </button>

      {/* Lista de clientes */}
      <div style={{flex:1,overflowY:"auto"}}>
        {clientes.map(c=>{
          const s=stats(c.id);
          const isAtivo=cliAtivo===c.id;
          const ciclo=periodoCiclo(c.diaCorte);
          const avanco=s.p>0?Math.min((s.r/s.p)*100,100):0;
          const ini=c.nome.slice(0,2).toUpperCase();
          return(
            <div key={c.id}
              style={{
                borderBottom:"1px solid #161b22",
                background:isAtivo?"#161b22":"transparent",
                borderLeft:`3px solid ${isAtivo?"#388bfd":"transparent"}`,
                transition:"all .15s",
              }}
            >
              {/* Linha principal clicável */}
              <button
                onClick={()=>setCliAtivo(isAtivo?null:c.id)}
                style={{
                  display:"flex",alignItems:"center",gap:10,padding:"10px 14px 8px 13px",
                  background:"transparent",border:"none",cursor:"pointer",
                  textAlign:"left",width:"100%",
                }}
              >
                <div style={{
                  width:28,height:28,borderRadius:"50%",flexShrink:0,
                  background:isAtivo?"#1f6feb":"#21262d",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:10,fontWeight:600,color:isAtivo?"#fff":"#8b949e",
                  fontFamily:"'IBM Plex Mono'",
                }}>{ini}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,color:isAtivo?"#c9d1d9":"#8b949e",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nome}</div>
                  <div style={{fontSize:10,color:"#484f58",marginTop:1}}>
                    Corte: dia {c.diaCorte}
                    {c.contrato&&<span style={{marginLeft:6,color:"#30363d"}}>{c.contrato}</span>}
                  </div>
                </div>
                {isAtivo&&<span style={{width:6,height:6,borderRadius:"50%",background:"#388bfd",flexShrink:0}}/>}
              </button>

              {/* Detalhes expandidos quando ativo */}
              {isAtivo&&(
                <div style={{padding:"0 14px 10px 14px"}}>
                  {/* Ciclo */}
                  <div style={{padding:"6px 10px",background:"#0d1117",borderRadius:4,marginBottom:8,border:"1px solid #21262d"}}>
                    <div style={{fontSize:9,color:"#d29922",fontWeight:600,marginBottom:2,letterSpacing:1}}>CICLO ATUAL</div>

                  {/* Financeiro mini */}

                      <div style={{fontFamily:"'IBM Plex Mono'",fontSize:11,color:"#3fb950",fontWeight:500}}>R$ {s.r>=1000?`${(s.r/1000).toFixed(0)}k`:s.r.toFixed(0)}</div>

                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#484f58",marginBottom:8}}>
                    <span>Avanço</span><span style={{fontFamily:"'IBM Plex Mono'"}}>{fmtN(avanco)}%</span>
                  </div>
                  {/* Ações */}

function LancList({label,itens,setItens,servicos,svcMap,clientes,cliAtivo,ac,bc,isRealizado,planejado,custosVarConfig,setCustosArea,areas:areasCadastradas}){
  const svcF=servicos;
  const emptyLinha=()=>newLinhaVazia(svcF,cliAtivo);

  const [linhas,setLinhas]=useState([emptyLinha()]);
  const [modalPlan,setModalPlan]=useState(null); // item planejado sendo confirmado
  const [filtroArea,setFiltroArea]=useState("");
  const [filtroStatus,setFiltroStatus]=useState("todos"); // "todos"|"pendentes"|"realizados"

  useEffect(()=>{
    setLinhas(ls=>ls.map(l=>({...l,cliId:cliAtivo||""})));
  },[cliAtivo]);

  const setLinha=(idx,campo,valor)=>setLinhas(ls=>ls.map((l,i)=>i===idx?{...l,[campo]:valor}:l));
  const addLinha=()=>setLinhas(ls=>[...ls,emptyLinha()]);
  const remLinha=idx=>setLinhas(ls=>ls.filter((_,i)=>i!==idx));

  // Resolve areaId pelo nome da área cadastrada
  const resolveAreaId = useCallback((nomeArea, areaIdDireto) => {
    if(areaIdDireto) return areaIdDireto;
    if(nomeArea && Array.isArray(areasCadastradas)){
      const found = areasCadastradas.find(a=>
        a.nome === nomeArea ||
        (a.nome||"").toUpperCase() === (nomeArea||"").toUpperCase()
      );
      if(found) return found.id;
    }
    return null;
  }, [areasCadastradas]);

  // Dispara regras de custo variável — usa props diretamente (sem refs)
  const dispararCustosVar = useCallback((dados) => {
    const config = custosVarConfig;
    const setter = setCustosArea;
    if(!Array.isArray(config) || config.length === 0 || !setter) return;
    const regras = config.filter(r => {
      const ativo = r.ativo===true || r.ativo==="true" || r.ativo===1;
      return ativo && String(r.sid) === String(dados.sid);
    });
    if(regras.length === 0) return;
    const areaId = resolveAreaId(dados.area, dados.areaId);
    const qtd = parseFloat(dados.qtd || 0);
    if(qtd <= 0) return;
    const novos = regras
      .map(regra => {
        const vpu = parseFloat(regra.valorPorUnidade || regra.valor_por_unidade || 0);
        const valor = vpu * qtd;
        if(!valor || isNaN(valor) || valor <= 0) return null;
        return {
          id: uid(),
          areaId: areaId,
          cat: regra.categoria || "Insumos de Sondagem",
          descricao: `${regra.nome}${dados.area ? " — " + dados.area : ""}`,
          valor,
          data: dados.data || hoje(),
          realizadoId: dados.id,
        };
      })
      .filter(Boolean);
    if(novos.length > 0) setter(a => [...novos, ...a]);
  }, [custosVarConfig, setCustosArea, resolveAreaId]);

  const lancar = () => {
    const validas = linhas.filter(l=>l.sid&&l.qtd&&l.data);
    if(validas.length === 0) return;
    const novos = validas.map(l=>({...l, id:uid(), qtd:parseFloat(l.qtd)}));
    setItens(p=>[...novos,...p]);
    setLinhas([emptyLinha()]);
    if(isRealizado) novos.forEach(item => dispararCustosVar(item));
  };

  const confirmarRealizacao = (dados) => {
    setItens(p=>[dados,...p]);
    setModalPlan(null);
    dispararCustosVar(dados);
  };

  const del=id=>{
    setItens(p=>p.filter(l=>l.id!==id));
    // Remove custos variáveis vinculados a este lançamento
    if(setCustosArea) setCustosArea(a=>a.filter(c=>c.realizadoId!==id));
  };

  // No modo realizado: mescla planejados (pendentes) + realizados na mesma lista
  const planFilt=isRealizado
    ?(cliAtivo?planejado.filter(l=>l.cliId===cliAtivo):planejado)
    :[];

  const realizadosFilt=cliAtivo?itens.filter(l=>l.cliId===cliAtivo):itens;

  // IDs de planejados já confirmados
  const planConfirmados=new Set(realizadosFilt.map(r=>r.planId).filter(Boolean));

  // Planejados ainda pendentes
  const planPendentes=planFilt.filter(p=>!planConfirmados.has(p.id));

  // Para o planejado puro (não-realizado), lista normal
  const listaFilt=realizadosFilt;

  // Todas as áreas (realizados + planejados pendentes)
  const areas=[...new Set([
    ...listaFilt.map(l=>l.area),
    ...(isRealizado?planPendentes.map(l=>l.area):[]),
  ].filter(Boolean))].sort();

  // Monta lista mesclada por mês
  const listaComPendentes=isRealizado
    ?[
        ...listaFilt.map(l=>({...l,_tipo:"realizado"})),
        ...planPendentes.map(l=>({...l,_tipo:"planejado"})),
      ]
    :listaFilt.map(l=>({...l,_tipo:"realizado"}));

  const listaFiltrada=listaComPendentes.filter(l=>{
    const areaOk=!filtroArea||l.area===filtroArea;
    const statusOk=filtroStatus==="todos"
      ||(filtroStatus==="pendentes"&&l._tipo==="planejado")
      ||(filtroStatus==="realizados"&&l._tipo==="realizado");
    return areaOk&&statusOk;
  });

  const porMes={};
  listaFiltrada.forEach(l=>{
    const m=(l.data||"").slice(0,7)||"?";
    if(!porMes[m])porMes[m]=[];
    porMes[m].push(l);
  });
  const meses=Object.keys(porMes).sort().reverse();

  const nPendentes=isRealizado?planPendentes.length:0;

  return(
    <div style={{display:"grid",gap:14}}>

      {/* Modal de confirmação */}
      {modalPlan&&(
        <ModalConfirmar
          plan={modalPlan}
          svcMap={svcMap}
          clientes={clientes}
          onConfirmar={confirmarRealizacao}
          onCancelar={()=>setModalPlan(null)}
        />
      )}

      {/* Formulário multi-linha */}
      <div className={`card ${ac}`} style={{padding:"16px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div className="sl">LANÇAR — {label}</div>
          <button className="btn btn-ghost btn-xs" onClick={addLinha}>+ Linha</button>
        </div>

        <div style={{display:"grid",gap:8}}>
          {linhas.map((f,idx)=>(
            <div key={idx} style={{display:"grid",gridTemplateColumns:"120px 130px 1fr 80px 140px 1fr auto",gap:8,alignItems:"end",padding:linhas.length>1?"8px 10px 0 10px":0,borderTop:linhas.length>1&&idx>0?"1px solid #21262d22":undefined}}>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>DATA</div>}
                <input type="date" className="inp" value={f.data} onChange={e=>setLinha(idx,"data",e.target.value)}/>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>ÁREA</div>}
                <input className="inp" placeholder="Área A" value={f.area} onChange={e=>setLinha(idx,"area",e.target.value)} list={`alist${idx}`}/>
                <datalist id={`alist${idx}`}>{areas.map(a=><option key={a} value={a}/>)}</datalist>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>SERVIÇO</div>}
                <select className="inp" value={f.sid} onChange={e=>setLinha(idx,"sid",e.target.value)}>
                  {svcF.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
                </select>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>QTDE</div>}
                <input type="number" className="inp" placeholder="0" min="0" step="0.5" value={f.qtd} onChange={e=>setLinha(idx,"qtd",e.target.value)}/>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>}
                <select className="inp" value={f.cliId} onChange={e=>setLinha(idx,"cliId",e.target.value)}>
                  <option value="">— Sem cliente —</option>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
                </select>
              </div>
              <div>
                {idx===0&&<div style={{fontSize:10,color:"#484f58",marginBottom:4}}>OBSERVAÇÃO</div>}
                <input className="inp" placeholder="Opcional" value={f.obs} onChange={e=>setLinha(idx,"obs",e.target.value)}/>
              </div>
              <div style={{display:"flex",gap:4}}>
                {linhas.length>1&&(
                  <button className="btn btn-danger btn-xs" style={{alignSelf:"flex-end"}} onClick={()=>remLinha(idx)} title="Remover linha">✕</button>
                )}
              </div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12}}>
          <span style={{fontSize:11,color:"#484f58"}}>
            {linhas.length>1?`${linhas.length} atividades a lançar`:""}
          </span>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={addLinha}>+ Adicionar linha</button>
            <button className={`btn ${bc}`} onClick={lancar}>
              {linhas.length>1?`↑ Lançar ${linhas.length} atividades`:"+ Lançar"}
            </button>
          </div>
        </div>
      </div>

      {/* Filtros */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {isRealizado&&(
            <>
              {[
                {id:"todos",    l:`Todos ${listaComPendentes.length>0?`(${listaComPendentes.length})`:""}`},
                {id:"pendentes",l:`⧖ Aguardando${nPendentes>0?` (${nPendentes})`:""}`},
                {id:"realizados",l:"✓ Realizados"},
              ].map(f=>(
                <button key={f.id} className="btn btn-ghost btn-sm"
                  onClick={()=>setFiltroStatus(f.id)}
                  style={filtroStatus===f.id?{borderColor:f.id==="pendentes"?"#d29922":"#388bfd",color:f.id==="pendentes"?"#d29922":"#388bfd"}:{}}>
                  {f.l}
                </button>
              ))}
              {nPendentes>0&&<span style={{width:1,height:16,background:"#21262d"}}/>}
            </>
          )}
          {areas.length>0&&(
            <>
              <span style={{fontSize:11,color:"#484f58"}}>Área:</span>
              {["", ...areas].map(a=>(
                <button key={a||"__"} className="btn btn-ghost btn-sm"
                  onClick={()=>setFiltroArea(a)}
                  style={filtroArea===a?{borderColor:"#388bfd",color:"#388bfd"}:{}}>
                  {a||"Todas"}
                </button>
              ))}
            </>
          )}
        </div>
      </div>

      {/* Lista por mês */}
      {meses.map(mes=>{
        const rows=porMes[mes].sort((a,b)=>{
          // Planejados primeiro, depois por data desc
          if(a._tipo!==b._tipo) return a._tipo==="planejado"?-1:1;
          return (b.data||"").localeCompare(a.data||"");
        });
        const totReal=rows.filter(r=>r._tipo==="realizado").reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
        const totPlan=rows.filter(r=>r._tipo==="planejado").reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
        const nPend=rows.filter(r=>r._tipo==="planejado").length;
        const mts=rows.filter(l=>l._tipo==="realizado"&&svcMap[l.sid]?.unidade==="m").reduce((a,l)=>a+l.qtd,0);
        return(
          <div key={mes} className="card" style={{padding:"14px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span className="mono" style={{color:"#c9d1d9",fontWeight:600}}>{mes}</span>
                {mts>0&&<span className="badge bb">{fmtN(mts)} m</span>}
                {isRealizado&&nPend>0&&<span className="badge bo">{nPend} pendente{nPend!==1?"s":""}</span>}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                {isRealizado&&totPlan>0&&<span className="mono" style={{fontSize:11,color:"#484f58"}}>Plan: R$ {fmt(totPlan)}</span>}
                <span className="mono" style={{color:"#d29922"}}>R$ {fmt(totReal)}</span>
              </div>
            </div>
            <table className="table">
              <thead>
                <tr>
                  <th>DATA</th><th>ÁREA</th><th>SERVIÇO</th><th>CLIENTE</th><th>QTDE</th>
                  <th>V.UNIT.</th><th>TOTAL</th><th>OBS</th><th/>
                </tr>
              </thead>
              <tbody>
                {rows.map(l=>{
                  const s=svcMap[l.sid]||{};
                  const cor=COR[l.sid]||"#8b949e";
                  const cli=clientes.find(c=>c.id===l.cliId);
                  const isPend=l._tipo==="planejado";

                  if(isPend){
                    // Linha "planejada" — clicável para confirmar
                    return(
                      <tr key={"p_"+l.id}
                        onClick={()=>setModalPlan(l)}
                        style={{cursor:"pointer",background:"#388bfd08",opacity:.85}}
                        title="Clique para confirmar a realização"
                      >
                        <td className="mono" style={{fontSize:11,color:"#388bfd66"}}>{l.data}</td>
                        <td><span className="badge bg" style={{opacity:.7}}>{l.area||"—"}</span></td>
                        <td>
                          <span style={{display:"inline-flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span className="badge" style={{background:cor+"15",color:cor+"88",border:`1px dashed ${cor}44`}}>{s.nome}</span>
                            <span className="badge" style={{background:"#388bfd18",color:"#388bfd",border:"1px solid #388bfd44",fontSize:10}}>⧖ PLANEJADO</span>
                          </span>
                        </td>
                        <td>{cli?<span className="badge bb" style={{opacity:.6}}>{cli.nome}</span>:<span style={{color:"#30363d",fontSize:11}}>—</span>}</td>
                        <td className="mono" style={{color:"#388bfd77"}}>{fmtN(l.qtd)} {s.unidade}</td>
                        <td className="mono" style={{color:"#484f58"}}>{s.valor>0?`R$ ${fmt(s.valor)}`:"—"}</td>
                        <td className="mono" style={{color:"#484f5888"}}>{s.valor>0?`R$ ${fmt(s.valor*l.qtd)}`:"—"}</td>
                        <td style={{color:"#484f58",fontSize:11}}>{l.obs}</td>
                        <td>
                          <button className="btn btn-primary btn-xs"
                            onClick={e=>{e.stopPropagation();setModalPlan(l);}}
                            title="Confirmar realização"
                          >✓ Confirmar</button>
                        </td>
                      </tr>
                    );
                  }

                  // Linha realizada normal
                  return(
                    <tr key={l.id}>
                      <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{l.data}</td>
                      <td><span className="badge bg">{l.area||"—"}</span></td>
                      <td>
                        <span style={{display:"inline-flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span className="badge" style={{background:cor+"22",color:cor,border:`1px solid ${cor}44`}}>{s.nome}</span>
                          {l.planId&&<span className="badge bgn" style={{fontSize:10}}>✓ do planejado</span>}
                        </span>
                      </td>
                      <td>{cli?<span className="badge bb">{cli.nome}</span>:<span style={{color:"#30363d",fontSize:11}}>—</span>}</td>
                      <td className="mono">{fmtN(l.qtd)} {s.unidade}</td>
                      <td className="mono" style={{color:"#484f58"}}>{s.valor>0?`R$ ${fmt(s.valor)}`:"—"}</td>
                      <td className="mono" style={{color:"#d29922"}}>{s.valor>0?`R$ ${fmt(s.valor*l.qtd)}`:"—"}</td>
                      <td style={{color:"#484f58",fontSize:11}}>{l.obs}</td>
                      <td><button className="btn btn-danger btn-xs" onClick={()=>del(l.id)}>✕</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })}

      {listaFiltrada.length===0&&(
        <div className="card" style={{padding:36,textAlign:"center",color:"#484f58"}}>
          {isRealizado&&filtroStatus==="pendentes"
            ?"Nenhum planejamento pendente de confirmação"
            :`Nenhum lançamento${cliAtivo?" para este cliente":""}`
          }
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  LABORATÓRIO
// ═══════════════════════════════════════════════════════════════════════════
function Laboratorio({amostras,setAmostras,clientes,cliAtivo}){
  const [showF,setShowF]=useState(false);
  const [editId,setEditId]=useState(null);
  const [filtro,setFiltro]=useState("todos");
  const [saveMsg,setSaveMsg]=useState(null);
  // Modal para laudo quando muda para Em Análise
  const [modalLaudo,setModalLaudo]=useState(null); // {id, dataLaudo, prazoLaudo}
  const empty={area:"",ponto:"",prof:"",tipo:"Solo",lab:"",nfe:"",dataColeta:hoje(),dataEnvio:"",prazoLaudo:"",dataLaudo:"",status:"coletado",obs:"",cliId:cliAtivo||""};
  const [f,setF]=useState(empty);
  useEffect(()=>setF(x=>({...x,cliId:cliAtivo||""})),[cliAtivo]);

  const salvar=()=>{
    if(!f.area||!f.ponto){
      setSaveMsg({tipo:"err",txt:"Preencha Área e Ponto de Sondagem antes de salvar."});
      setTimeout(()=>setSaveMsg(null),4000);
      return;
    }
    if(editId){setAmostras(a=>a.map(x=>x.id===editId?{...f,id:editId}:x));setEditId(null);}
    else setAmostras(a=>[{...f,id:uid()},...a]);
    setF(empty);setShowF(false);
    setSaveMsg({tipo:"ok",txt:editId?"Amostra atualizada!":"Amostra cadastrada!"});
    setTimeout(()=>setSaveMsg(null),3000);
  };
  const editar=a=>{setF(a);setEditId(a.id);setShowF(true);};
  const del=id=>setAmostras(a=>a.filter(x=>x.id!==id));

  // Atualiza campo inline direto na tabela
  const updCampo=(id,campo,valor)=>setAmostras(a=>a.map(x=>x.id===id?{...x,[campo]:valor}:x));

  // Muda status com automações:
  // → enviado: preenche dataEnvio com hoje
  // → em_analise: abre modal para informar dataLaudo + prazoLaudo
  // → laudo_ok: preenche dataLaudo com hoje (se vazia)
  const updSt=(id,st)=>{
    const amo=amostras.find(x=>x.id===id);
    if(!amo) return;
    if(st==="enviado"){
      setAmostras(a=>a.map(x=>x.id===id?{...x,status:st,dataEnvio:x.dataEnvio||hoje()}:x));
    } else if(st==="em_analise"){
      // Abre modal para preencher laudo e prazo
      setModalLaudo({id, dataLaudo:amo.dataLaudo||hoje(), prazoLaudo:amo.prazoLaudo||""});
      setAmostras(a=>a.map(x=>x.id===id?{...x,status:st}:x));
    } else if(st==="laudo_ok"){
      setAmostras(a=>a.map(x=>x.id===id?{...x,status:st,dataLaudo:x.dataLaudo||hoje()}:x));
    } else {
      setAmostras(a=>a.map(x=>x.id===id?{...x,status:st}:x));
    }
  };

  const confirmarLaudo=()=>{
    if(!modalLaudo) return;
    setAmostras(a=>a.map(x=>x.id===modalLaudo.id?{...x,dataLaudo:modalLaudo.dataLaudo,prazoLaudo:modalLaudo.prazoLaudo}:x));
    setModalLaudo(null);
  };

  const amoFilt=cliAtivo?amostras.filter(a=>a.cliId===cliAtivo):amostras;
  const lista=filtro==="todos"?amoFilt:amoFilt.filter(a=>a.status===filtro);
  const porArea={};
  lista.forEach(a=>{const k=a.area||"Sem Área";if(!porArea[k])porArea[k]=[];porArea[k].push(a);});

  // Estilo para célula editável inline
  const inpInline={background:"transparent",border:"none",borderBottom:"1px solid #30363d",color:"#c9d1d9",fontSize:11,padding:"2px 4px",width:"100%",fontFamily:"'IBM Plex Mono',monospace",outline:"none"};
  const inpInlineFocus="border-bottom-color:#388bfd";

  return(
    <div style={{display:"grid",gap:16}}>

      {/* Modal Em Análise → preenche laudo + prazo */}
      {modalLaudo&&(
        <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"#000a"}}>
          <div className="card" style={{width:420,padding:"22px 24px",border:"1px solid #388bfd44",boxShadow:"0 8px 40px #000a"}}>
            <div className="sl" style={{marginBottom:12}}>⟳ EM ANÁLISE — REGISTRAR LAUDO</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              <div>
                <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>PRAZO DO LAUDO (dias a partir do envio)</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input type="number" className="inp" min="1" max="365" placeholder="Ex: 30"
                    value={modalLaudo.diasPrazo||""}
                    onChange={e=>setModalLaudo(x=>({...x,diasPrazo:e.target.value,
                      prazoLaudo:e.target.value?addDias(amostras.find(a=>a.id===x.id)?.dataEnvio,e.target.value):""
                    }))}
                    autoFocus style={{width:90}}/>
                  {modalLaudo.prazoLaudo&&<span className="mono" style={{fontSize:11,color:"#d29922"}}>{modalLaudo.prazoLaudo}</span>}
                </div>
              </div>
              <div>
                <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>DATA RECEBIMENTO (estimada)</div>
                <input type="date" className="inp" value={modalLaudo.dataLaudo}
                  onChange={e=>setModalLaudo(x=>({...x,dataLaudo:e.target.value}))}/>
              </div>
            </div>
            <div style={{fontSize:11,color:"#484f58",marginBottom:14}}>
              Esses campos ficam visíveis na coluna LAUDO e PRAZO da tabela.
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-ghost" onClick={()=>setModalLaudo(null)}>Pular</button>
              <button className="btn btn-primary" onClick={confirmarLaudo}>✓ Salvar</button>
            </div>
          </div>
        </div>
      )}

      {saveMsg&&(
        <div style={{padding:"10px 16px",borderRadius:6,background:saveMsg.tipo==="ok"?"#23863618":"#f8514918",border:`1px solid ${saveMsg.tipo==="ok"?"#23863644":"#f8514944"}`,color:saveMsg.tipo==="ok"?"#3fb950":"#f85149",fontSize:13,fontWeight:500}}>
          {saveMsg.tipo==="ok"?"✓":"⚠"} {saveMsg.txt}
        </div>
      )}

      {/* Pipeline */}
      <div className="card" style={{padding:"16px 18px"}}>
        <div className="sl" style={{marginBottom:14}}>PIPELINE LABORATORIAL</div>
        <div style={{display:"flex",alignItems:"center"}}>
          {ST_LAB.filter(s=>s.id!=="reprovado").map((s,i,arr)=>{
            const n=amoFilt.filter(a=>a.status===s.id).length;
            const past=amoFilt.some(a=>{const mi=ST_LAB.findIndex(x=>x.id===a.status);const si=ST_LAB.findIndex(x=>x.id===s.id);return mi>si;});
            return(
              <div key={s.id} style={{display:"flex",alignItems:"center",flex:1}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,minWidth:90}}>
                  <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,background:past?"#238636":n>0?"#1f6feb":"#21262d",border:`2px solid ${past?"#2ea043":n>0?"#388bfd":"#30363d"}`,zIndex:1}}>{s.icon}</div>
                  <div style={{fontSize:11,color:"#8b949e",textAlign:"center"}}>{s.label}</div>
                  <div className="mono" style={{fontSize:18,color:n>0?"#3fb950":"#30363d",fontWeight:600}}>{n}</div>
                </div>
                {i<arr.length-1&&<div style={{flex:1,height:2,background:past?"#238636":"#21262d",marginTop:-28,zIndex:0}}/>}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[{id:"todos",label:"Todas"},...ST_LAB].map(s=>(
            <button key={s.id} className="btn btn-ghost btn-sm" onClick={()=>setFiltro(s.id)} style={filtro===s.id?{borderColor:"#388bfd",color:"#388bfd"}:{}}>
              {s.label} {s.id!=="todos"&&<span className="badge bg" style={{marginLeft:4}}>{amoFilt.filter(a=>a.status===s.id).length}</span>}
            </button>
          ))}
        </div>
        <button className="btn btn-primary" onClick={()=>{setF({...empty,cliId:cliAtivo||""});setEditId(null);setShowF(true);}}>+ Nova Amostra</button>
      </div>

      {showF&&(
        <div className="card ca-blue" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>{editId?"EDITAR":"NOVA"} AMOSTRA</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {[
              {k:"area",      l:"ÁREA / SETOR",     t:"text",ph:"Área A"},
              {k:"ponto",     l:"PONTO SONDAGEM",   t:"text",ph:"SPT-03"},
              {k:"prof",      l:"PROFUNDIDADE",     t:"text",ph:"2,0–2,5 m"},
              {k:"tipo",      l:"TIPO",             t:"sel", opts:["Solo","Água","Sedimento","Biota","Gás"]},
              {k:"lab",       l:"LABORATÓRIO",      t:"text",ph:"Nome do laboratório"},
              {k:"nfe",       l:"NF-e / REMESSA",   t:"text",ph:"NF 001/2024"},
              {k:"status",    l:"STATUS",           t:"sel", opts:ST_LAB.map(s=>s.id),labels:ST_LAB.map(s=>s.label)},
              {k:"dataColeta",l:"DATA COLETA",      t:"date"},
              {k:"dataEnvio", l:"DATA ENVIO",       t:"date"},
              {k:"prazoLaudo",l:"PRAZO LAUDO (data calculada)", t:"date"},
              {k:"dataLaudo", l:"DATA LAUDO REC.",  t:"date"},
            ].map(fd=>(
              <div key={fd.k}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>{fd.l}</div>
                {fd.t==="sel"
                  ?<select className="inp" value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}>{fd.opts.map((o,i)=><option key={o} value={o}>{fd.labels?fd.labels[i]:o}</option>)}</select>
                  :<input type={fd.t} className="inp" placeholder={fd.ph} value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}/>
                }
              </div>
            ))}
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>
              <select className="inp" value={f.cliId} onChange={e=>setF(x=>({...x,cliId:e.target.value}))}>
                <option value="">— Sem cliente —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>OBSERVAÇÕES</div>
              <input className="inp" placeholder="Obs" value={f.obs} onChange={e=>setF(x=>({...x,obs:e.target.value}))}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:14}}>
            <button className="btn btn-primary" onClick={salvar}>✓ Salvar</button>
            <button className="btn btn-ghost" onClick={()=>{setShowF(false);setEditId(null);}}>Cancelar</button>
          </div>
        </div>
      )}

      {Object.keys(porArea).sort().map(area=>{
        const its=porArea[area];
        const ldOK=its.filter(a=>a.status==="laudo_ok").length;
        return(
          <div key={area} className="card" style={{padding:"14px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontWeight:600,color:"#c9d1d9",fontSize:14}}>{area}</span>
                <span className="badge bg">{its.length} amostras</span>
                {ldOK>0&&<span className="badge bgn">{ldOK} laudos OK</span>}
              </div>
              <div style={{fontSize:10,color:"#484f58"}}>Clique nos campos para editar direto na tabela</div>
            </div>
            <div style={{overflowX:"auto"}}>
            <table className="table">
              <thead><tr><th>PONTO</th><th>PROF.</th><th>TIPO</th><th>LAB.</th><th>NF-e</th><th>COLETA</th><th>ENVIO</th><th>PRAZO</th><th>LAUDO REC.</th><th>⌀</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
              <tbody>
                {its.map(a=>{
                  const tl=diffD(a.dataEnvio,a.dataLaudo);
                  const dp=a.prazoLaudo&&a.status!=="laudo_ok"?diffD(hoje(),a.prazoLaudo):null;
                  return(
                    <tr key={a.id}>
                      {/* PONTO — editável inline */}
                      <td><input style={{...inpInline,color:"#388bfd",fontWeight:600,width:64}} value={a.ponto||""} onChange={e=>updCampo(a.id,"ponto",e.target.value)} onBlur={e=>updCampo(a.id,"ponto",e.target.value)} placeholder="SD-01"/></td>
                      {/* PROF — editável inline */}
                      <td><input style={{...inpInline,width:56,color:"#8b949e"}} value={a.prof||""} onChange={e=>updCampo(a.id,"prof",e.target.value)} placeholder="—"/></td>
                      {/* TIPO — select inline */}
                      <td>
                        <select style={{background:"transparent",border:"none",borderBottom:"1px solid #30363d",color:"#8b949e",fontSize:11,cursor:"pointer",padding:"2px 2px"}} value={a.tipo||"Solo"} onChange={e=>updCampo(a.id,"tipo",e.target.value)}>
                          {["Solo","Água","Sedimento","Biota","Gás"].map(t=><option key={t}>{t}</option>)}
                        </select>
                      </td>
                      {/* LAB — editável inline */}
                      <td><input style={{...inpInline,width:80,color:"#8b949e"}} value={a.lab||""} onChange={e=>updCampo(a.id,"lab",e.target.value)} placeholder="Lab"/></td>
                      {/* NF-e — editável inline */}
                      <td><input style={{...inpInline,width:72,color:"#8b949e"}} value={a.nfe||""} onChange={e=>updCampo(a.id,"nfe",e.target.value)} placeholder="NF"/></td>
                      {/* COLETA — date inline */}
                      <td><input type="date" style={{...inpInline,width:108}} value={a.dataColeta||""} onChange={e=>updCampo(a.id,"dataColeta",e.target.value)}/></td>
                      {/* ENVIO — date inline (preenchido auto ao mudar p/ Enviado) */}
                      <td><input type="date" style={{...inpInline,width:108,color:a.dataEnvio?"#c9d1d9":"#484f58"}} value={a.dataEnvio||""} onChange={e=>updCampo(a.id,"dataEnvio",e.target.value)}/></td>
                      {/* PRAZO — entra em dias, calcula data automaticamente */}
                      <td>
                        {a.prazoLaudo
                          ?<span className={`badge ${dp===null?"bg":dp<0?"br":dp<5?"bo":"bgn"}`} style={{cursor:"default"}}>{a.prazoLaudo}{dp!==null?` (${dp}d)`:""}</span>
                          :<div style={{display:"flex",alignItems:"center",gap:4}}>
                            <input type="number" style={{...inpInline,width:44}} min="1" placeholder="dias"
                              onBlur={e=>{if(e.target.value)updCampo(a.id,"prazoLaudo",addDias(a.dataEnvio,e.target.value));}}
                              onKeyDown={e=>{if(e.key==="Enter"&&e.target.value)updCampo(a.id,"prazoLaudo",addDias(a.dataEnvio,e.target.value));}}
                            />
                            <span style={{fontSize:10,color:"#484f58"}}>d</span>
                          </div>
                        }
                      </td>
                      {/* LAUDO REC — date inline (preenchido auto ao mudar p/ Em Análise) */}
                      <td><input type="date" style={{...inpInline,width:108,color:a.dataLaudo?"#3fb950":"#484f58"}} value={a.dataLaudo||""} onChange={e=>updCampo(a.id,"dataLaudo",e.target.value)}/></td>
                      {/* ⌀ Turnaround */}
                      <td>{tl!==null?<span className="badge bt">{tl}d</span>:"—"}</td>
                      {/* STATUS — com automações */}
                      <td>
                        <select style={{background:"#0d1117",border:"1px solid #30363d",color:"#c9d1d9",borderRadius:4,padding:"3px 6px",fontSize:11,cursor:"pointer"}} value={a.status} onChange={e=>updSt(a.id,e.target.value)}>
                          {ST_LAB.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                      </td>
                      <td style={{display:"flex",gap:4}}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>editar(a)} title="Editar completo">✎</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>del(a.id)}>✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            </div>
          </div>
        );
      })}
      {amoFilt.length===0&&<div className="card" style={{padding:36,textAlign:"center",color:"#484f58"}}>Nenhuma amostra cadastrada</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  RELATÓRIOS
// ═══════════════════════════════════════════════════════════════════════════
function Relatorios({relats,setRelats,amostras,clientes,cliAtivo}){
  const [showF,setShowF]=useState(false);
  const [editId,setEditId]=useState(null);
  const empty={titulo:"",area:"",resp:"",laudos:[],inicio:hoje(),prazo:"",entrega:"",status:"nao_iniciado",obs:"",cliId:cliAtivo||""};
  const [f,setF]=useState(empty);
  useEffect(()=>setF(x=>({...x,cliId:cliAtivo||""})),[cliAtivo]);
  const ldOK=amostras.filter(a=>a.status==="laudo_ok");

  const salvar=()=>{
    if(!f.titulo)return;
    if(editId){setRelats(r=>r.map(x=>x.id===editId?{...f,id:editId}:x));setEditId(null);}
    else setRelats(r=>[{...f,id:uid()},...r]);
    setF(empty);setShowF(false);
  };
  const editar=r=>{setF(r);setEditId(r.id);setShowF(true);};
  const del=id=>setRelats(r=>r.filter(x=>x.id!==id));
  const togL=k=>setF(x=>({...x,laudos:x.laudos.includes(k)?x.laudos.filter(c=>c!==k):[...x.laudos,k]}));

  const relFilt=cliAtivo?relats.filter(r=>r.cliId===cliAtivo):relats;

  return(
    <div style={{display:"grid",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {ST_REL.map(s=>{
          const its=relFilt.filter(r=>r.status===s.id);
          return(
            <div key={s.id} className="card" style={{padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span className="sl">{s.label}</span>
                <span className={`badge ${s.cls}`}>{its.length}</span>
              </div>
              {its.slice(0,4).map(r=>{
                const dp=r.prazo&&!["entregue","revisao_cliente","aprovado"].includes(r.status)?diffD(hoje(),r.prazo):null;
                return(
                  <div key={r.id} style={{padding:"8px 10px",background:"#161b22",borderRadius:4,marginBottom:6}}>
                    <div style={{fontSize:12,color:"#c9d1d9",fontWeight:500,marginBottom:3}}>{r.titulo}</div>
                    {r.prazo&&<div style={{fontSize:11,color:dp!==null&&dp<5?"#f85149":"#484f58"}}>Prazo: {r.prazo}</div>}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",justifyContent:"flex-end"}}>
        <button className="btn btn-primary" onClick={()=>{setF({...empty,cliId:cliAtivo||""});setEditId(null);setShowF(true);}}>+ Novo Relatório</button>
      </div>

      {showF&&(
        <div className="card ca-red" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>{editId?"EDITAR":"NOVO"} RELATÓRIO</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>TÍTULO</div>
              <input className="inp" placeholder="Ex: RIC — Área A" value={f.titulo} onChange={e=>setF(x=>({...x,titulo:e.target.value}))}/>
            </div>
            {[
              {k:"area",   l:"ÁREA",          t:"text",ph:"Área A"},
              {k:"resp",   l:"RESPONSÁVEL",   t:"text",ph:"Nome"},
              {k:"status", l:"STATUS",        t:"sel", opts:ST_REL.map(s=>s.id),labels:ST_REL.map(s=>s.label)},
              {k:"inicio", l:"INÍCIO",        t:"date"},
              {k:"prazo",  l:"PRAZO ENTREGA", t:"date"},
              {k:"entrega",l:"DATA ENTREGA",  t:"date"},
            ].map(fd=>(
              <div key={fd.k}>
                <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>{fd.l}</div>
                {fd.t==="sel"
                  ?<select className="inp" value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}>{fd.opts.map((o,i)=><option key={o} value={o}>{fd.labels[i]}</option>)}</select>
                  :<input type={fd.t} className="inp" placeholder={fd.ph} value={f[fd.k]} onChange={e=>setF(x=>({...x,[fd.k]:e.target.value}))}/>
                }
              </div>
            ))}
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>
              <select className="inp" value={f.cliId} onChange={e=>setF(x=>({...x,cliId:e.target.value}))}>
                <option value="">— Sem cliente —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
              </select>
            </div>
          </div>
          {ldOK.length>0&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:10,color:"#484f58",marginBottom:8}}>VINCULAR PONTOS COM LAUDO OK</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {ldOK.map(a=>{const k=`${a.area}/${a.ponto}`;return <button key={a.id} className={`btn btn-xs ${f.laudos.includes(k)?"btn-success":"btn-ghost"}`} onClick={()=>togL(k)}>{k}</button>;})}
              </div>
            </div>
          )}
          <div style={{marginTop:10}}>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>OBSERVAÇÕES</div>
            <input className="inp" placeholder="Obs" value={f.obs} onChange={e=>setF(x=>({...x,obs:e.target.value}))}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:14}}>
            <button className="btn btn-primary" onClick={salvar}>✓ Salvar</button>
            <button className="btn btn-ghost" onClick={()=>{setShowF(false);setEditId(null);}}>Cancelar</button>
          </div>
        </div>
      )}

      <div className="card" style={{padding:"14px 18px",overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>TÍTULO</th><th>ÁREA</th><th>CLIENTE</th><th>RESP.</th><th>PONTOS</th><th>INÍCIO</th><th>PRAZO</th><th>ENTREGA</th><th>STATUS</th><th/></tr></thead>
          <tbody>
            {relFilt.map(r=>{
              const dp=r.prazo&&!["entregue","revisao_cliente","aprovado"].includes(r.status)?diffD(hoje(),r.prazo):null;
              const cli=clientes.find(c=>c.id===r.cliId);
              return(
                <tr key={r.id}>
                  <td style={{fontWeight:500,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.titulo}</td>
                  <td><span className="badge bg">{r.area||"—"}</span></td>
                  <td>{cli?<span className="badge bb">{cli.nome}</span>:"—"}</td>
                  <td style={{fontSize:12,color:"#8b949e"}}>{r.resp||"—"}</td>
                  <td>{r.laudos?.length>0?<span className="badge bp">{r.laudos.length} pts</span>:"—"}</td>
                  <td className="mono" style={{fontSize:11,color:"#484f58"}}>{r.inicio}</td>
                  <td>{r.prazo?<span className={`badge ${dp===null?"bg":dp<0?"br":dp<7?"bo":"bg"}`}>{r.prazo}</span>:"—"}</td>
                  <td className="mono" style={{fontSize:11,color:r.entrega?"#3fb950":"#484f58"}}>{r.entrega||"—"}</td>
                  <td>
                    <select style={{background:"#0d1117",border:"1px solid #30363d",color:"#c9d1d9",borderRadius:4,padding:"3px 6px",fontSize:11,cursor:"pointer"}} value={r.status} onChange={e=>setRelats(a=>a.map(x=>x.id===r.id?{...x,status:e.target.value}:x))}>
                      {ST_REL.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                  </td>
                  <td style={{display:"flex",gap:4}}>
                    <button className="btn btn-ghost btn-xs" onClick={()=>editar(r)}>✎</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>del(r.id)}>✕</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {relFilt.length===0&&<div style={{padding:30,textAlign:"center",color:"#484f58"}}>Nenhum relatório cadastrado</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  MEDIÇÃO — ciclo do cliente com gráfico planejado × realizado
// ═══════════════════════════════════════════════════════════════════════════
function Medicao({realizado,planejado,svcMap,clienteAtivo}){
  // Se tem cliente com diaCorte, usa ciclos; senão usa corte manual
  const [corteManual,setCorteManual]=useState(hoje);

  const planejadoPendente=planejado;

  const ciclos = useMemo(()=>{
    if(!clienteAtivo?.diaCorte) return null;
    // Gerar últimos 6 ciclos
    const dia=parseInt(clienteAtivo.diaCorte)||1;
    const arr=[];
    for(let i=5;i>=0;i--){
      const ref=new Date();
      ref.setMonth(ref.getMonth()-i);
      const c=periodoCiclo(dia, ref.toISOString().slice(0,10));
      const real=realizado.filter(l=>l.data>=c.inicio&&l.data<=c.fim).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
      const plan=planejadoPendente.filter(l=>l.data>=c.inicio&&l.data<=c.fim).reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
      arr.push({...c,real,plan,cicloLabel:`${c.inicio.slice(5).replace("-","/")} → ${c.fim.slice(5).replace("-","/")}/${c.fim.slice(0,4)}`});
    }
    return arr;
  },[clienteAtivo,realizado,planejadoPendente,svcMap]);

  const cicloAtual = ciclos?.[ciclos.length-1]||null;

  // Para corte manual
  const realAte=realizado.filter(l=>l.data<=corteManual);
  const totMed=realAte.reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);
  const totPlan=planejadoPendente.reduce((a,l)=>a+(svcMap[l.sid]?.valor||0)*l.qtd,0);

  const porMes={};
  realizado.forEach(l=>{const m=(l.data||"").slice(0,7);if(!porMes[m])porMes[m]={p:0,r:0};porMes[m].r+=(svcMap[l.sid]?.valor||0)*l.qtd;});
  planejadoPendente.forEach(l=>{const m=(l.data||"").slice(0,7);if(!porMes[m])porMes[m]={p:0,r:0};porMes[m].p+=(svcMap[l.sid]?.valor||0)*l.qtd;});
  const meses=Object.keys(porMes).sort();

  const porSvc=Object.entries(realAte.reduce((acc,l)=>{acc[l.sid]=(acc[l.sid]||0)+(svcMap[l.sid]?.valor||0)*l.qtd;return acc;},{}))
    .map(([id,v])=>({id,nome:svcMap[id]?.nome||id,v})).sort((a,b)=>b.v-a.v);

  return(
    <div style={{display:"grid",gap:16}}>
      {/* Ciclos do cliente */}
      {clienteAtivo?.diaCorte&&ciclos&&(
        <>
          <div className="card ca-orange" style={{padding:"18px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
              <div>
                <div className="sl" style={{marginBottom:6}}>MEDIÇÃO DO CICLO ATUAL — {clienteAtivo.nome}</div>
                <div style={{fontSize:11,color:"#484f58",marginBottom:10}}>Dia de corte: {clienteAtivo.diaCorte} • Período: {cicloAtual?.label}</div>
                <div className="mono" style={{fontSize:44,fontWeight:600,color:"#d29922",lineHeight:1}}>R$ {fmt(cicloAtual?.real||0)}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,minWidth:280}}>
                <div style={{padding:"10px 14px",background:"#161b22",borderRadius:6}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>PLANEJADO NO CICLO</div>
                  <div className="mono" style={{color:"#388bfd",fontSize:16,fontWeight:600}}>R$ {fmt(cicloAtual?.plan||0)}</div>
                </div>
                <div style={{padding:"10px 14px",background:"#161b22",borderRadius:6}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>AVANÇO NO CICLO</div>
                  <div className="mono" style={{color:((cicloAtual?.plan||0)>0?(cicloAtual.real/cicloAtual.plan)*100:0)>=100?"#3fb950":"#d29922",fontSize:16,fontWeight:600}}>
                    {fmtN((cicloAtual?.plan||0)>0?(cicloAtual.real/cicloAtual.plan)*100:0)}%
                  </div>
                </div>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <div className="pt"><div className="pf" style={{width:`${Math.min((cicloAtual?.plan||0)>0?(cicloAtual.real/cicloAtual.plan)*100:0,100)}%`,background:"#d29922"}}/></div>
            </div>
          </div>

          {/* Histórico de ciclos */}
          <div className="card" style={{padding:"16px 18px"}}>
            <div className="sl" style={{marginBottom:14}}>HISTÓRICO DE CICLOS DE MEDIÇÃO</div>
            <table className="table">
              <thead><tr><th>PERÍODO (CICLO)</th><th style={{textAlign:"right"}}>PLANEJADO</th><th style={{textAlign:"right"}}>REALIZADO</th><th style={{textAlign:"right"}}>DELTA</th><th style={{textAlign:"right"}}>AVANÇO</th></tr></thead>
              <tbody>
                {ciclos.map((c,i)=>{
                  const d=c.real-c.plan;
                  const pct=c.plan>0?(c.real/c.plan)*100:c.real>0?100:0;
                  const isAtual=i===ciclos.length-1;
                  return(
                    <tr key={c.inicio} style={{background:isAtual?"#161b2260":"transparent"}}>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {isAtual&&<span className="badge bo" style={{fontSize:10}}>atual</span>}
                          <span className="mono" style={{fontSize:11,color:"#c9d1d9"}}>{c.label}</span>
                        </div>
                      </td>
                      <td className="mono" style={{textAlign:"right",color:"#388bfd"}}>R$ {fmt(c.plan)}</td>
                      <td className="mono" style={{textAlign:"right",color:"#3fb950"}}>R$ {fmt(c.real)}</td>
                      <td className="mono" style={{textAlign:"right",color:d>=0?"#3fb950":"#f85149"}}>{d>=0?"+":""}R$ {fmt(Math.abs(d))}</td>
                      <td style={{textAlign:"right"}}><span className={`badge ${pct>=100?"bgn":pct>=80?"bo":"br"}`}>{fmtN(pct)}%</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Corte manual (sem cliente com diaCorte) */}
      {!clienteAtivo?.diaCorte&&(
        <div className="card ca-orange" style={{padding:"20px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
            <div>
              <div className="sl" style={{marginBottom:10}}>MEDIÇÃO ACUMULADA ATÉ DATA DE CORTE</div>
              {!clienteAtivo&&<div style={{fontSize:11,color:"#484f58",marginBottom:8}}>Selecione um cliente com dia de corte para ver os ciclos automáticos</div>}
              <div className="mono" style={{fontSize:44,fontWeight:600,color:"#d29922",lineHeight:1}}>R$ {fmt(totMed)}</div>
              <div style={{fontSize:12,color:"#484f58",marginTop:6}}>{totPlan>0&&`${fmtN((totMed/totPlan)*100)}% do contrato (R$ ${fmt(totPlan)})`}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:6}}>DATA DE CORTE</div>
              <input type="date" className="inp" value={corteManual} onChange={e=>setCorteManual(e.target.value)} style={{width:170}}/>
            </div>
          </div>
          <div style={{marginTop:16}}>
            <div className="pt"><div className="pf" style={{width:`${Math.min(totPlan>0?(totMed/totPlan)*100:0,100)}%`,background:"#d29922"}}/></div>
          </div>
        </div>
      )}

      {/* Gráfico P×R */}
      <div className="card" style={{padding:"16px 18px"}}>
        <div className="sl" style={{marginBottom:12}}>GRÁFICO PLANEJADO × REALIZADO — POR MÊS</div>
        <GraficoPlanReal planejado={planejado} realizado={realizado} svcMap={svcMap} altura={200}/>
      </div>

      {/* Tabela mensal */}
      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:16}}>
        <div className="card" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>EVOLUÇÃO MENSAL</div>
          <table className="table">
