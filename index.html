  // Custos pontuais do ciclo — só REALIZADOS entram no resultado efetivo
  const custosPontuaisCiclo = useMemo(()=>(custosPontuais||[]).filter(c=>
    c.data&&c.data>=cicloSel.inicio&&c.data<=cicloSel.fim
  ),[custosPontuais,cicloSel]);
  const custosPontuaisRealizados = useMemo(()=>custosPontuaisCiclo.filter(c=>(c.status||"realizado")==="realizado"),[custosPontuaisCiclo]);
  const custosPontuaisPlanejados = useMemo(()=>custosPontuaisCiclo.filter(c=>(c.status||"realizado")==="planejado"),[custosPontuaisCiclo]);
  const totalPontualReal = useMemo(()=>custosPontuaisRealizados.reduce((s,c)=>s+parseFloat(c.valor||0),0),[custosPontuaisRealizados]);
  const totalPontualPlan = useMemo(()=>custosPontuaisPlanejados.reduce((s,c)=>s+parseFloat(c.valor||0),0),[custosPontuaisPlanejados]);

  // Custo direto por cliente (realizado)
  const custoDiretoPorCli = useMemo(()=>{
    const r={};
    const add=(cid,v)=>{ if(!cid) return; if(cliAtivo&&cid!==cliAtivo) return; r[cid]=(r[cid]||0)+v; };
    custosAreaCiclo.forEach(c=>{
      if(c.areaId){ const area=areas.find(a=>a.id===c.areaId); if(area?.cliId) add(area.cliId,parseFloat(c.valor||0)); }
      else if(cliAtivo) add(cliAtivo,parseFloat(c.valor||0));
    });
    custosVarCiclo.forEach(c=>{
      if(c.areaId){ const area=areas.find(a=>a.id===c.areaId); add(area?.cliId||c.cliId,c.valor); }
      else add(c.cliId,c.valor);
    });
    custosPontuaisRealizados.forEach(c=>{ if(c.cliId) add(c.cliId,parseFloat(c.valor||0)); });
    return r;
  },[custosAreaCiclo,custosVarCiclo,custosPontuaisRealizados,areas,cliAtivo]);

  const pontualSemCli = useMemo(()=>custosPontuaisRealizados.filter(c=>!c.cliId).reduce((s,c)=>s+parseFloat(c.valor||0),0),[custosPontuaisRealizados]);
  const cliIds = useMemo(()=>[...new Set([...Object.keys(receitaPorCli),...Object.keys(custoDiretoPorCli)])],[receitaPorCli,custoDiretoPorCli]);
  const baseFixaRateio = totalFixoReal+pontualSemCli;
  const custoFixoRateado = cliId=>receitaTotal===0?baseFixaRateio/Math.max(cliIds.length,1):baseFixaRateio*(receitaPorCli[cliId]||0)/receitaTotal;

  const rows = cliIds.map(cliId=>{
    const cli=clientes.find(c=>c.id===cliId);
    const receita=receitaPorCli[cliId]||0;
    const fixoRat=custoFixoRateado(cliId);
    const direto=custoDiretoPorCli[cliId]||0;
    const custo=fixoRat+direto;
    const margem=receita-custo;
    return {cliId,cli,receita,fixoRat,direto,custo,margem,pct:receita>0?margem/receita*100:null};
  }).sort((a,b)=>b.receita-a.receita);

  const totReceita=rows.reduce((s,r)=>s+r.receita,0);
  const totCusto=rows.reduce((s,r)=>s+r.custo,0);
  const totMargem=totReceita-totCusto;
  const totCustoPlan=totalFixoPlan+custosAreaCiclo.reduce((s,c)=>s+parseFloat(c.valor||0),0)+totalPontualPlan;
  const totMargPlan=receitaPlanTotal-totCustoPlan;

  // Dados históricos para gráfico (últimos 8 ciclos)
  const dadosMeses = useMemo(()=>{
    const dia=parseInt(diaCorte)||1;
    const result=[];
    for(let i=7;i>=0;i--){
      const ref=new Date();
      const refDate=new Date(ref.getFullYear(),ref.getMonth()-i,dia);
      const c=periodoCiclo(dia,refDate.toISOString().slice(0,10));
      const recR=calcReceita(c.inicio,c.fim,realizado);
      const recP=calcReceitaPlan(c.inicio,c.fim,planejado||[]);
      const fixosC=custosFixos.filter(x=>x.cicloInicio?x.cicloInicio===c.inicio:x.mes===c.inicio.slice(0,7));
      const fixR=fixosC.reduce((s,x)=>s+(parseFloat(x.valorRealizado||"")||parseFloat(x.valor||0)),0);
      const fixP=fixosC.reduce((s,x)=>s+parseFloat(x.valor||0),0);
      const areaC=custosArea.filter(x=>x.data&&x.data>=c.inicio&&x.data<=c.fim).reduce((s,x)=>s+parseFloat(x.valor||0),0);
      const pontR=(custosPontuais||[]).filter(x=>x.data&&x.data>=c.inicio&&x.data<=c.fim&&(x.status||"realizado")==="realizado").reduce((s,x)=>s+parseFloat(x.valor||0),0);
      const custoR=fixR+areaC+pontR;
      const custoP=fixP+areaC;
      result.push({m:c.inicio.slice(0,7),receitaReal:recR,receitaPlan:recP,custoReal:custoR,custoPlan:custoP,margemReal:recR-custoR,margemPlan:recP-custoP});
    }
    return result.filter(d=>d.receitaReal>0||d.receitaPlan>0||d.custoReal>0);
  },[custosFixos,custosArea,custosPontuais,realizado,planejado,diaCorte,cliAtivo,svcMap]);

  return(
    <div style={{display:"grid",gap:16}}>
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CICLO DE MEDIÇÃO</div>
          <select className="inp" style={{width:240}} value={cicloInicio} onChange={e=>setCicloInicio(e.target.value)}>
            {ciclos.map(c=><option key={c.inicio} value={c.inicio}>{c.label}</option>)}
          </select>
          {clienteAtivo
            ?<div style={{fontSize:10,color:"#484f58",marginTop:3}}>Dia de corte: <span style={{color:"#d29922"}}>{diaCorte}</span> — {clienteAtivo.nome}</div>
            :<div style={{fontSize:10,color:"#f85149",marginTop:3}}>Selecione um cliente para usar o ciclo correto</div>
          }
        </div>
      </div>

      {/* KPI Cards — Planejado vs Realizado */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div className="card" style={{padding:"14px 18px",borderTop:"2px solid #388bfd"}}>
          <div style={{fontSize:10,color:"#388bfd",marginBottom:8,letterSpacing:".05em"}}>PLANEJADO — {cicloSel.label}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div>
              <div style={{fontSize:10,color:"#484f58"}}>RECEITA</div>
              <div className="mono" style={{fontSize:14,fontWeight:700,color:"#388bfd88"}}>R$ {fmt(receitaPlanTotal)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58"}}>CUSTO EST.</div>
              <div className="mono" style={{fontSize:14,fontWeight:700,color:"#f8514988"}}>R$ {fmt(totCustoPlan)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58"}}>MARGEM EST.</div>
              <div className="mono" style={{fontSize:14,fontWeight:700,color:totMargPlan>=0?"#3fb95088":"#f8514988"}}>R$ {fmt(totMargPlan)}</div>
            </div>
          </div>
        </div>
        <div className="card" style={{padding:"14px 18px",borderTop:"2px solid #3fb950"}}>
          <div style={{fontSize:10,color:"#3fb950",marginBottom:8,letterSpacing:".05em"}}>REALIZADO — {cicloSel.label}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div>
              <div style={{fontSize:10,color:"#484f58"}}>RECEITA</div>
              <div className="mono" style={{fontSize:14,fontWeight:700,color:"#3fb950"}}>R$ {fmt(totReceita)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58"}}>CUSTO</div>
              <div className="mono" style={{fontSize:14,fontWeight:700,color:"#f85149"}}>R$ {fmt(totCusto)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58"}}>MARGEM</div>
              <div className="mono" style={{fontSize:14,fontWeight:700,color:totMargem>=0?"#3fb950":"#f85149"}}>R$ {fmt(totMargem)}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Gráfico Histórico Planejado × Realizado */}
      {dadosMeses.length>0&&(
        <div className="card" style={{padding:"16px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>HISTÓRICO — RECEITA, CUSTO & MARGEM (últimos ciclos)</div>
          <GraficoResultado dadosMeses={dadosMeses} altura={240}/>
        </div>
      )}

      {/* Detalhes do ciclo */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        <div className="card ca-green" style={{padding:"14px 18px"}}>
          <div className="sl" style={{marginBottom:6}}>RECEITA</div>
          <div className="mono" style={{fontSize:18,fontWeight:700,color:"#3fb950"}}>R$ {fmt(totReceita)}</div>
          <div style={{fontSize:11,color:"#484f58",marginTop:4}}>Realizado no ciclo</div>
          {receitaPlanTotal>0&&<div style={{fontSize:11,color:"#388bfd88",marginTop:2}}>Plan: R$ {fmt(receitaPlanTotal)}</div>}
        </div>
        <div className="card ca-red" style={{padding:"14px 18px"}}>
          <div className="sl" style={{marginBottom:6}}>CUSTO FIXO</div>
          <div className="mono" style={{fontSize:18,fontWeight:700,color:"#f85149"}}>R$ {fmt(totalFixoReal)}</div>
          <div style={{fontSize:11,color:"#484f58",marginTop:4}}>{fixosCiclo.length} lançamento{fixosCiclo.length!==1?"s":""}</div>
          {totalFixoPlan!==totalFixoReal&&<div style={{fontSize:11,color:"#388bfd88",marginTop:2}}>Plan: R$ {fmt(totalFixoPlan)}</div>}
        </div>
        <div className="card ca-orange" style={{padding:"14px 18px"}}>
          <div className="sl" style={{marginBottom:6}}>CUSTO DIRETO</div>
          <div className="mono" style={{fontSize:18,fontWeight:700,color:"#d29922"}}>R$ {fmt(rows.reduce((s,r)=>s+r.direto,0))}</div>
          <div style={{fontSize:11,color:"#484f58",marginTop:4}}>
            Área + variáveis + pontuais
            {totalVar>0&&<span style={{display:"block",color:"#8957e5"}}>R$ {fmt(totalVar)} var.</span>}
            {totalPontualPlan>0&&<span style={{display:"block",color:"#388bfd88"}}>R$ {fmt(totalPontualPlan)} pont. plan.</span>}
          </div>
        </div>
        <div className={`card ${totMargem>=0?"ca-green":"ca-red"}`} style={{padding:"14px 18px"}}>
          <div className="sl" style={{marginBottom:6}}>MARGEM</div>
          <div className="mono" style={{fontSize:18,fontWeight:700,color:totMargem>=0?"#3fb950":"#f85149"}}>R$ {fmt(totMargem)}</div>
          <div style={{fontSize:11,color:"#484f58",marginTop:4}}>{totReceita>0?`${((totMargem/totReceita)*100).toFixed(1)}% da receita`:"—"}</div>
          {totMargPlan!==0&&<div style={{fontSize:11,color:totMargPlan>=0?"#3fb95088":"#f8514988",marginTop:2}}>Est: R$ {fmt(totMargPlan)}</div>}
        </div>
      </div>

      {rows.length===0?(
        <div className="card" style={{padding:"40px 20px",textAlign:"center",color:"#484f58"}}>
          <div style={{fontSize:13,color:"#8b949e"}}>Nenhum lançamento realizado no ciclo {cicloSel.label}.</div>
        </div>
      ):(
        <div className="card" style={{padding:"14px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>RESULTADO POR CLIENTE — CICLO {cicloSel.label}</div>
          <table className="table">
            <thead>
              <tr>
                <th>CLIENTE</th>
                <th style={{textAlign:"right"}}>RECEITA</th>
                <th style={{textAlign:"right"}}>C. FIXO RATEADO</th>
                <th style={{textAlign:"right"}}>C. DIRETO</th>
                <th style={{textAlign:"right"}}>CUSTO TOTAL</th>
                <th style={{textAlign:"right"}}>MARGEM</th>
                <th style={{textAlign:"right"}}>%</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r=>{
                const corM=r.margem>=0?"#3fb950":"#f85149";
                const pctRat=r.receita>0?(r.fixoRat/r.receita*100):0;
                return(
                  <tr key={r.cliId}>
                    <td style={{fontWeight:500,color:"#c9d1d9"}}>{r.cli?.nome||r.cliId}</td>
                    <td className="mono" style={{textAlign:"right",color:"#3fb950"}}>R$ {fmt(r.receita)}</td>
                    <td className="mono" style={{textAlign:"right",color:"#f85149",fontSize:11}}>
                      R$ {fmt(r.fixoRat)}
                      <span style={{fontSize:10,color:"#484f58",marginLeft:4}}>({pctRat.toFixed(0)}%)</span>
                    </td>
                    <td className="mono" style={{textAlign:"right",color:"#d29922",fontSize:11}}>R$ {fmt(r.direto)}</td>
                    <td className="mono" style={{textAlign:"right",color:"#f85149",fontWeight:600}}>R$ {fmt(r.custo)}</td>
                    <td className="mono" style={{textAlign:"right",color:corM,fontWeight:700}}>R$ {fmt(r.margem)}</td>
                    <td style={{textAlign:"right"}}>
                      <span className={`badge ${r.margem>=0?"bgn":"br"}`}>{r.pct!==null?`${r.pct.toFixed(1)}%`:"—"}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{borderTop:"2px solid #21262d"}}>
                <td style={{fontWeight:700,color:"#8b949e",fontSize:11,textTransform:"uppercase",padding:"10px 12px"}}>Total</td>
                <td className="mono" style={{textAlign:"right",fontWeight:700,color:"#3fb950",padding:"10px 12px"}}>R$ {fmt(totReceita)}</td>
                <td className="mono" style={{textAlign:"right",fontWeight:700,color:"#f85149",padding:"10px 12px"}}>R$ {fmt(totalFixoReal)}</td>
                <td className="mono" style={{textAlign:"right",fontWeight:700,color:"#d29922",padding:"10px 12px"}}>R$ {fmt(rows.reduce((s,r)=>s+r.direto,0))}</td>
                <td className="mono" style={{textAlign:"right",fontWeight:700,color:"#f85149",padding:"10px 12px"}}>R$ {fmt(totCusto)}</td>
                <td className="mono" style={{textAlign:"right",fontWeight:700,color:totMargem>=0?"#3fb950":"#f85149",padding:"10px 12px",fontSize:15}}>R$ {fmt(totMargem)}</td>
                <td style={{textAlign:"right",padding:"10px 12px"}}>
                  <span className={`badge ${totMargem>=0?"bgn":"br"}`} style={{fontSize:12}}>{totReceita>0?`${((totMargem/totReceita)*100).toFixed(1)}%`:"—"}</span>
                </td>
              </tr>
            </tfoot>
          </table>
          <div style={{fontSize:11,color:"#484f58",marginTop:12,lineHeight:1.7}}>
            * Custo fixo rateado proporcionalmente à receita de cada cliente no ciclo.<br/>
            * Custos pontuais <strong style={{color:"#388bfd88"}}>planejados</strong> não entram no custo efetivo até serem confirmados.<br/>
            * As regras de custo variável se aplicam a todos os lançamentos confirmados do ciclo.
          </div>
        </div>
      )}
    </div>
  );
}



//  Cada área tem: nome, cliente, lista de serviços (sid+qtd+data) →
//  ao "Gerar Planejado" cria entradas na tabela planejado automaticamente.
// ═══════════════════════════════════════════════════════════════════════════
function CadastroAreas({areas,setAreas,planejado,setPlanejado,servicos,svcMap,clientes,cliAtivo}){
  const [view,setView]=useState("lista"); // "lista"|"form"|"detalhe"
  const [editId,setEditId]=useState(null);
  const [detalheId,setDetalheId]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [geradoId,setGeradoId]=useState(null); // feedback de geração
  const [saveMsg,setSaveMsg]=useState(null);

  const emptyArea=()=>({
    nome:"", descricao:"", cliId:cliAtivo||"",
    itens:[], // [{sid, qtd, data, obs}]
  });
  const [f,setF]=useState(emptyArea());

  // ─── helpers de filtro ───────────────────────────────────────────────────
  const areasFilt=useMemo(()=>
    cliAtivo?areas.filter(a=>a.cliId===cliAtivo):areas
  ,[areas,cliAtivo]);

  // ─── stats de uma área ──────────────────────────────────────────────────
  const stats=useCallback(area=>{
    const itens=area.itens||[];
    const total=itens.reduce((s,i)=>{
      const v=(svcMap[i.sid]?.valor||0)*parseFloat(i.qtd||0);
      return s+v;
    },0);
    const nSvcs=new Set(itens.map(i=>i.sid)).size;
    // itens já gerados no planejado desta área
    const gerados=planejado.filter(p=>p.areaId===area.id).length;
    return {total,nSvcs,nItens:itens.length,gerados};
  },[svcMap,planejado]);

  // ─── Salvar área ────────────────────────────────────────────────────────
  const salvar=()=>{
    if(!f.nome.trim())return;
    if(editId){
      setAreas(a=>a.map(x=>x.id===editId?{...f,id:editId}:x));
    } else {
      const novo={...f,id:uid()};
      setAreas(a=>[novo,...a]);
    }
    setSaveMsg({tipo:"ok",txt:editId?"Área atualizada com sucesso!":"Área cadastrada com sucesso!"});
    setTimeout(()=>setSaveMsg(null),3000);
    setF(emptyArea());setEditId(null);setView("lista");
  };

  const editar=area=>{setF({...area,itens:area.itens||[]});setEditId(area.id);setView("form");};
  const del=(id, excluirPlan=true)=>{
    setAreas(a=>a.filter(x=>x.id!==id));
    if(excluirPlan) setPlanejado(p=>p.filter(x=>x.areaId!==id));
    setConfirmDel(null);
    if(detalheId===id)setView("lista");
  };

  // ─── Gerar planejado a partir da área ───────────────────────────────────
  const gerarPlanejado=area=>{
    const itens=area.itens||[];
    if(!itens.length)return;
    // Cria novos lançamentos
    const novos=itens
      .filter(i=>i.sid&&i.qtd&&i.data)
      .map(i=>({
        id:uid(),
        areaId:area.id,
        sid:i.sid,
        qtd:parseFloat(i.qtd),
        data:i.data,
        area:area.nome,
        cliId:area.cliId||"",
        obs:i.obs||"",
      }));
    // Usa updater funcional para evitar stale closure
    setPlanejado(prev=>[...prev.filter(p=>p.areaId!==area.id),...novos]);
    setGeradoId(area.id);
    setTimeout(()=>setGeradoId(null),3000);
  };

  // ─── Itens do formulário ─────────────────────────────────────────────────
  const addItem=()=>setF(x=>({...x,itens:[...x.itens,{sid:servicos[0]?.id||"",qtd:"",data:hoje(),obs:""}]}));
  const remItem=idx=>setF(x=>({...x,itens:x.itens.filter((_,i)=>i!==idx)}));
  const setItem=(idx,campo,val)=>setF(x=>({...x,itens:x.itens.map((it,i)=>i===idx?{...it,[campo]:val}:it)}));

  // ─── detalhe area ────────────────────────────────────────────────────────
  const areaDetalhe=areas.find(a=>a.id===detalheId)||null;

  // ─── totais da área no form ──────────────────────────────────────────────
  const fTotal=useMemo(()=>
    (f.itens||[]).reduce((s,i)=>{
      const v=(svcMap[i.sid]?.valor||0)*parseFloat(i.qtd||0);
      return s+v;
    },0)
  ,[f.itens,svcMap]);

  // ═══ RENDER ═══════════════════════════════════════════════════════════════

  // ── FORMULÁRIO ─────────────────────────────────────────────────────────
  if(view==="form") return(
    <div style={{display:"grid",gap:16,maxWidth:1100}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setView("lista");setEditId(null);setF(emptyArea());}}>← Voltar</button>
        <h2 style={{color:"#c9d1d9",fontSize:16,fontWeight:600}}>{editId?"Editar Área":"Nova Área"}</h2>
      </div>

      {/* Dados da área */}
      <div className="card ca-purple" style={{padding:"18px 20px"}}>
        <div className="sl" style={{marginBottom:14}}>IDENTIFICAÇÃO DA ÁREA</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1/-1"}}>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>NOME DA ÁREA *</div>
            <input className="inp" placeholder="Ex: Área A — Sondagem Confirmatória" value={f.nome} onChange={e=>setF(x=>({...x,nome:e.target.value}))}/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>CLIENTE</div>
            <select className="inp" value={f.cliId} onChange={e=>setF(x=>({...x,cliId:e.target.value}))}>
              <option value="">— Sem cliente —</option>
              {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"2/4"}}>
            <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>DESCRIÇÃO / OBSERVAÇÕES</div>
            <input className="inp" placeholder="Detalhes sobre o escopo desta área" value={f.descricao} onChange={e=>setF(x=>({...x,descricao:e.target.value}))}/>
          </div>
        </div>
      </div>

      {/* Serviços planejados */}
      <div className="card ca-blue" style={{padding:"18px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div className="sl">SERVIÇOS PLANEJADOS</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {fTotal>0&&<span className="mono" style={{fontSize:12,color:"#d29922"}}>Total: R$ {fmt(fTotal)}</span>}
            <button className="btn btn-ghost btn-xs" onClick={addItem}>+ Adicionar serviço</button>
          </div>
        </div>

        {f.itens.length===0&&(
          <div style={{padding:"28px 0",textAlign:"center",color:"#484f58",fontSize:12}}>
            Nenhum serviço adicionado.<br/>
            <button className="btn btn-primary btn-sm" style={{marginTop:10}} onClick={addItem}>+ Adicionar primeiro serviço</button>
          </div>
        )}

        {f.itens.length>0&&(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr>
                  <th style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:600,color:"#484f58",textTransform:"uppercase",borderBottom:"1px solid #21262d"}}>SERVIÇO</th>
                  <th style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:600,color:"#484f58",textTransform:"uppercase",borderBottom:"1px solid #21262d",width:100}}>QTDE</th>
                  <th style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:600,color:"#484f58",textTransform:"uppercase",borderBottom:"1px solid #21262d",width:140}}>DATA</th>
                  <th style={{padding:"6px 10px",textAlign:"right",fontSize:10,fontWeight:600,color:"#484f58",textTransform:"uppercase",borderBottom:"1px solid #21262d",width:130}}>VALOR</th>
                  <th style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:600,color:"#484f58",textTransform:"uppercase",borderBottom:"1px solid #21262d"}}>OBS</th>
                  <th style={{padding:"6px 10px",borderBottom:"1px solid #21262d",width:36}}/>
                </tr>
              </thead>
              <tbody>
                {f.itens.map((it,idx)=>{
                  const svc=svcMap[it.sid];
                  const val=(svc?.valor||0)*parseFloat(it.qtd||0);
                  const cor=COR[it.sid]||"#8b949e";
                  return(
                    <tr key={idx} style={{borderBottom:"1px solid #161b22"}}>
                      <td style={{padding:"8px 10px"}}>
                        <select className="inp" value={it.sid} onChange={e=>setItem(idx,"sid",e.target.value)} style={{fontSize:12}}>
                          {servicos.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
                        </select>
                      </td>
                      <td style={{padding:"8px 10px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <input type="number" className="inp" placeholder="0" min="0" step="0.5" value={it.qtd} onChange={e=>setItem(idx,"qtd",e.target.value)} style={{fontSize:12}}/>
                          {svc&&<span style={{fontSize:10,color:"#484f58",whiteSpace:"nowrap"}}>{svc.unidade}</span>}
                        </div>
                      </td>
                      <td style={{padding:"8px 10px"}}>
                        <input type="date" className="inp" value={it.data} onChange={e=>setItem(idx,"data",e.target.value)} style={{fontSize:12}}/>
                      </td>
                      <td style={{padding:"8px 10px",textAlign:"right"}}>
                        <span className="mono" style={{fontSize:11,color:val>0?"#d29922":"#484f58"}}>
                          {val>0?`R$ ${fmt(val)}`:"—"}
                        </span>
                      </td>
                      <td style={{padding:"8px 10px"}}>
                        <input className="inp" placeholder="Opcional" value={it.obs} onChange={e=>setItem(idx,"obs",e.target.value)} style={{fontSize:12}}/>
                      </td>
                      <td style={{padding:"8px 4px"}}>
                        <button className="btn btn-danger btn-xs" onClick={()=>remItem(idx)} title="Remover">✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        <div style={{marginTop:12}}>
          <button className="btn btn-ghost btn-xs" onClick={addItem}>+ Adicionar linha</button>
        </div>
      </div>

      {/* Resumo e ações */}
      {f.itens.length>0&&(
        <div style={{padding:"14px 20px",background:"#161b22",border:"1px solid #21262d",borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div style={{display:"flex",gap:20,fontSize:12}}>
            <span style={{color:"#484f58"}}>{f.itens.filter(i=>i.sid&&i.qtd&&i.data).length} serviço{f.itens.length!==1?"s":""} configurado{f.itens.length!==1?"s":""}</span>
            {fTotal>0&&<span className="mono" style={{color:"#d29922",fontWeight:600}}>Total planejado: R$ {fmt(fTotal)}</span>}
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:8}}>
        <button className="btn btn-primary" onClick={salvar} disabled={!f.nome.trim()}>✓ Salvar área</button>
        <button className="btn btn-ghost" onClick={()=>{setView("lista");setEditId(null);setF(emptyArea());}}>Cancelar</button>
      </div>
    </div>
  );

  // ── DETALHE ────────────────────────────────────────────────────────────
  if(view==="detalhe"&&areaDetalhe){
    const s=stats(areaDetalhe);
    const planArea=planejado.filter(p=>p.areaId===areaDetalhe.id);
    const cli=clientes.find(c=>c.id===areaDetalhe.cliId);
    return(
      <div style={{display:"grid",gap:16,maxWidth:1100}}>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setView("lista")}>← Voltar</button>
          <h2 style={{color:"#c9d1d9",fontSize:16,fontWeight:600,flex:1}}>{areaDetalhe.nome}</h2>
          <button className="btn btn-ghost btn-sm" onClick={()=>editar(areaDetalhe)}>✎ Editar</button>
          <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(areaDetalhe.id)}>✕ Excluir</button>
        </div>

        {confirmDel===areaDetalhe.id&&(()=>{
          const nPlan = planejado.filter(p=>p.areaId===areaDetalhe.id).length;
          return(
            <div style={{padding:"14px 18px",background:"#f8514918",border:"1px solid #f8514944",borderRadius:6}}>
              <div style={{color:"#f85149",fontSize:13,fontWeight:600,marginBottom:10}}>
                Excluir área "{areaDetalhe.nome}"?
              </div>
              {nPlan>0&&(
                <div style={{fontSize:12,color:"#c9d1d9",marginBottom:12,padding:"10px 12px",background:"#f8514910",borderRadius:4}}>
                  Esta área possui <strong style={{color:"#f85149"}}>{nPlan} lançamento{nPlan!==1?"s":""}</strong> no Planejado vinculados a ela.
                  O que deseja fazer com eles?
                </div>
              )}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button className="btn btn-danger btn-sm" onClick={()=>del(areaDetalhe.id,true)}>
                  ✕ Excluir área {nPlan>0?`e ${nPlan} lançamento${nPlan!==1?"s":""}`:""} 
                </button>
                {nPlan>0&&(
                  <button className="btn btn-ghost btn-sm" style={{borderColor:"#d29922",color:"#d29922"}} onClick={()=>del(areaDetalhe.id,false)}>
                    ✓ Excluir só a área (manter planejado)
                  </button>
                )}
                <button className="btn btn-ghost btn-sm" onClick={()=>setConfirmDel(null)}>Cancelar</button>
              </div>
            </div>
          );
        })()}

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
          <div className="card ca-purple" style={{padding:"14px 18px"}}>
            <div className="sl" style={{marginBottom:6}}>SERVIÇOS</div>
            <div className="mono" style={{fontSize:32,fontWeight:600,color:"#8957e5"}}>{s.nSvcs}</div>
            <div style={{fontSize:11,color:"#484f58"}}>{s.nItens} linhas configuradas</div>
          </div>
          <div className="card ca-orange" style={{padding:"14px 18px"}}>
            <div className="sl" style={{marginBottom:6}}>VALOR PLANEJADO</div>
            <div className="mono" style={{fontSize:22,fontWeight:600,color:"#d29922"}}>R$ {fmt(s.total)}</div>
          </div>
          <div className="card ca-blue" style={{padding:"14px 18px"}}>
            <div className="sl" style={{marginBottom:6}}>LANÇAMENTOS GERADOS</div>
            <div className="mono" style={{fontSize:32,fontWeight:600,color:s.gerados>0?"#388bfd":"#484f58"}}>{s.gerados}</div>
            <div style={{fontSize:11,color:"#484f58"}}>no GAC / Planejado</div>
          </div>
          <div className="card" style={{padding:"14px 18px"}}>
            <div className="sl" style={{marginBottom:6}}>CLIENTE</div>
            <div style={{fontSize:13,color:cli?"#c9d1d9":"#484f58",fontWeight:500,marginTop:4}}>{cli?cli.nome:"—"}</div>
            {areaDetalhe.descricao&&<div style={{fontSize:11,color:"#484f58",marginTop:4}}>{areaDetalhe.descricao}</div>}
          </div>
        </div>

        {/* Botão gerar */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",background:geradoId===areaDetalhe.id?"#23863618":"#161b22",border:`1px solid ${geradoId===areaDetalhe.id?"#23863644":"#21262d"}`,borderRadius:6,transition:"all .3s"}}>
          <div>
            <div style={{fontSize:13,fontWeight:500,color:"#c9d1d9"}}>Gerar / Atualizar Planejado</div>
            <div style={{fontSize:11,color:"#484f58",marginTop:2}}>
              {s.gerados>0
                ? `${s.gerados} lançamentos já gerados — clicar irá substituí-los pelos serviços atuais desta área`
                : "Cria lançamentos na aba GAC → Planejado com base nos serviços desta área"}
            </div>
          </div>
          {geradoId===areaDetalhe.id
            ?<span className="badge bgn" style={{fontSize:12,padding:"6px 14px"}}>✓ Planejado gerado!</span>
            :<button
                className="btn btn-primary"
                onClick={()=>gerarPlanejado(areaDetalhe)}
                disabled={(areaDetalhe.itens||[]).filter(i=>i.sid&&i.qtd&&i.data).length===0}
              >
                ⊕ Gerar Planejado
              </button>
          }
        </div>

        {/* Tabela de serviços */}
        <div className="card" style={{padding:"14px 18px"}}>
          <div className="sl" style={{marginBottom:12}}>SERVIÇOS CONFIGURADOS</div>
          {(areaDetalhe.itens||[]).length===0
            ?<div style={{padding:24,textAlign:"center",color:"#484f58"}}>Nenhum serviço configurado. <button className="btn btn-primary btn-xs" style={{marginLeft:8}} onClick={()=>editar(areaDetalhe)}>Editar área</button></div>
            :<table className="table">
              <thead><tr><th>SERVIÇO</th><th>UNID.</th><th>QTDE</th><th style={{textAlign:"right"}}>VALOR UNIT.</th><th style={{textAlign:"right"}}>TOTAL</th><th>DATA</th><th>OBS</th></tr></thead>
              <tbody>
                {(areaDetalhe.itens||[]).map((it,i)=>{
                  const svc=svcMap[it.sid]||{};
                  const cor=COR[it.sid]||"#8b949e";
                  const val=(svc.valor||0)*parseFloat(it.qtd||0);
                  return(
                    <tr key={i}>
                      <td><span className="badge" style={{background:cor+"22",color:cor,border:`1px solid ${cor}44`}}>{svc.nome||it.sid}</span></td>
                      <td><span className="badge bg">{svc.unidade||"—"}</span></td>
                      <td className="mono">{fmtN(it.qtd)}</td>
                      <td className="mono" style={{textAlign:"right",color:"#484f58"}}>{svc.valor>0?`R$ ${fmt(svc.valor)}`:"—"}</td>
                      <td className="mono" style={{textAlign:"right",color:"#d29922"}}>{val>0?`R$ ${fmt(val)}`:"—"}</td>
                      <td className="mono" style={{fontSize:11,color:"#8b949e"}}>{it.data||"—"}</td>
                      <td style={{color:"#484f58",fontSize:11}}>{it.obs||"—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          }
        </div>

        {/* Planejamentos gerados */}
        {planArea.length>0&&(
          <div className="card" style={{padding:"14px 18px"}}>
            <div className="sl" style={{marginBottom:12}}>LANÇAMENTOS GERADOS NO PLANEJADO</div>
            <table className="table">
              <thead><tr><th>DATA</th><th>SERVIÇO</th><th>QTDE</th><th style={{textAlign:"right"}}>VALOR</th><th>OBS</th></tr></thead>
              <tbody>
                {planArea.sort((a,b)=>a.data?.localeCompare(b.data)).map(p=>{
                  const svc=svcMap[p.sid]||{};
                  const cor=COR[p.sid]||"#8b949e";
                  const val=(svc.valor||0)*p.qtd;
                  return(
                    <tr key={p.id}>
                      <td className="mono" style={{fontSize:11}}>{p.data}</td>
                      <td><span className="badge" style={{background:cor+"22",color:cor,border:`1px solid ${cor}44`}}>{svc.nome||p.sid}</span></td>
                      <td className="mono">{fmtN(p.qtd)} {svc.unidade}</td>
                      <td className="mono" style={{textAlign:"right",color:"#d29922"}}>{val>0?`R$ ${fmt(val)}`:"—"}</td>
                      <td style={{fontSize:11,color:"#484f58"}}>{p.obs}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  }

  // ── LISTA ───────────────────────────────────────────────────────────────
  return(
    <div style={{display:"grid",gap:16}}>

      {/* Feedback de salvamento */}
      {saveMsg&&(
        <div style={{padding:"10px 16px",borderRadius:6,background:saveMsg.tipo==="ok"?"#23863618":"#f8514918",border:`1px solid ${saveMsg.tipo==="ok"?"#23863644":"#f8514944"}`,color:saveMsg.tipo==="ok"?"#3fb950":"#f85149",fontSize:13,fontWeight:500}}>
          {saveMsg.tipo==="ok"?"✓":"⚠"} {saveMsg.txt}
        </div>
      )}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:16,fontWeight:600,color:"#c9d1d9",marginBottom:4}}>Cadastro de Áreas</h2>
          <p style={{fontSize:12,color:"#484f58"}}>
            Defina os serviços planejados por área — ao gerar, eles alimentam automaticamente a aba <span style={{color:"#388bfd"}}>GAC → Planejado</span>.
          </p>
        </div>
        <button className="btn btn-primary" onClick={()=>{setF({...emptyArea(),cliId:cliAtivo||""});setEditId(null);setView("form");}}>
          + Nova Área
        </button>
      </div>

      {/* Cards de áreas */}
      {areasFilt.length===0&&(
        <div className="card" style={{padding:"48px 20px",textAlign:"center",color:"#484f58"}}>
          <div style={{fontSize:32,marginBottom:12}}>◫</div>
          <div style={{fontSize:14,color:"#8b949e",marginBottom:6}}>Nenhuma área cadastrada</div>
          <div style={{fontSize:12,marginBottom:20}}>Crie uma área, defina os serviços e gere o planejamento automaticamente.</div>
          <button className="btn btn-primary" onClick={()=>{setF({...emptyArea(),cliId:cliAtivo||""});setEditId(null);setView("form");}}>+ Criar primeira área</button>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
        {areasFilt.map(area=>{
          const s=stats(area);
          const cli=clientes.find(c=>c.id===area.cliId);
          const isGerado=geradoId===area.id;
          return(
            <div key={area.id} className="card ca-purple" style={{padding:"18px 20px",cursor:"pointer",transition:"border-color .15s"}}
              onClick={()=>{setDetalheId(area.id);setView("detalhe");}}
            >
              {/* Nome + ações */}
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14,color:"#c9d1d9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{area.nome}</div>
                  {cli&&<div style={{fontSize:11,color:"#8957e5",marginTop:2}}>{cli.nome}</div>}
                  {area.descricao&&<div style={{fontSize:11,color:"#484f58",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{area.descricao}</div>}
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                  <button className="btn btn-ghost btn-xs" onClick={()=>editar(area)}>✎</button>
                  <button className="btn btn-danger btn-xs" onClick={()=>setConfirmDel(area.id)}>✕</button>
                </div>
              </div>

              {confirmDel===area.id&&(()=>{
                const nPlan = planejado.filter(p=>p.areaId===area.id).length;
                return(
                  <div style={{marginBottom:10,padding:"10px 12px",background:"#f8514918",border:"1px solid #f8514944",borderRadius:4}} onClick={e=>e.stopPropagation()}>
                    <div style={{fontSize:12,color:"#f85149",fontWeight:600,marginBottom:6}}>Excluir "{area.nome}"?</div>
                    {nPlan>0&&(
                      <div style={{fontSize:11,color:"#c9d1d9",marginBottom:8}}>
                        {nPlan} lançamento{nPlan!==1?"s":""} no Planejado vinculado{nPlan!==1?"s":""} a esta área.
                      </div>
                    )}
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <button className="btn btn-danger btn-xs" onClick={()=>del(area.id,true)}>
                        ✕ Excluir {nPlan>0?`+ ${nPlan} plan.`:"área"}
                      </button>
                      {nPlan>0&&(
                        <button className="btn btn-ghost btn-xs" style={{borderColor:"#d29922",color:"#d29922"}} onClick={()=>del(area.id,false)}>
                          Manter planejado
                        </button>
                      )}
                      <button className="btn btn-ghost btn-xs" onClick={()=>setConfirmDel(null)}>Cancelar</button>
                    </div>
                  </div>
                );
              })()}

              {/* Stats */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                <div style={{padding:"8px 10px",background:"#161b22",borderRadius:4,textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:2}}>SERVIÇOS</div>
                  <div className="mono" style={{fontWeight:600,color:"#8957e5"}}>{s.nSvcs}</div>
                </div>
                <div style={{padding:"8px 10px",background:"#161b22",borderRadius:4,textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:2}}>VALOR</div>
                  <div className="mono" style={{fontWeight:600,color:"#d29922",fontSize:11}}>{s.total>=1000?`${(s.total/1000).toFixed(0)}k`:`${s.total.toFixed(0)}`}</div>
                </div>
                <div style={{padding:"8px 10px",background:"#161b22",borderRadius:4,textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#484f58",marginBottom:2}}>GERADOS</div>
                  <div className="mono" style={{fontWeight:600,color:s.gerados>0?"#3fb950":"#484f58"}}>{s.gerados}</div>
                </div>
              </div>

              {/* Botão gerar */}
              <div onClick={e=>e.stopPropagation()}>
                {(isGerado||s.gerados>0)
                  ?<div style={{display:"flex",flexDirection:"column",gap:4}}>
                    <div className="badge bgn" style={{width:"100%",justifyContent:"center",padding:"7px 0",fontSize:12}}>✓ {s.gerados} lançamentos gerados</div>
                    <button
                      className="btn btn-ghost btn-xs"
                      style={{width:"100%",justifyContent:"center",fontSize:10,color:"#484f58"}}
                      onClick={()=>gerarPlanejado(area)}
                    >
                      ↺ Regerar
                    </button>
                  </div>
                  :<button
                      className="btn btn-primary"
                      style={{width:"100%",justifyContent:"center"}}
                      onClick={()=>gerarPlanejado(area)}
                      disabled={(area.itens||[]).filter(i=>i.sid&&i.qtd&&i.data).length===0}
                    >
                      ⊕ Gerar Planejado
                    </button>
                }
              </div>
            </div>
          );
        })}
      </div>

      {/* Sumário geral */}
      {areasFilt.length>0&&(
        <div style={{padding:"14px 20px",background:"#161b22",border:"1px solid #21262d",borderRadius:6,display:"flex",gap:24,flexWrap:"wrap",fontSize:12}}>
          <span style={{color:"#484f58"}}>{areasFilt.length} área{areasFilt.length!==1?"s":""}</span>
          <span className="mono" style={{color:"#d29922"}}>
            Total planejado: R$ {fmt(areasFilt.reduce((s,a)=>s+stats(a).total,0))}
          </span>
          <span style={{color:areasFilt.some(a=>stats(a).gerados===0)?"#d29922":"#3fb950"}}>
            {areasFilt.filter(a=>stats(a).gerados>0).length}/{areasFilt.length} áreas com planejado gerado
          </span>
        </div>
      )}
    </div>
  );
}



// ═══════════════════════════════════════════════════════════════════════════
//  REPORT SEMANAL — 3 modelos: Gerente / Líder / Cliente
// ═══════════════════════════════════════════════════════════════════════════
const LOGO_HBR = window.LOGO_HBR;

// Retorna seg e sex da semana atual
function semanaAtual() {
  const hoje = new Date();
  const dow = hoje.getDay(); // 0=dom
  const seg = new Date(hoje); seg.setDate(hoje.getDate() - (dow===0?6:dow-1));
  const sex = new Date(seg);  sex.setDate(seg.getDate()+4);
  const fmt = d => d.toISOString().slice(0,10);
  return { ini: fmt(seg), fim: fmt(sex) };
}

function fmtDateBR(d){ if(!d) return "—"; const [y,m,dd]=d.split("-"); return `${dd}/${m}/${y}`; }

function ReportSemanal({realizado,planejado,amostras,relats,custosFixos,custosArea,areas,servicos,svcMap,clientes,clienteAtivo,profile,relSemanal,setRelSemanal}){
  const sem = semanaAtual();
  const [ini, setIni]         = useState(sem.ini);
  const [fim, setFim]         = useState(sem.fim);
  const [modelo, setModelo]   = useState(profile==="analista"?"lider":profile||"gerente");
  const [subView, setSubView] = useState("preview"); // "preview"|"historico"
  const [obsExtra, setObsExtra] = useState("");
  const [editando, setEditando] = useState({}); // campos editáveis por área
  const [salvando, setSalvando] = useState(false);
  const printRef = useRef();

  // ── Dados filtrados ──────────────────────────────────────────────────
  const cliId = clienteAtivo?.id||null;
  const realSem  = useMemo(()=> realizado.filter(l=>l.data>=ini&&l.data<=fim&&(!cliId||l.cliId===cliId)),[realizado,ini,fim,cliId]);
  const planSem  = useMemo(()=> planejado.filter(l=>l.data>=ini&&l.data<=fim&&(!cliId||l.cliId===cliId)),[planejado,ini,fim,cliId]);
  const amoFiltAll = useMemo(()=> amostras.filter(a=>(!cliId||a.cliId===cliId)),[amostras,cliId]);
  const relFiltAll = useMemo(()=> relats.filter(r=>(!cliId||r.cliId===cliId)),[relats,cliId]);

  const planProx = useMemo(()=>{
    const d=new Date(fim); d.setDate(d.getDate()+1);
    const p7=new Date(d); p7.setDate(d.getDate()+6);
    const fmtD=x=>x.toISOString().slice(0,10);
    return planejado.filter(l=>l.data>=fmtD(d)&&l.data<=fmtD(p7)&&(!cliId||l.cliId===cliId));
  },[planejado,fim,cliId]);

  // ── Financeiro ───────────────────────────────────────────────────────
  const totReal     = realSem.reduce((s,l)=>s+(svcMap[l.sid]?.valor||0)*l.qtd,0);
  const totPlan     = planSem.reduce((s,l)=>s+(svcMap[l.sid]?.valor||0)*l.qtd,0);
  const totRealAcum = realizado.filter(l=>l.data<=fim&&(!cliId||l.cliId===cliId)).reduce((s,l)=>s+(svcMap[l.sid]?.valor||0)*l.qtd,0);
  const totCustFixo = custosFixos.filter(c=>c.mes===ini.slice(0,7)).reduce((s,c)=>s+parseFloat(c.valor||0),0);
  const totCustDir  = custosArea.filter(c=>c.data>=ini&&c.data<=fim).reduce((s,c)=>s+parseFloat(c.valor||0),0);
  const margem      = totReal - totCustDir - totCustFixo*(totReal/(realizado.filter(l=>l.data>=ini.slice(0,7)+"-01"&&l.data<=fim).reduce((s,l)=>s+(svcMap[l.sid]?.valor||0)*l.qtd,0)||1));

  // ── Progresso por área (dividido em Sondagem / Lab / Relatório) ──────
  const SVC_SOND = ["V13","V11","V09","V10","V02","V05","V38"]; // sondagem
  const SVC_AMO  = ["V14","V18","V19","V26"];                   // amostras

  const areasMap = useMemo(()=>{
    const m={};
    const add=(lista,tipo)=>lista.forEach(l=>{
      const a=l.area||"(Sem área)";
      if(!m[a]) m[a]={area:a,real:[],plan:[]};
      m[a][tipo].push(l);
    });
    add(realSem,"real"); add(planSem,"plan");
    return Object.values(m).sort((a,b)=>a.area.localeCompare(b.area));
  },[realSem,planSem]);

  // Busca descrição da área no cadastro
  const areaDesc = useCallback(nomeArea=>{
    const found = areas.find(a=>
      a.nome===nomeArea ||
      a.nome?.toUpperCase()===nomeArea?.toUpperCase() ||
      a.nome?.toUpperCase().includes(nomeArea?.toUpperCase()) ||
      nomeArea?.toUpperCase().includes(a.nome?.toUpperCase())
    );
    // Usa descricao do cadastro, ou fallback para o primeiro obs dos itens
    return found?.descricao || (found?.itens?.[0]?.obs?.split("—")?.[0]?.trim()) || "";
  },[areas]);

  // Laudos críticos ≤7 dias
  const laudosCrit = useMemo(()=>{
    const lim=new Date(); lim.setDate(lim.getDate()+7);
    return amoFiltAll.filter(a=>a.prazoLaudo&&a.status!=="laudo_ok"&&a.status!=="reprovado"&&new Date(a.prazoLaudo)<=lim)
      .sort((a,b)=>a.prazoLaudo.localeCompare(b.prazoLaudo));
  },[amoFiltAll]);

  // Próxima semana por área
  const proxAreas = useMemo(()=>{
    const m={};
    planProx.forEach(l=>{const a=l.area||"(Sem área)";if(!m[a])m[a]=[];m[a].push(l);});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  },[planProx]);

  // ── Campo editável inline ────────────────────────────────────────────
  const getEdit = (chave, fallback) => editando[chave]!==undefined ? editando[chave] : fallback;
  const setEdit = (chave, val) => setEditando(e=>({...e,[chave]:val}));

  // ── Salvar no histórico ──────────────────────────────────────────────
  const salvarHistorico = ()=>{
    setSalvando(true);
    const snap = {
      id: uid(),
      modelo,
      ini, fim,
      cliente: clienteAtivo?.nome||"Todos",
      geradoEm: hoje(),
      obsExtra,
      editando,
      totReal, totPlan, totRealAcum,
      areasSnap: areasMap.map(({area,real,plan})=>({area,nReal:real.length,nPlan:plan.length})),
    };
    setRelSemanal(a=>[snap,...a]);
    setSalvando(false);
    setSubView("historico");
  };


  const periodoStr = `${fmtDateBR(ini)} a ${fmtDateBR(fim)}`;
  const tituloModelo = modelo==="gerente"?"Gerencial":modelo==="lider"?"Operacional":"Cliente";

  // ── BLOCO: Progresso por Área (dividido) ────────────────────────────
  const BlocoArea = ({area,real,plan,isHTML=false})=>{
    const desc = getEdit(`desc_${area}`, areaDesc(area));
    // Sondagem
    const mRealSond = real.filter(l=>SVC_SOND.includes(l.sid)).reduce((s,l)=>s+l.qtd,0);
    const mPlanSond = plan.filter(l=>SVC_SOND.includes(l.sid)).reduce((s,l)=>s+l.qtd,0);
    const vRealSond = real.filter(l=>SVC_SOND.includes(l.sid)).reduce((s,l)=>s+(svcMap[l.sid]?.valor||0)*l.qtd,0);
    // Laboratório (amostras desta área na semana)
    const amoArea   = amoFiltAll.filter(a=>(a.area||"")===area);
    const amoColet  = amoArea.filter(a=>a.dataColeta>=ini&&a.dataColeta<=fim).length;
    const amoEnv    = amoArea.filter(a=>["enviado","em_analise","laudo_ok"].includes(a.status)).length;
    const amoOK     = amoArea.filter(a=>a.status==="laudo_ok").length;
    // Relatórios desta área
    const relArea   = relFiltAll.filter(r=>(r.area||"")===area||(r.titulo||"").includes(area));
    const pct = (mPlanSond+mRealSond)>0?Math.round(mRealSond/(mPlanSond+mRealSond)*100):mRealSond>0?100:0;
    const corPct = pct>=100?"#1e8449":pct>0?"#d35400":"#888";

    if(isHTML) return (
      '<div class="area-block">' +
      '<div class="area-title">'+area+'</div>' +
      (desc?'<div class="area-desc">'+desc+'</div>':'<div class="area-desc">Investigação Confirmatória — '+area+'</div>') +
      '<h3>Sondagem</h3>' +
      '<table><thead><tr><th>SERVIÇO</th><th>QTDE REAL.</th><th>QTDE PLAN.</th><th>UNID.</th>'+(modelo!=="cliente"?'<th>VALOR</th>':'')+'</tr></thead><tbody>' +
      [...new Set([...real,...plan].filter(l=>SVC_SOND.includes(l.sid)).map(l=>l.sid))].map(sid=>{
        const s=svcMap[sid]||{}; const r=real.filter(l=>l.sid===sid).reduce((a,l)=>a+l.qtd,0); const p=plan.filter(l=>l.sid===sid).reduce((a,l)=>a+l.qtd,0);
        return '<tr><td>'+(s.nome||sid)+'</td><td><b>'+(r>0?fmtN(r):'—')+'</b></td><td>'+(p>0?fmtN(p):'—')+'</td><td>'+(s.unidade||'')+'</td>'+(modelo!=="cliente"?'<td>R$ '+fmt((s.valor||0)*r)+'</td>':'')+'</tr>';
      }).join('') +
      '</tbody></table>' +
      '<div class="prog-bar"><div class="prog-fill" style="width:'+Math.min(pct,100)+'%;background:'+corPct+'"></div></div>' +
      '<div style="font-size:9px;color:'+corPct+';margin-top:2px">'+pct+'% executado em sondagem</div>' +
      (amoArea.length>0||amoColet>0 ?
        '<h3>Laboratório</h3>' +
        '<table><thead><tr><th>STATUS</th><th>QTD</th></tr></thead><tbody>' +
        [["Coletadas na semana",amoColet],["Enviadas/Em análise",amoEnv],["Laudos OK",amoOK]].filter(([,n])=>n>0).map(([l,n])=>'<tr><td>'+l+'</td><td><b>'+n+'</b></td></tr>').join('') +
        '</tbody></table>'
        : '') +
      (relArea.length>0 ?
        '<h3>Relatórios</h3>' +
        '<table><thead><tr><th>TÍTULO</th><th>STATUS</th><th>PRAZO</th></tr></thead><tbody>' +
        relArea.map(r=>{const s=ST_REL.find(x=>x.id===r.status);const cls=r.status==="aprovado"?"teal":r.status==="revisao_cliente"?"purple":r.status==="entregue"?"green":r.status==="em_elaboracao"?"orange":"";return'<tr><td>'+r.titulo+'</td><td><span class="badge '+cls+'">'+(s?.label||r.status)+'</span></td><td>'+(fmtDateBR(r.prazo)||'—')+'</td></tr>';}).join('') +
        '</tbody></table>'
        : '') +
      '</div>'
    )
    // Tela
    return(
      <div key={area} style={{border:"1px solid #21262d",borderRadius:6,padding:"14px 16px",marginBottom:10}}>
        {/* Cabeçalho da área */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div style={{flex:1}}>
            <span style={{fontWeight:700,color:"#c9d1d9",fontSize:14}}>{area}</span>
            {/* Descrição editável */}
            <div style={{marginTop:4}}>
              <input
                style={{background:"transparent",border:"none",borderBottom:"1px dashed #30363d",color:desc?"#8b949e":"#30363d",fontSize:11,width:"100%",outline:"none",padding:"1px 2px"}}
                placeholder="Clique para adicionar descrição…"
                value={desc}
                onFocus={e=>{if(!desc)setEdit(`desc_${area}`, areaDesc(area)||"");}}
                onChange={e=>setEdit(`desc_${area}`,e.target.value)}
              />
              {!desc&&areaDesc(area)&&<div style={{fontSize:10,color:"#388bfd",marginTop:1,cursor:"pointer"}} onClick={()=>setEdit(`desc_${area}`,areaDesc(area))}>{'↖ usar: "'+areaDesc(area).slice(0,60)+(areaDesc(area).length>60?'…':'')+'"'}</div>}
            </div>
          </div>
          <span className={`badge ${pct>=100?"bgn":pct>0?"bo":"bg"}`} style={{marginLeft:12,flexShrink:0}}>{pct}%</span>
        </div>

        {/* 3 colunas: Sondagem / Lab / Relatórios */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          {/* Sondagem */}
          <div>
            <div style={{fontSize:10,fontWeight:600,color:"#388bfd",textTransform:"uppercase",marginBottom:6,borderBottom:"1px solid #21262d",paddingBottom:3}}>⛏ Sondagem</div>
            {[...new Set([...real,...plan].filter(l=>SVC_SOND.includes(l.sid)).map(l=>l.sid))].map(sid=>{
              const s=svcMap[sid]||{}; const r=real.filter(l=>l.sid===sid).reduce((a,l)=>a+l.qtd,0); const p=plan.filter(l=>l.sid===sid).reduce((a,l)=>a+l.qtd,0);
              return r>0||p>0?(
                <div key={sid} style={{fontSize:11,marginBottom:4,display:"flex",justifyContent:"space-between"}}>
                  <span style={{color:"#8b949e",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:4}}>{s.nome?.split("—")[0]||sid}</span>
                  <span className="mono" style={{color:"#3fb950",flexShrink:0}}>{r>0?fmtN(r):""}{s.unidade?` ${s.unidade}`:""}{p>0?<span style={{color:"#484f58"}}> /{fmtN(p)}</span>:null}</span>
                </div>
              ):null;
            })}
            {mRealSond===0&&mPlanSond===0&&<div style={{fontSize:11,color:"#484f58"}}>Sem atividade</div>}
            <div style={{height:3,background:"#21262d",borderRadius:2,marginTop:6}}>
              <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:pct>=100?"#3fb950":pct>0?"#d29922":"#21262d",borderRadius:2}}/>
            </div>
          </div>

          {/* Laboratório */}
          <div>
            <div style={{fontSize:10,fontWeight:600,color:"#2dd4bf",textTransform:"uppercase",marginBottom:6,borderBottom:"1px solid #21262d",paddingBottom:3}}>🧪 Laboratório</div>
            {amoColet>0&&<div style={{fontSize:11,marginBottom:3,display:"flex",justifyContent:"space-between"}}><span style={{color:"#8b949e"}}>Coletadas</span><span className="mono" style={{color:"#3fb950"}}>{amoColet}</span></div>}
            {amoEnv>0&&<div style={{fontSize:11,marginBottom:3,display:"flex",justifyContent:"space-between"}}><span style={{color:"#8b949e"}}>Em análise</span><span className="mono" style={{color:"#d29922"}}>{amoEnv}</span></div>}
            {amoOK>0&&<div style={{fontSize:11,marginBottom:3,display:"flex",justifyContent:"space-between"}}><span style={{color:"#8b949e"}}>Laudos OK</span><span className="mono" style={{color:"#3fb950"}}>{amoOK}</span></div>}
            {amoArea.length===0&&<div style={{fontSize:11,color:"#484f58"}}>Sem amostras</div>}
          </div>

          {/* Relatórios */}
          <div>
            <div style={{fontSize:10,fontWeight:600,color:"#8957e5",textTransform:"uppercase",marginBottom:6,borderBottom:"1px solid #21262d",paddingBottom:3}}>◈ Relatórios</div>
            {relArea.length===0&&<div style={{fontSize:11,color:"#484f58"}}>Sem relatórios</div>}
            {relArea.map(r=>{
              const s=ST_REL.find(x=>x.id===r.status);
              return(
                <div key={r.id} style={{fontSize:11,marginBottom:4}}>
                  <div style={{color:"#c9d1d9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.titulo}</div>
                  <span className={`badge ${s?.cls||"bg"}`} style={{fontSize:10}}>{s?.label||r.status}</span>
                  {r.prazo&&<span style={{fontSize:10,color:"#484f58",marginLeft:6}}>{fmtDateBR(r.prazo)}</span>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  // ── CONTEÚDO PARA IMPRESSÃO ──────────────────────────────────────────
  const gerarHTML = ()=>{
    const cli=clienteAtivo;
    const obsGeral = getEdit("obs_geral", obsExtra);
    const obsLab   = getEdit("obs_lab","");
    const obsProx  = getEdit("obs_prox","");

    let html = '';

    // Header
    html += '<div class="header">';
    html += '<div><img src="'+LOGO_HBR+'" class="logo" alt="HBR"/></div>';
    html += '<div style="text-align:right">';
    html += '<div style="font-size:16px;font-weight:700;color:#0d3b6e">Report Semanal — '+tituloModelo+'</div>';
    if(cli) html += '<div style="font-size:11px;color:#555;margin-top:2px">Cliente: <b>'+cli.nome+'</b></div>';
    html += '<div style="font-size:11px;color:#0d3b6e;font-weight:600;margin-top:2px">'+periodoStr+'</div>';
    html += '<div style="font-size:9px;color:#888;margin-top:2px">Emitido em '+fmtDateBR(hoje())+'</div>';
    html += '</div></div>';

    // Financeiro — só gerente
    if(modelo==="gerente"){
      html += '<h2>Resumo Financeiro</h2><div class="kpi-row">';
      [["Realizado (semana)","R$ "+fmt(totReal)],["Planejado (semana)","R$ "+fmt(totPlan)],["Acumulado","R$ "+fmt(totRealAcum)],["Custo Fixo (mês)","R$ "+fmt(totCustFixo)],["Custo Direto","R$ "+fmt(totCustDir)],["Margem Est.","R$ "+fmt(margem)]]
        .forEach(([l,v])=>{ html += '<div class="kpi"><div class="kpi-v">'+v+'</div><div class="kpi-l">'+l+'</div></div>'; });
      html += '</div>';
    }

    // Progresso por área
    html += '<h2>Progresso por Área</h2>';
    areasMap.forEach(({area,real,plan})=>{ html += BlocoArea({area,real,plan,isHTML:true}); });

    // Lab geral
    html += '<h2>Laboratório — Visão Geral</h2>';
    html += '<table><thead><tr><th>STATUS</th><th>QUANTIDADE</th></tr></thead><tbody>';
    ST_LAB.forEach(s=>{ const n=amoFiltAll.filter(a=>a.status===s.id).length; if(n>0) html += '<tr><td>'+s.label+'</td><td><b>'+n+'</b></td></tr>'; });
    html += '</tbody></table>';
    if(laudosCrit.length>0) html += '<div class="obs-box">⚠ '+laudosCrit.length+' laudo(s) com prazo crítico: '+laudosCrit.map(a=>(a.ponto||a.area)+' ('+fmtDateBR(a.prazoLaudo)+')').join(', ')+'</div>';
    if(obsLab) html += '<div class="obs-box">'+obsLab+'</div>';

    // Relatórios
    html += '<h2>Relatórios Técnicos</h2>';
    if(relFiltAll.length>0){
      html += '<table><thead><tr><th>TÍTULO</th><th>ÁREA</th><th>STATUS</th><th>PRAZO</th><th>RESPONSÁVEL</th></tr></thead><tbody>';
      relFiltAll.forEach(r=>{
        const s=ST_REL.find(x=>x.id===r.status);
        const cls=r.status==="aprovado"?"teal":r.status==="revisao_cliente"?"purple":r.status==="entregue"?"green":r.status==="em_elaboracao"?"orange":"";
        html += '<tr><td>'+r.titulo+'</td><td>'+(r.area||'—')+'</td><td><span class="badge '+cls+'">'+(s?.label||r.status)+'</span></td><td>'+(fmtDateBR(r.prazo)||'—')+'</td><td>'+(r.resp||'—')+'</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p style="color:#888;font-size:10px">Nenhum relatório.</p>';
    }

    // Próxima semana
    html += '<h2>Próxima Semana</h2>';
    if(proxAreas.length>0){
      proxAreas.forEach(([area,itens])=>{
        html += '<h3>'+area+'</h3>';
        html += '<table><thead><tr><th>DATA</th><th>SERVIÇO</th><th>QTDE</th><th>OBS</th></tr></thead><tbody>';
        itens.sort((a,b)=>a.data.localeCompare(b.data)).forEach(l=>{
          const s=svcMap[l.sid]||{};
          html += '<tr><td>'+fmtDateBR(l.data)+'</td><td>'+(s.nome||l.sid)+'</td><td>'+fmtN(l.qtd)+' '+(s.unidade||'')+'</td><td>'+(l.obs||'—')+'</td></tr>';
        });
        html += '</tbody></table>';
      });
    } else {
      html += '<p style="color:#888;font-size:10px">Nenhuma atividade planejada.</p>';
    }
    if(obsProx) html += '<div class="obs-box">'+obsProx+'</div>';

    // Obs gerais
    if(obsGeral) html += '<h2>Observações Gerais</h2><div class="obs-box">'+obsGeral+'</div>';

    html += '<div class="footer">HBR Soluções Integradas — Report Semanal '+tituloModelo+' — '+periodoStr+' — Gerado em '+fmtDateBR(hoje())+'</div>';

    return html;
  }
  const imprimir = ()=>{
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Report Semanal HBR</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;font-size:11px;color:#1a1a2e;background:#fff;padding:20px}h2{font-size:12px;font-weight:700;color:#0d3b6e;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 6px;border-bottom:2px solid #0d3b6e;padding-bottom:3px}h3{font-size:11px;font-weight:600;color:#1a5276;margin:8px 0 4px}table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:10px}th{background:#0d3b6e;color:#fff;padding:4px 8px;text-align:left}td{padding:4px 8px;border-bottom:1px solid #e8eaf0}tr:nth-child(even) td{background:#f5f7fa}.header{display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #0d3b6e;padding-bottom:10px;margin-bottom:14px}.logo{height:48px}.kpi-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.kpi{border:1px solid #d5d8dc;border-radius:4px;padding:6px 12px;min-width:110px;text-align:center}.kpi-v{font-size:14px;font-weight:700;color:#0d3b6e}.kpi-l{font-size:9px;color:#666;text-transform:uppercase}.area-block{border:1px solid #d5d8dc;border-radius:4px;padding:8px 12px;margin-bottom:8px}.area-title{font-weight:700;font-size:12px;color:#0d3b6e;margin-bottom:2px}.area-desc{font-size:10px;color:#666;margin-bottom:6px}.prog-bar{height:4px;background:#eee;border-radius:2px;margin-top:4px}.prog-fill{height:4px;border-radius:2px}.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:600}.green{background:#d5f5e3;color:#1e8449}.orange{background:#fdebd0;color:#d35400}.red{background:#fadbd8;color:#c0392b}.blue{background:#d6eaf8;color:#1a5276}.purple{background:#e8daef;color:#6c3483}.teal{background:#d1f2eb;color:#1a7a5e}.obs-box{background:#fef9e7;border-left:3px solid #f39c12;padding:8px 12px;margin:8px 0;font-size:10px}.footer{margin-top:20px;border-top:1px solid #d5d8dc;padding-top:6px;font-size:9px;color:#888;text-align:center}@media print{@page{margin:12mm}}</style>
    </head><body>${gerarHTML()}</body></html>`);
    w.document.close();
    setTimeout(()=>w.print(),400);
  };

  // ── RENDER ────────────────────────────────────────────────────────────
  return(
    <div style={{display:"grid",gap:16}}>

      {/* Sub-navegação histórico/preview */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid #21262d"}}>
        <button className={`tab-btn${subView==="preview"?" active":""}`} onClick={()=>setSubView("preview")}>◑ Preview</button>
        <button className={`tab-btn${subView==="historico"?" active":""}`} onClick={()=>setSubView("historico")}>
          ☰ Histórico {relSemanal?.length>0&&<span className="badge bg" style={{marginLeft:4}}>{relSemanal.length}</span>}
        </button>
      </div>

      {/* ── HISTÓRICO ── */}
      {subView==="historico"&&(
        <div style={{display:"grid",gap:12}}>
          {(!relSemanal||relSemanal.length===0)&&(
            <div className="card" style={{padding:"40px 20px",textAlign:"center",color:"#484f58"}}>
              <div style={{fontSize:28,marginBottom:10}}>☰</div>
              <div style={{color:"#8b949e"}}>Nenhum report semanal salvo ainda.</div>
              <div style={{fontSize:12,marginTop:6}}>Gere um report na aba Preview e clique em "Salvar no Histórico".</div>
            </div>
          )}
          {(relSemanal||[]).map(r=>(
            <div key={r.id} className="card" style={{padding:"14px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontWeight:600,color:"#c9d1d9",fontSize:13}}>
                    {r.modelo==="gerente"?"◎ Gerencial":r.modelo==="lider"?"▦ Operacional":"◫ Cliente"}
                    {" "}—{" "}{r.ini&&r.fim?`${fmtDateBR(r.ini)} a ${fmtDateBR(r.fim)}`:""}
                  </div>
                  <div style={{fontSize:11,color:"#484f58",marginTop:2}}>
                    {r.cliente} · Gerado em {fmtDateBR(r.geradoEm)} ·{" "}
                    <span className="mono" style={{color:"#3fb950"}}>R$ {fmt(r.totReal)}</span> realizado
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setRelSemanal(a=>a.filter(x=>x.id!==r.id))}>✕ Excluir</button>
                </div>
              </div>
              {r.obsExtra&&<div style={{marginTop:8,padding:"8px 12px",background:"#161b22",borderRadius:4,fontSize:11,color:"#8b949e"}}>{r.obsExtra}</div>}
            </div>
          ))}
        </div>
      )}

      {/* ── PREVIEW ── */}
      {subView==="preview"&&(<>

        {/* Controles */}
        <div className="card" style={{padding:"16px 18px"}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:16,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>SEMANA</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="date" className="inp" style={{width:140}} value={ini} onChange={e=>setIni(e.target.value)}/>
                <span style={{color:"#484f58",fontSize:12}}>→</span>
                <input type="date" className="inp" style={{width:140}} value={fim} onChange={e=>setFim(e.target.value)}/>
                <button className="btn btn-ghost btn-sm" onClick={()=>{const s=semanaAtual();setIni(s.ini);setFim(s.fim);}}>↺ Semana atual</button>
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#484f58",marginBottom:5}}>MODELO</div>
              <div style={{display:"flex",gap:0,background:"#010409",borderRadius:6,border:"1px solid #30363d",overflow:"hidden"}}>
                {[{id:"gerente",l:"◎ Gerencial"},{id:"lider",l:"▦ Operacional"},{id:"cliente",l:"◫ Cliente"}].map(m=>(
                  <button key={m.id} onClick={()=>setModelo(m.id)}
                    style={{padding:"7px 16px",border:"none",cursor:"pointer",fontSize:12,transition:"all .15s",
                      background:modelo===m.id?"#1f6feb22":"transparent",
                      color:modelo===m.id?"#388bfd":"#484f58",
                      fontWeight:modelo===m.id?600:400,
                      borderRight:"1px solid #30363d"}}>
                    {m.l}
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:8}}>
              <button className="btn btn-ghost" onClick={imprimir}>⎙ PDF</button>
              <button className="btn btn-primary" onClick={salvarHistorico} disabled={salvando}>
                {salvando?"…":"☰ Salvar no Histórico"}
              </button>
            </div>
          </div>
        </div>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
          {[
            {l:"Realizado (semana)",  v:`R$ ${fmt(totReal)}`,     c:"ca-green",  show:true},
            {l:"Planejado (semana)",  v:`R$ ${fmt(totPlan)}`,     c:"ca-orange", show:true},
            {l:"Acumulado",           v:`R$ ${fmt(totRealAcum)}`, c:"ca-blue",   show:true},
            {l:"Amostras (total)",    v:amoFiltAll.length,        c:"",          show:true},
            {l:"Laudos críticos",     v:laudosCrit.length,        c:laudosCrit.length>0?"ca-red":"", show:true},
            {l:"Margem est.",         v:`R$ ${fmt(margem)}`,      c:margem>=0?"ca-green":"ca-red", show:modelo==="gerente"},
          ].filter(k=>k.show).map(({l,v,c})=>(
            <div key={l} className={`card ${c}`} style={{padding:"12px 16px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#484f58",marginBottom:4}}>{l.toUpperCase()}</div>
              <div className="mono" style={{fontWeight:700,fontSize:15,color:"#c9d1d9"}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Preview do relatório */}
        <div className="card" style={{padding:"20px 24px",background:"#fff",color:"#1a1a2e"}} ref={printRef}>

          {/* Cabeçalho */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"3px solid #0d3b6e",paddingBottom:12,marginBottom:16}}>
            <img src={LOGO_HBR} style={{height:52}} alt="HBR"/>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:16,fontWeight:700,color:"#0d3b6e"}}>Report Semanal — {tituloModelo}</div>
              {clienteAtivo&&<div style={{fontSize:11,color:"#555",marginTop:2}}>Cliente: <strong>{clienteAtivo.nome}</strong></div>}
              <div style={{fontSize:11,color:"#0d3b6e",fontWeight:600,marginTop:2}}>{periodoStr}</div>
              <div style={{fontSize:9,color:"#888",marginTop:2}}>Emitido em {fmtDateBR(hoje())}</div>
            </div>
          </div>

          {/* Financeiro — só gerente */}
          {modelo==="gerente"&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#0d3b6e",textTransform:"uppercase",borderBottom:"2px solid #0d3b6e",paddingBottom:3,marginBottom:8}}>Resumo Financeiro</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[["Realizado (semana)",`R$ ${fmt(totReal)}`,"#1e8449"],["Planejado (semana)",`R$ ${fmt(totPlan)}`,"#d35400"],["Acumulado",`R$ ${fmt(totRealAcum)}`,"#1a5276"],["Custo Fixo (mês)",`R$ ${fmt(totCustFixo)}`,"#c0392b"],["Custo Direto",`R$ ${fmt(totCustDir)}`,"#c0392b"],["Margem Estimada",`R$ ${fmt(margem)}`,margem>=0?"#1e8449":"#c0392b"]]
                  .map(([l,v,c])=>(<div key={l} style={{border:"1px solid #d5d8dc",borderRadius:4,padding:"6px 12px",minWidth:110,textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:9,color:"#666",textTransform:"uppercase",marginTop:2}}>{l}</div></div>))}
              </div>
            </div>
          )}

          {/* Progresso por área */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0d3b6e",textTransform:"uppercase",borderBottom:"2px solid #0d3b6e",paddingBottom:3,marginBottom:8}}>Progresso por Área</div>
            {areasMap.length===0&&<div style={{color:"#888",fontSize:11}}>Sem atividades no período.</div>}
            {areasMap.map(({area,real,plan})=><BlocoArea key={area} area={area} real={real} plan={plan}/>)}
          </div>

          {/* Laboratório geral */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0d3b6e",textTransform:"uppercase",borderBottom:"2px solid #0d3b6e",paddingBottom:3,marginBottom:8}}>Laboratório — Visão Geral</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
              {ST_LAB.map(s=>{const n=amoFiltAll.filter(a=>a.status===s.id).length;return(<div key={s.id} style={{border:"1px solid #d5d8dc",borderRadius:4,padding:"5px 10px",textAlign:"center",minWidth:70}}><div style={{fontSize:16,fontWeight:700,color:n>0?"#0d3b6e":"#ccc"}}>{n}</div><div style={{fontSize:9,color:"#888"}}>{s.label}</div></div>);})}
            </div>
            {laudosCrit.length>0&&<div style={{background:"#fef9e7",borderLeft:"3px solid #f39c12",padding:"6px 10px",fontSize:10}}>⚠ {laudosCrit.length} laudo(s) com prazo crítico: {laudosCrit.map(a=>`${a.ponto||a.area} (${fmtDateBR(a.prazoLaudo)})`).join(", ")}</div>}
            {/* Obs lab editável */}
            <textarea style={{marginTop:8,width:"100%",background:"#fffde7",border:"1px dashed #d29922",borderRadius:4,padding:"6px 8px",fontSize:10,color:"#555",resize:"vertical",minHeight:40,outline:"none",fontFamily:"inherit"}}
              placeholder="Observações de laboratório (opcional)…"
              value={getEdit("obs_lab","")} onChange={e=>setEdit("obs_lab",e.target.value)}/>
          </div>

          {/* Relatórios */}
          {relFiltAll.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#0d3b6e",textTransform:"uppercase",borderBottom:"2px solid #0d3b6e",paddingBottom:3,marginBottom:8}}>Relatórios Técnicos</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead><tr>{["Título","Área","Status","Prazo","Responsável"].map(h=><th key={h} style={{background:"#0d3b6e",color:"#fff",padding:"4px 8px",textAlign:"left"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {relFiltAll.map(r=>{
                    const s=ST_REL.find(x=>x.id===r.status);
                    const bg=r.status==="aprovado"?"#d1f2eb":r.status==="revisao_cliente"?"#e8daef":r.status==="entregue"?"#d5f5e3":r.status==="em_elaboracao"?"#fdebd0":"#eaecee";
                    const fg=r.status==="aprovado"?"#1a7a5e":r.status==="revisao_cliente"?"#6c3483":r.status==="entregue"?"#1e8449":r.status==="em_elaboracao"?"#d35400":"#666";
                    const dp=r.prazo&&!["entregue","revisao_cliente","aprovado"].includes(r.status)?diffD(hoje(),r.prazo):null;
                    return(
                      <tr key={r.id} style={{borderBottom:"1px solid #e8eaf0"}}>
                        <td style={{padding:"4px 8px",fontWeight:500}}>{r.titulo}</td>
                        <td style={{padding:"4px 8px"}}>{r.area||"—"}</td>
                        <td style={{padding:"4px 8px"}}><span style={{background:bg,color:fg,padding:"1px 6px",borderRadius:10,fontSize:9,fontWeight:600}}>{s?.label||r.status}</span></td>
                        <td style={{padding:"4px 8px"}}>{r.prazo?`${fmtDateBR(r.prazo)}${dp!==null?` (${dp}d)`:""}`:"—"}</td>
                        <td style={{padding:"4px 8px",color:"#888"}}>{r.resp||"—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* Próxima semana */}
          {proxAreas.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#0d3b6e",textTransform:"uppercase",borderBottom:"2px solid #0d3b6e",paddingBottom:3,marginBottom:8}}>Próxima Semana</div>
              {proxAreas.map(([area,itens])=>(
                <div key={area} style={{marginBottom:8}}>
                  <div style={{fontWeight:600,fontSize:11,color:"#0d3b6e",marginBottom:4}}>{area}</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                    <thead><tr>{["Data","Serviço","Qtde","Obs"].map(h=><th key={h} style={{background:"#0d3b6e",color:"#fff",padding:"3px 6px",textAlign:"left"}}>{h}</th>)}</tr></thead>
                    <tbody>{itens.sort((a,b)=>a.data.localeCompare(b.data)).map(l=>{const s=svcMap[l.sid]||{};return<tr key={l.id} style={{borderBottom:"1px solid #e8eaf0"}}><td style={{padding:"3px 6px"}}>{fmtDateBR(l.data)}</td><td style={{padding:"3px 6px"}}>{s.nome||l.sid}</td><td style={{padding:"3px 6px"}}>{fmtN(l.qtd)} {s.unidade||""}</td><td style={{padding:"3px 6px",color:"#888"}}>{l.obs||"—"}</td></tr>;})}</tbody>
                  </table>
                </div>
              ))}
              <textarea style={{marginTop:6,width:"100%",background:"#fffde7",border:"1px dashed #d29922",borderRadius:4,padding:"6px 8px",fontSize:10,color:"#555",resize:"vertical",minHeight:36,outline:"none",fontFamily:"inherit"}}
                placeholder="Observações sobre próxima semana (opcional)…"
                value={getEdit("obs_prox","")} onChange={e=>setEdit("obs_prox",e.target.value)}/>
            </div>
          )}

          {/* Observações gerais */}
          <div style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0d3b6e",textTransform:"uppercase",borderBottom:"2px solid #0d3b6e",paddingBottom:3,marginBottom:8}}>Observações Gerais</div>
            <textarea style={{width:"100%",background:"#fffde7",border:"1px dashed #d29922",borderRadius:4,padding:"8px 10px",fontSize:10,color:"#555",resize:"vertical",minHeight:60,outline:"none",fontFamily:"inherit"}}
              placeholder="Clique aqui para inserir observações gerais do período…"
              value={getEdit("obs_geral",obsExtra)} onChange={e=>{setEdit("obs_geral",e.target.value);setObsExtra(e.target.value);}}/>
          </div>

          <div style={{marginTop:16,borderTop:"1px solid #d5d8dc",paddingTop:6,fontSize:9,color:"#888",textAlign:"center"}}>
            HBR Soluções Integradas — Report Semanal {tituloModelo} — {periodoStr} — Gerado em {fmtDateBR(hoje())}
          </div>
        </div>
      </>)}
    </div>
  );
}

function SBadge({status,list}){
  const s=list.find(x=>x.id===status);
  if(!s)return null;
  return <span className={`badge ${s.cls}`}>{s.icon?s.icon+" ":""}{s.label}</span>;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
